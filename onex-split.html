<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>One1x — Split</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: #65705a;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  /* 1600×900 canvas (16:9), JS scales to fit any viewport */
  .stage {
    width: 1600px;
    height: 900px;
    background: #65705a;
    position: absolute;
    top: 0; left: 0;
    transform-origin: top left;
    display: grid;
    grid-template-columns: 1fr 1fr;
  }

  .column {
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* Vertical divider between the two columns */
  .column.left::after {
    content: '';
    position: absolute;
    right: 0;
    top: 0;
    width: 1px;
    height: 100%;
    background: rgba(255, 255, 255, 0.18);
  }

  .placeholder {
    width: 600px;
    height: 600px;
    background: #d4d4d0;
    opacity: 0;
    transform: translateY(20px);
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .placeholder img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .column.left  .placeholder { animation: phIn 1s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards; }
  .column.right .placeholder { animation: phIn 1s cubic-bezier(0.16, 1, 0.3, 1) 0.35s forwards; }

  @keyframes phIn {
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="stage" id="stage">
  <div class="column left">
    <div class="placeholder">
      <img src="https://res.cloudinary.com/dzgqzeebg/image/upload/v1779563406/hk0lrib0ntvbdvgfqcpf.png" alt="">
    </div>
  </div>
  <div class="column right">
    <div class="placeholder"></div>
  </div>
</div>

<script>
  const STAGE_W = 1600, STAGE_H = 900;
  const stage = document.getElementById('stage');
  function fit() {
    const s = Math.min(window.innerWidth / STAGE_W, window.innerHeight / STAGE_H);
    const x = (window.innerWidth  - STAGE_W * s) / 2;
    const y = (window.innerHeight - STAGE_H * s) / 2;
    stage.style.transform = `translate(${x}px, ${y}px) scale(${s})`;
  }
  fit();
  window.addEventListener('resize', fit);
</script>

</body>
</html>
