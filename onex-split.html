<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>One1x — Split</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: #c5c6c1;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  /* 1600×900 canvas (16:9), JS scales to fit any viewport */
  .stage {
    width: 1600px;
    height: 900px;
    position: absolute;
    top: 0; left: 0;
    transform-origin: top left;
    display: grid;
    grid-template-columns: 1fr 1fr;
  }

  .column {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .column.left  { background: #c5c6c1; }
  .column.right { background: #e8e2d6; padding: 0 110px; justify-content: flex-start; }

  /* Left: image */
  .image-wrap {
    width: 600px;
    height: 600px;
    overflow: hidden;
    opacity: 0;
    transform: translateY(20px);
    animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
  }
  .image-wrap img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }

  /* Right: text content */
  .text-wrap {
    position: relative;
    z-index: 2;
    max-width: 560px;
    opacity: 0;
    transform: translateY(20px);
    animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.4s forwards;
  }
  .headline {
    font-size: 76px;
    line-height: 1.02;
    letter-spacing: -0.025em;
    color: #1c1c1c;
    font-weight: 500;
  }
  .rule {
    border: none;
    border-top: 1px solid rgba(28, 28, 28, 0.6);
    margin: 56px 0 18px 0;
    width: 100%;
  }
  .caption {
    font-size: 14px;
    letter-spacing: 0.22em;
    color: #1c1c1c;
    font-weight: 400;
  }

  /* Right: soft branch shadow overlay */
  .shadow-overlay {
    position: absolute;
    top: -40px;
    right: -60px;
    width: 70%;
    height: 110%;
    pointer-events: none;
    mix-blend-mode: multiply;
    opacity: 0.32;
    z-index: 1;
    filter: blur(3px);
  }

  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="stage" id="stage">
  <!-- LEFT -->
  <div class="column left">
    <div class="image-wrap">
      <img src="https://res.cloudinary.com/dzgqzeebg/image/upload/v1779563406/hk0lrib0ntvbdvgfqcpf.png" alt="One1x Retinol packaging">
    </div>
  </div>

  <!-- RIGHT -->
  <div class="column right">
    <div class="text-wrap">
      <p class="headline">Overnight renewal,<br>you can see<br>and feel.</p>
      <hr class="rule">
      <p class="caption">PURE RETINOL SERUM</p>
    </div>
  </div>
</div>

<script>
  const STAGE_W = 1600, STAGE_H = 900;
  const stage = document.getElementById('stage');
  function fit() {
    const s = Math.min(window.innerWidth / STAGE_W, window.innerHeight / STAGE_H);
    const x = (window.innerWidth  - STAGE_W * s) / 2;
    const y = (window.innerHeight - STAGE_H * s) / 2;
    stage.style.transform = `translate(${x}px, ${y}px) scale(${s})`;
  }
  fit();
  window.addEventListener('resize', fit);
</script>

</body>
</html>
