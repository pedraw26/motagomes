<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>One1x — Split</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: #c5c6c1;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  /* 1600×900 canvas (16:9), JS scales to fit any viewport */
  .stage {
    width: 1600px;
    height: 900px;
    position: absolute;
    top: 0; left: 0;
    transform-origin: top left;
    display: grid;
    grid-template-columns: 1fr 1fr;
  }

  .column {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .column.left  { background: #c5c6c1; }
  .column.right { background: #e8e2d6; padding: 0 110px; justify-content: flex-start; }

  /* Left: image */
  .image-wrap {
    width: 600px;
    height: 600px;
    overflow: hidden;
    opacity: 0;
    transform: translateY(20px);
    animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
  }
  .image-wrap img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }

  /* Right: text content */
  .text-wrap {
    position: relative;
    z-index: 2;
    max-width: 560px;
    opacity: 0;
    transform: translateY(20px);
    animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.4s forwards;
  }
  .headline {
    font-size: 76px;
    line-height: 1.02;
    letter-spacing: -0.025em;
    color: #1c1c1c;
    font-weight: 500;
  }
  .rule {
    border: none;
    border-top: 1px solid rgba(28, 28, 28, 0.6);
    margin: 56px 0 18px 0;
    width: 100%;
  }
  .caption {
    font-size: 14px;
    letter-spacing: 0.22em;
    color: #1c1c1c;
    font-weight: 400;
  }

  /* Right: soft branch shadow overlay */
  .shadow-overlay {
    position: absolute;
    top: -40px;
    right: -60px;
    width: 70%;
    height: 110%;
    pointer-events: none;
    mix-blend-mode: multiply;
    opacity: 0.32;
    z-index: 1;
    filter: blur(3px);
  }

  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="stage" id="stage">
  <!-- LEFT -->
  <div class="column left">
    <div class="image-wrap">
      <img src="https://res.cloudinary.com/dzgqzeebg/image/upload/v1779563406/hk0lrib0ntvbdvgfqcpf.png" alt="One1x Retinol packaging">
    </div>
  </div>

  <!-- RIGHT -->
  <div class="column right">
    <!-- Soft leaf/branch shadow -->
    <svg class="shadow-overlay" viewBox="0 0 500 900" preserveAspectRatio="xMaxYMin meet" aria-hidden="true">
      <defs>
        <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur stdDeviation="2.5"/>
        </filter>
      </defs>
      <g fill="#3a3a30" filter="url(#softBlur)">
        <!-- main branch -->
        <path d="M 500,80 Q 380,160 300,260 T 150,520" stroke="#3a3a30" stroke-width="3" fill="none"/>
        <path d="M 460,140 Q 380,200 320,290" stroke="#3a3a30" stroke-width="2" fill="none"/>
        <path d="M 350,260 Q 280,300 220,360" stroke="#3a3a30" stroke-width="1.6" fill="none"/>
        <path d="M 280,360 Q 230,400 200,470" stroke="#3a3a30" stroke-width="1.4" fill="none"/>
        <!-- leaves -->
        <ellipse cx="480" cy="90"  rx="32" ry="13" transform="rotate(-22 480 90)"/>
        <ellipse cx="430" cy="130" rx="28" ry="11" transform="rotate(-32 430 130)"/>
        <ellipse cx="400" cy="180" rx="34" ry="12" transform="rotate(-40 400 180)"/>
        <ellipse cx="370" cy="220" rx="26" ry="10" transform="rotate(-48 370 220)"/>
        <ellipse cx="340" cy="260" rx="30" ry="11" transform="rotate(-52 340 260)"/>
        <ellipse cx="305" cy="305" rx="24" ry="9"  transform="rotate(-58 305 305)"/>
        <ellipse cx="275" cy="345" rx="28" ry="10" transform="rotate(-62 275 345)"/>
        <ellipse cx="240" cy="395" rx="22" ry="8"  transform="rotate(-68 240 395)"/>
        <ellipse cx="215" cy="445" rx="26" ry="9"  transform="rotate(-72 215 445)"/>
        <ellipse cx="185" cy="495" rx="20" ry="7"  transform="rotate(-78 185 495)"/>
        <!-- secondary branch leaves -->
        <ellipse cx="420" cy="170" rx="22" ry="8"  transform="rotate(-15 420 170)"/>
        <ellipse cx="385" cy="215" rx="24" ry="9"  transform="rotate(-25 385 215)"/>
        <ellipse cx="345" cy="265" rx="20" ry="7"  transform="rotate(-35 345 265)"/>
        <ellipse cx="305" cy="320" rx="22" ry="8"  transform="rotate(-45 305 320)"/>
        <ellipse cx="265" cy="375" rx="18" ry="6"  transform="rotate(-55 265 375)"/>
        <ellipse cx="230" cy="425" rx="20" ry="7"  transform="rotate(-65 230 425)"/>
      </g>
    </svg>

    <div class="text-wrap">
      <p class="headline">Overnight renewal,<br>you can see<br>and feel.</p>
      <hr class="rule">
      <p class="caption">PURE RETINOL SERUM</p>
    </div>
  </div>
</div>

<script>
  const STAGE_W = 1600, STAGE_H = 900;
  const stage = document.getElementById('stage');
  function fit() {
    const s = Math.min(window.innerWidth / STAGE_W, window.innerHeight / STAGE_H);
    const x = (window.innerWidth  - STAGE_W * s) / 2;
    const y = (window.innerHeight - STAGE_H * s) / 2;
    stage.style.transform = `translate(${x}px, ${y}px) scale(${s})`;
  }
  fit();
  window.addEventListener('resize', fit);
</script>

</body>
</html>
