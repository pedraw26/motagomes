<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAS · Logo Construction — 01 Blueprint</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Inter:wght@300;400;500&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden}
  body{
    background:#121010;
    color:#ffffff;
    font-family:'Inter',sans-serif;
    display:flex;align-items:center;justify-content:center;
    padding:24px;
  }
  .wrap{width:100%;height:100%;max-width:1920px;max-height:1080px;position:relative;display:flex;flex-direction:column}
  .stage{flex:1;position:relative;overflow:hidden}
  svg{display:block;width:100%;height:100%}
</style>
</head>
<body>
<div class="wrap">
  <div class="stage">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid meet">
      <!-- backdrop -->
      <rect x="0" y="0" width="1920" height="1080" fill="#121010"/>

      <!-- ======= MAIN AXES / BASELINE & CAP ======= -->
      <g id="axes">
        <!-- cap y=384 (actual letter top), baseline y=628, x-mid y=506, descent y=712 -->
        <line id="ax-cap"  class="keyline" x1="502" y1="384" x2="1444" y2="384" stroke="#ffffff" stroke-width="1" opacity=".55"/>
        <line id="ax-mid"  class="keyline" x1="502" y1="506" x2="1444" y2="506" stroke="#ffffff" stroke-width="1" opacity=".3"/>
        <line id="ax-base" class="keyline" x1="502" y1="628" x2="1444" y2="628" stroke="#ffffff" stroke-width="1" opacity=".55"/>
      </g>

      <!-- ======= LETTER BOUNDING BOXES (drawn in) ======= -->
      <g id="boxes" fill="none" stroke="#ffffff" stroke-width="1.2" opacity=".7">
        <!-- R: 542 .. 797  (w=255, h=244) -->
        <rect class="bbox" x="542" y="384" width="256" height="244"/>
        <!-- A: 848 .. 1103 (w=255) -->
        <rect class="bbox" x="848" y="384" width="256" height="244"/>
        <!-- S: 1149 .. 1404 (w=255) -->
        <rect class="bbox" x="1149" y="384" width="256" height="244"/>
      </g>

      <!-- ======= VERTICAL STEM ANCHORS ======= -->
      <g id="anchors" stroke="#ffffff" stroke-width=".8" opacity=".35">
        <line class="anchor" x1="542"  y1="320" x2="542"  y2="680"/>
        <line class="anchor" x1="670"  y1="320" x2="670"  y2="680"/>
        <line class="anchor" x1="798"  y1="320" x2="798"  y2="680"/>
        <line class="anchor" x1="848"  y1="320" x2="848"  y2="680"/>
        <line class="anchor" x1="976"  y1="320" x2="976"  y2="680"/>
        <line class="anchor" x1="1103" y1="320" x2="1103" y2="680"/>
        <line class="anchor" x1="1149" y1="320" x2="1149" y2="680"/>
        <line class="anchor" x1="1277" y1="320" x2="1277" y2="680"/>
        <line class="anchor" x1="1404" y1="320" x2="1404" y2="680"/>
      </g>

      <!-- ======= TICK MARKS (outside top & bottom) ======= -->
      <g id="ticks" stroke="#ffffff" stroke-width="1" opacity=".55">
        <!-- major tick at each 128-unit letter center -->
      </g>

      <!-- ======= LOGO (clean rebuild — uniform stroke 55 u, aligned to cap=384 / base=628) ======= -->
      <g id="logo" fill="#ffffff">
        <!-- LETTER R -->
        <g class="glyph" id="g-R">
          <rect x="542" y="384" width="55"  height="244"/>  <!-- left stem     -->
          <rect x="542" y="384" width="255" height="55"/>   <!-- top bar       -->
          <rect x="542" y="494" width="255" height="55"/>   <!-- middle bar    -->
          <rect x="742" y="384" width="55"  height="165"/>  <!-- upper R stem  -->
          <polygon points="687,549 742,549 797,628 742,628"/> <!-- diagonal leg — uniform 55u -->
        </g>
        <!-- LETTER A -->
        <g class="glyph" id="g-A">
          <rect x="848"  y="384" width="55"  height="244"/> <!-- left stem    -->
          <rect x="1048" y="384" width="55"  height="244"/> <!-- right stem   -->
          <rect x="848"  y="384" width="255" height="55"/>  <!-- top bar      -->
          <rect x="903"  y="494" width="145" height="55"/>  <!-- mid crossbar -->
        </g>
        <!-- LETTER S (zig-pattern as designed) -->
        <g class="glyph" id="g-S">
          <rect x="1149" y="384" width="255" height="55"/>  <!-- top bar           -->
          <rect x="1149" y="384" width="55"  height="94"/>  <!-- top-left stem     -->
          <rect x="1204" y="478" width="145" height="55"/>  <!-- middle crossbar   -->
          <rect x="1349" y="533" width="55"  height="95"/>  <!-- bottom-right stem -->
          <rect x="1149" y="573" width="255" height="55"/>  <!-- bottom bar        -->
        </g>
      </g>

      <!-- ======= DIMENSION CALLOUTS (yellow) — clearspace box around logo ======= -->
      <g id="anno" fill="none" stroke="#ffe066" stroke-width="1">
        <!-- BOX · 40u clearspace frame: x 502→1444 · y 344→668 -->
        <line class="yellow" x1="502"  y1="344" x2="1444" y2="344" opacity=".75"/>  <!-- top    -->
        <line class="yellow" x1="502"  y1="668" x2="1444" y2="668" opacity=".75"/>  <!-- bottom -->
        <line class="yellow" x1="502"  y1="344" x2="502"  y2="668" opacity=".75"/>  <!-- left   -->
        <line class="yellow" x1="1444" y1="344" x2="1444" y2="668" opacity=".75"/>  <!-- right  -->

        <!-- TOP tick caps at letter boundaries (R · A · S) -->
        <line class="yellow" x1="542"  y1="334" x2="542"  y2="354" opacity=".85"/>
        <line class="yellow" x1="798"  y1="334" x2="798"  y2="354" opacity=".85"/>
        <line class="yellow" x1="848"  y1="334" x2="848"  y2="354" opacity=".85"/>
        <line class="yellow" x1="1103" y1="334" x2="1103" y2="354" opacity=".85"/>
        <line class="yellow" x1="1149" y1="334" x2="1149" y2="354" opacity=".85"/>
        <line class="yellow" x1="1404" y1="334" x2="1404" y2="354" opacity=".85"/>

        <!-- BOTTOM tick caps — total-width endpoints -->
        <line class="yellow" x1="542"  y1="658" x2="542"  y2="678" opacity=".85"/>
        <line class="yellow" x1="1404" y1="658" x2="1404" y2="678" opacity=".85"/>

        <!-- RIGHT rail tick caps — cap / baseline (internal H marks) -->
        <line class="yellow" x1="1434" y1="384" x2="1454" y2="384" opacity=".85"/>
        <line class="yellow" x1="1434" y1="628" x2="1454" y2="628" opacity=".85"/>
      </g>

      <!-- ======= YELLOW NUMERIC LABELS ======= -->
      <g id="yellow-labels" font-family="Inter" font-weight="400">
        <text class="yTxt" x="973"  y="698" text-anchor="middle" fill="#ffe066" font-size="16" font-weight="500">W <tspan data-num="862" data-suffix=" u">862 u</tspan></text>
        <text class="yTxt" x="670"  y="326" text-anchor="middle" fill="#ffe066" font-size="12"><tspan data-num="256" data-suffix=" u">256 u</tspan></text>
        <text class="yTxt" x="976"  y="326" text-anchor="middle" fill="#ffe066" font-size="12"><tspan data-num="256" data-suffix=" u">256 u</tspan></text>
        <text class="yTxt" x="1277" y="326" text-anchor="middle" fill="#ffe066" font-size="12"><tspan data-num="256" data-suffix=" u">256 u</tspan></text>
        <text class="yTxt" x="823"  y="326" text-anchor="middle" fill="#ffe066" font-size="10" opacity=".75"><tspan data-num="50" data-suffix="">50</tspan></text>
        <text class="yTxt" x="1126" y="326" text-anchor="middle" fill="#ffe066" font-size="10" opacity=".75"><tspan data-num="46" data-suffix="">46</tspan></text>
        <text class="yTxt" x="1474" y="510" fill="#ffe066" font-size="14">H <tspan data-num="244" data-suffix=" u">244 u</tspan></text>
      </g>

      <!-- subdivision ticks (top) -->
      <g id="subdiv" stroke="#ffffff" stroke-width=".7" opacity=".4"></g>
    </svg>
  </div>
</div>

<script>
(function(){
  var svg = document.querySelector('svg');
  var NS = 'http://www.w3.org/2000/svg';

  // ----- top subdivision ticks every 16u between R left (542) and S right (1404) -----
  var sd = document.getElementById('subdiv');
  for (var tx=542;tx<=1404;tx+=16){
    var offset = tx - 542;
    var isMaj = (offset % 64 === 0);
    var t = document.createElementNS(NS,'line');
    t.setAttribute('x1',tx);t.setAttribute('x2',tx);
    t.setAttribute('y1',368);t.setAttribute('y2',isMaj?378:374);
    t.setAttribute('stroke','#ffffff');
    t.setAttribute('stroke-width','.7');
    t.setAttribute('opacity','.45');
    t.classList.add('tick');
    sd.appendChild(t);
  }

  // ----- helpers -----
  function len(el){
    if (el.tagName==='line'){
      return Math.hypot(el.x2.baseVal.value-el.x1.baseVal.value, el.y2.baseVal.value-el.y1.baseVal.value);
    }
    if (el.tagName==='rect'){
      return 2*(el.width.baseVal.value+el.height.baseVal.value);
    }
    if (el.getTotalLength) return el.getTotalLength();
    return 0;
  }
  function prep(el){
    var L = len(el);
    el.style.strokeDasharray = L;
    el.style.strokeDashoffset = L;
    return L;
  }
  function draw(el,delay,dur){
    var L = prep(el);
    el.animate(
      [{strokeDashoffset:L},{strokeDashoffset:0}],
      {duration:dur,delay:delay,easing:'cubic-bezier(.18,.82,.22,1)',fill:'forwards'}
    );
  }
  function fadeIn(el,delay,dur,to){
    el.animate(
      [{opacity:0},{opacity:to||1}],
      {duration:dur,delay:delay,easing:'cubic-bezier(.2,.8,.2,1)',fill:'forwards'}
    );
  }
  function countUp(el,delay,dur){
    var target=parseFloat(el.getAttribute('data-num'));
    var sfx=el.getAttribute('data-suffix')||'';
    var t0=performance.now()+delay;
    function step(now){
      var t=(now-t0)/dur;if(t<0){requestAnimationFrame(step);return;}if(t>1)t=1;
      var e=1-Math.pow(1-t,3);
      el.textContent=Math.round(target*e)+sfx;
      if(t<1)requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }

  // ----- collect elements -----
  var axes     = [].slice.call(document.querySelectorAll('#axes .keyline'));
  var anchors  = [].slice.call(document.querySelectorAll('#anchors .anchor'));
  var ticks    = [].slice.call(document.querySelectorAll('#subdiv .tick'));
  var boxes    = [].slice.call(document.querySelectorAll('#boxes .bbox'));
  var logo     = document.getElementById('logo');
  var glyphs   = [].slice.call(document.querySelectorAll('#logo .glyph'));
  var yellows  = [].slice.call(document.querySelectorAll('#anno .yellow'));
  var yTexts   = [].slice.call(document.querySelectorAll('.yTxt'));
  var numTxts  = [].slice.call(document.querySelectorAll('[data-num]'));

  function reset(){
    axes.concat(anchors,ticks,boxes,yellows).forEach(function(el){
      el.style.strokeDasharray='';el.style.strokeDashoffset='';el.getAnimations&&el.getAnimations().forEach(function(a){a.cancel();});
    });
    glyphs.forEach(function(el){el.style.opacity=0;el.style.filter='none';el.getAnimations&&el.getAnimations().forEach(function(a){a.cancel();});});
    yTexts.forEach(function(el){el.style.opacity=0;el.getAnimations&&el.getAnimations().forEach(function(a){a.cancel();});});
    numTxts.forEach(function(el){el.textContent='0'+(el.getAttribute('data-suffix')||'');});
  }

  function run(){
    reset();
    var t = 300;

    // 1. key axes
    axes.forEach(function(el,i){draw(el, t + i*140, 900);});
    t += 900;

    // 2. anchors
    anchors.forEach(function(el,i){draw(el, t + i*60, 700);});
    t += anchors.length*60 + 400;

    // 3. subdiv ticks
    ticks.forEach(function(el,i){draw(el, t + i*10, 360);});
    t += ticks.length*10 + 260;

    // 4. bbox
    boxes.forEach(function(el,i){draw(el, t + i*220, 1100);});
    t += boxes.length*220 + 600;

    // 5. logo glyphs
    glyphs.forEach(function(el,i){fadeIn(el, t + i*240, 1400);});
    t += glyphs.length*240 + 600;

    // 6. yellow dims
    yellows.forEach(function(el,i){draw(el, t + i*70, 520);});
    // 6b. yellow labels (fade + count-up)
    yTexts.forEach(function(el,i){fadeIn(el, t + 120 + i*90, 500, 1);});
    numTxts.forEach(function(el,i){countUp(el, t + 120 + i*90, 1200);});
    t += yellows.length*70 + 1400;

    // 7. settle
    axes.concat(anchors).forEach(function(el){
      var base=parseFloat(el.getAttribute('opacity'))||.45;
      el.animate(
        [{opacity:base},{opacity:Math.max(0.1,base*0.55)},{opacity:base}],
        {duration:2200,delay:t,easing:'ease-in-out',fill:'forwards'}
      );
    });

    // loop
    window.setTimeout(run, t + 3000);
  }

  run();
})();
</script>
</body>
</html>
