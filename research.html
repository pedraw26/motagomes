<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research — Pedro Gomes</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg">
    <script>(function(){try{var l=localStorage.getItem('mg_lang');if(l==='pt')document.documentElement.lang='pt-PT';}catch(e){}})();</script>
    <script src="/i18n.js" defer></script>
    <script src="/guard.js" defer></script>
    <style>
        :root {
            --sf-pro: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', sans-serif;
            --mono: 'SF Mono', 'Fira Code', 'Monaco', 'Menlo', monospace;
            --bg-black: #000000;
            --text: #ffffff;
            --text-80: #e5e5e5;
            --text-60: #999999;
            --text-40: #666666;
            --border-light: rgba(255, 255, 255, 0.25);
            --border-subtle: rgba(255, 255, 255, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--sf-pro);
            background: var(--bg-black);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            min-height: 100vh;
        }

        /* ========================================
           HEADER
           ======================================== */

        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-subtle);
        }

        .header-content {
            width: 100%;
            max-width: none;
            margin: 0;
            padding: 20px 80px;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
        }

        .header-logo {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.01em;
            color: var(--text);
            text-decoration: none;
        }
        .mg-g {
            font-size: 1.22em;
            line-height: 1;
            vertical-align: -0.08em;
        }

        .header-logo:hover {
            opacity: 0.8;
        }

        .header-center {
            justify-self: center;
            font-family: var(--mono);
            font-size: 10px;
            letter-spacing: 0.1em;
            color: var(--text-40);
            font-variant-numeric: tabular-nums;
            line-height: 1;
            text-transform: uppercase;
        }

        .header-right {
            display: flex;
            align-items: center;
            justify-self: end;
            gap: 16px;
        }

        .header-updated {
            font-family: var(--sf-pro);
            font-size: 10px;
            letter-spacing: 0.1em;
            color: var(--text-40);
            text-transform: uppercase;
            white-space: nowrap;
            line-height: 1;
        }
        .header-social {
            display: inline-flex;
            align-items: center;
            color: var(--text-60);
            transition: color 0.25s ease;
        }
        .header-social:hover { color: var(--text); }
        .header-social svg { width: 15px; height: 15px; display: block; }
        @media (max-width: 720px) {
            .header-updated { display: none; }
        }

        .header-left {
            display: inline-flex;
            align-items: center;
            gap: 36px;
        }

        .header-nav {
            display: flex;
            gap: 28px;
        }
        .header-nav a {
            font-size: 0.95rem;
            color: var(--text-60);
            text-decoration: none;
            font-weight: 400;
            letter-spacing: -0.005em;
            transition: color 0.3s ease;
            position: relative;
        }
        .header-nav a::before {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 0;
            right: 0;
            height: 1px;
            background: currentColor;
            transform: scaleX(0);
            transform-origin: center;
            transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .header-nav a:hover { color: var(--text); }
        .header-nav a:hover::before,
        .header-nav a.is-current::before { transform: scaleX(1); }
        .header-nav a.is-current { color: var(--text); }

        /* Animated gradient on the "AI slop" nav link — seamless continuous loop */
        .header-nav a[data-i18n="menu.gen"],
        .menu-overlay-link[data-i18n="menu.gen"] {
            background-image: linear-gradient(90deg, #ff7a7a, #ffb347, #ffe66d, #6ee7b7, #67c8ff, #c084fc, #ff7a7a);
            background-size: 200% 100%;
            background-repeat: repeat;
            -webkit-background-clip: text;
                    background-clip: text;
            -webkit-text-fill-color: transparent;
                    color: transparent;
            animation: aislop-gradient 6s linear infinite;
        }
        @keyframes aislop-gradient {
            from { background-position: 0% 50%; }
            to   { background-position: -200% 50%; }
        }
        @media (prefers-reduced-motion: reduce) {
            .header-nav a[data-i18n="menu.gen"],
            .menu-overlay-link[data-i18n="menu.gen"] { animation: none; }
        }

        /* Desktop: show nav links, hide hamburger. Mobile flips it. */
        @media (max-width: 720px) {
            .header-nav { display: none; }
            .header-left { gap: 0; }
        }
        @media (min-width: 721px) {
            .menu-icon { display: none !important; }
        }

        /* Menu Icon */
        .menu-icon {
            width: 29px;
            height: 29px;
            position: relative;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .menu-icon span {
            display: block;
            background: #fff;
            height: 1.5px;
            border-radius: 1px;
            position: absolute;
            left: 3.5px;
            width: 22px;
            transition: all 0.3s ease;
        }

        .menu-icon span:nth-child(1) {
            top: 9px;
        }

        .menu-icon span:nth-child(2) {
            top: 17px;
        }

        .menu-icon:hover span:nth-child(2) {
            width: 14px;
        }

        /* ========================================
           MENU OVERLAY
           ======================================== */

        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            z-index: 1001;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .menu-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .menu-overlay-items {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 32px;
            text-align: center;
        }

        .menu-overlay-link {
            font-family: var(--sf-pro);
            font-size: clamp(2rem, 6vw, 4rem);
            font-weight: 300;
            letter-spacing: -0.02em;
            color: var(--text-60);
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .menu-overlay-link:hover {
            color: var(--text);
            transform: scale(1.05);
        }

        .menu-overlay-cta {
            margin-top: 40px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            align-self: center;
            font-family: var(--sf-pro);
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.01em;
            text-transform: none;
            color: var(--text);
            text-decoration: none;
            width: fit-content;
            min-width: 0;
            padding: 9px 14px;
            border: 1px solid rgba(255, 255, 255, 0.34);
            border-radius: 999px;
            background: transparent;
            transition: all 0.3s ease;
        }

        .menu-overlay-cta:hover {
            background: var(--text);
            border-color: var(--text);
            color: var(--bg-black);
        }

        /* Language toggle in top nav bar */
        .header-lang {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-right: 16px;
            font-family: var(--sf-pro);
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.4);
        }
        .header-lang button {
            background: transparent;
            border: none;
            padding: 2px 3px;
            font: inherit;
            letter-spacing: inherit;
            text-transform: inherit;
            color: rgba(255,255,255,0.4);
            cursor: pointer;
            transition: color 0.25s ease;
        }
        .header-lang button:hover { color: rgba(255,255,255,0.85); }
        .header-lang button.is-active,
        .header-lang button[aria-pressed="true"] {
            color: var(--text);
        }
        .header-lang .ml-sep { opacity: 0.45; }

        .menu-overlay-footer {
            position: absolute;
            bottom: 40px;
            display: flex;
            gap: 40px;
        }

        .menu-overlay-footer a {
            font-family: var(--mono);
            font-size: 10px;
            letter-spacing: 0.1em;
            color: var(--text-40);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .menu-overlay-footer a:hover {
            color: var(--text);
        }

        .menu-close {
            position: absolute;
            top: 20px;
            right: 80px;
            width: 29px;
            height: 29px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .menu-close span {
            display: block;
            background: #fff;
            height: 1.5px;
            border-radius: 1px;
            position: absolute;
            width: 22px;
            transition: all 0.3s ease;
        }

        .menu-close span:nth-child(1) {
            transform: rotate(45deg);
        }

        .menu-close span:nth-child(2) {
            transform: rotate(-45deg);
        }

        /* ========================================
           PAGE CONTENT
           ======================================== */

        .page-content {
            padding-top: 70px;
        }

        /* ========================================
           RESEARCH HERO
           ======================================== */

        .research-hero {
            padding: 100px 80px 80px;
            border-bottom: 1px solid var(--border-subtle);
        }

        .research-hero-label {
            font-family: var(--sf-pro);
            font-size: 11px;
            font-weight: 400;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--text-40);
            margin-bottom: 40px;
        }

        .research-hero-title {
            font-family: var(--sf-pro);
            font-size: clamp(2.5rem, 6vw, 5rem);
            font-weight: 300;
            letter-spacing: -0.03em;
            line-height: 1.05;
            color: var(--text);
            margin-bottom: 48px;
            max-width: 900px;
        }

        .research-hero-meta {
            display: flex;
            gap: 48px;
            align-items: baseline;
        }

        .research-meta-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .research-meta-label {
            font-family: var(--sf-pro);
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--text-40);
        }

        .research-meta-value {
            font-family: var(--mono);
            font-size: 13px;
            letter-spacing: 0.02em;
            color: var(--text-80);
        }

        /* ========================================
           CONTENT AREA (AVAILABLE RESEARCH)
           ======================================== */

        .research-body {
            padding: 80px 80px 0;
            max-width: 1200px;
        }

        .research-description {
            font-family: var(--sf-pro);
            font-size: clamp(1.1rem, 1.8vw, 1.35rem);
            font-weight: 300;
            line-height: 1.7;
            color: var(--text-80);
            max-width: 720px;
            margin-bottom: 64px;
        }

        .research-section-label {
            font-family: var(--sf-pro);
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--text-40);
            margin-bottom: 24px;
        }

        .research-approach {
            font-family: var(--sf-pro);
            font-size: 1rem;
            font-weight: 400;
            line-height: 1.8;
            color: var(--text-60);
            max-width: 720px;
            margin-bottom: 64px;
        }

        .research-tools {
            font-family: var(--mono);
            font-size: 12px;
            letter-spacing: 0.02em;
            color: var(--text-40);
            margin-bottom: 80px;
            padding: 20px 0;
        }

        .research-tools span {
            color: var(--text-60);
        }

        /* Visual placeholder */
        .research-visual {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: linear-gradient(135deg, #0a0a0a 0%, #111111 50%, #0a0a0a 100%);
            border: 1px solid var(--border-subtle);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 0;
            position: relative;
            overflow: hidden;
        }

        .research-visual::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 20% 50%, rgba(255, 255, 255, 0.015) 0%, transparent 50%),
                radial-gradient(circle at 80% 50%, rgba(255, 255, 255, 0.01) 0%, transparent 50%);
        }

        .research-visual-text {
            font-family: var(--mono);
            font-size: 11px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--text-40);
            position: relative;
            z-index: 1;
        }

        /* ========================================
           COMING SOON STATE
           ======================================== */

        .coming-soon-container {
            padding: 120px 80px 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 50vh;
            text-align: center;
        }

        .coming-soon-tag {
            font-family: var(--mono);
            font-size: 13px;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            color: var(--text-40);
            margin-bottom: 24px;
        }

        .coming-soon-subtitle {
            font-family: var(--sf-pro);
            font-size: 1rem;
            font-weight: 300;
            color: var(--text-40);
            max-width: 400px;
            line-height: 1.6;
            margin-bottom: 48px;
        }

        .coming-soon-bar {
            width: 200px;
            height: 1px;
            background: var(--border-subtle);
            position: relative;
            overflow: hidden;
        }

        .coming-soon-bar::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 60%;
            height: 100%;
            background: linear-gradient(90deg, transparent, var(--text-40), transparent);
            animation: barSlide 3s ease-in-out infinite;
        }

        @keyframes barSlide {
            0% { left: -60%; }
            100% { left: 100%; }
        }

        /* ========================================
           FOOTER NAVIGATION
           ======================================== */

        .research-footer-nav {
            padding: 40px 80px 48px;
            border-top: 1px solid var(--border-subtle);
            margin-top: 60px;
        }

        .research-footer-back {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            font-family: var(--mono);
            font-size: 10px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--text-40);
            text-decoration: none;
            transition: color 0.3s ease;
            margin-bottom: 48px;
        }

        .research-footer-back:hover {
            color: var(--text);
        }

        .research-footer-back svg {
            width: 16px;
            height: 16px;
            transition: transform 0.3s ease;
        }

        .research-footer-back:hover svg {
            transform: translateX(-4px);
        }

        .research-prevnext {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            padding-top: 40px;
            border-top: 1px solid var(--border-subtle);
        }

        .research-prevnext-item {
            text-decoration: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 24px 0;
            transition: opacity 0.3s ease;
        }

        .research-prevnext-item:hover {
            opacity: 0.7;
        }

        .research-prevnext-item.next {
            text-align: right;
            align-items: flex-end;
        }

        .research-prevnext-label {
            font-family: var(--mono);
            font-size: 10px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--text-40);
        }

        .research-prevnext-title {
            font-family: var(--sf-pro);
            font-size: 1.2rem;
            font-weight: 300;
            letter-spacing: -0.01em;
            color: var(--text-80);
        }

        .research-prevnext-placeholder {
            visibility: hidden;
        }

        /* ========================================
           NOT FOUND STATE
           ======================================== */

        .not-found {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            text-align: center;
            padding: 80px;
        }

        .not-found-code {
            font-family: var(--mono);
            font-size: 80px;
            font-weight: 300;
            letter-spacing: -0.02em;
            color: var(--text-40);
            line-height: 1;
            margin-bottom: 16px;
        }

        .not-found-text {
            font-family: var(--mono);
            font-size: 11px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--text-40);
            margin-bottom: 40px;
        }

        .not-found-link {
            font-family: var(--mono);
            font-size: 10px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--text-60);
            text-decoration: none;
            padding: 12px 24px;
            border: 1px solid var(--border-light);
            transition: all 0.3s ease;
        }

        .not-found-link:hover {
            background: var(--text);
            color: var(--bg-black);
        }

        /* ========================================
           PAGE ENTER ANIMATION
           ======================================== */

        .fade-in {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.8s ease forwards;
        }

        .fade-in-delay-1 { animation-delay: 0.1s; }
        .fade-in-delay-2 { animation-delay: 0.2s; }
        .fade-in-delay-3 { animation-delay: 0.35s; }
        .fade-in-delay-4 { animation-delay: 0.5s; }
        .fade-in-delay-5 { animation-delay: 0.65s; }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ========================================
           RESPONSIVE
           ======================================== */

        @media (max-width: 1024px) {
            .header-content {
                padding: 20px 40px;
            }
            .research-hero {
                padding: 80px 40px 60px;
            }
            .research-body {
                padding: 60px 40px 0;
            }
            .coming-soon-container {
                padding: 100px 40px 60px;
            }
            .research-footer-nav {
                padding: 60px 40px;
            }
            .menu-close {
                right: 40px;
            }
        }

        @media (max-width: 768px) {
            .header-content {
                padding: 16px 24px;
            }
            .research-hero {
                padding: 60px 24px 48px;
            }
            .research-hero-title {
                font-size: clamp(2rem, 8vw, 3rem);
            }
            .research-hero-meta {
                flex-direction: column;
                gap: 24px;
            }
            .research-body {
                padding: 48px 24px 0;
            }
            .coming-soon-container {
                padding: 80px 24px 60px;
            }
            .research-footer-nav {
                padding: 48px 24px;
            }
            .research-prevnext {
                grid-template-columns: 1fr;
                gap: 0;
            }
            .research-prevnext-item.next {
                text-align: left;
                align-items: flex-start;
                border-top: 1px solid var(--border-subtle);
            }
            .menu-close {
                right: 24px;
            }
        }

        @media (max-width: 480px) {
            .header-content {
                padding: 14px 16px;
            }
            .research-hero {
                padding: 48px 16px 40px;
            }
            .research-body {
                padding: 40px 16px 0;
            }
            .coming-soon-container {
                padding: 64px 16px 48px;
            }
            .research-footer-nav {
                padding: 40px 16px;
            }
        }
    </style>
</head>
<body>

    <!-- ========================================
         NAVIGATION HEADER
         ======================================== -->
    <header class="header">
        <div class="header-content">
            <div class="header-left">
                <a href="/" class="header-logo">M<span class="mg-g">Ⓖ</span></a>
                <nav class="header-nav">
                    <a href="/#work" data-i18n="menu.work">Work</a>
                    <a href="/#motion" data-i18n="menu.motion">Motion Design</a>
                    <a href="/#research" data-i18n="menu.research">Research</a>
                    <a href="/#about" data-i18n="menu.about" hidden style="display:none">About</a>
                    <a href="/gen-studio.html" data-i18n="menu.gen">AI slop</a>
                </nav>
            </div>
            <div class="header-center" id="gmtTime">GMT 00:00</div>
            <div class="header-right">
                <span class="header-updated" data-i18n="nav.lastUpdated">Last updated · February 2026</span>
                <div class="header-lang" role="group" aria-label="Language">
                    <button type="button" data-i18n-toggle="en" aria-pressed="true">EN</button>
                    <span class="ml-sep" aria-hidden="true">/</span>
                    <button type="button" data-i18n-toggle="pt" aria-pressed="false">PT</button>
                </div>
                <div class="menu-icon" id="hamburger">
                    <span></span>
                    <span></span>
                </div>
                <a class="header-social" href="https://linkedin.com/in/pedraw" target="_blank" rel="noopener" aria-label="LinkedIn">
                    <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M20.45 20.45h-3.56v-5.57c0-1.33-.03-3.04-1.85-3.04-1.86 0-2.14 1.45-2.14 2.94v5.67H9.35V9h3.41v1.56h.05c.48-.9 1.64-1.85 3.37-1.85 3.6 0 4.27 2.37 4.27 5.46v6.28zM5.34 7.43a2.06 2.06 0 110-4.13 2.06 2.06 0 010 4.13zm1.78 13.02H3.55V9h3.57v11.45zM22.22 0H1.77C.79 0 0 .77 0 1.73v20.54C0 23.23.79 24 1.77 24h20.45c.98 0 1.78-.77 1.78-1.73V1.73C24 .77 23.2 0 22.22 0z"/></svg>
                </a>
            </div>
        </div>
    </header>

    <!-- Menu Overlay -->
    <div class="menu-overlay" id="menuOverlay">
        <div class="menu-close" id="menuClose">
            <span></span>
            <span></span>
        </div>
        <div class="menu-overlay-items">
            <a href="/#work" class="menu-overlay-link" data-i18n="menu.work">Work</a>
            <a href="/#motion" class="menu-overlay-link" data-i18n="menu.motion">Motion Design</a>
            <a href="/#research" class="menu-overlay-link" data-i18n="menu.research">Research</a>
            <a href="/#about" class="menu-overlay-link" data-i18n="menu.about" hidden style="display:none">About</a>
            <a href="/gen-studio.html" class="menu-overlay-link" data-i18n="menu.gen">AI slop</a>
            <a href="/dashboard/" class="menu-overlay-link" data-i18n="menu.dashboard">Dashboard</a>
            <a href="mailto:hi@motagomes.com" class="menu-overlay-cta" data-i18n="menu.letstalk">Let's Talk</a>
        </div>
        <div class="menu-overlay-footer">
            <a href="mailto:hi@motagomes.com" data-i18n="about.emailAria">Email</a>
            <a href="https://linkedin.com/in/pedraw" target="_blank" rel="noopener">LinkedIn</a>
        </div>
    </div>

    <!-- ========================================
         PAGE CONTENT (populated by JS)
         ======================================== -->
    <main class="page-content" id="pageContent"></main>

    <script>
    (function () {
        // ============================
        // RESEARCH DATA
        // ============================
        const RESEARCH = {
            'watch-faces': {
                title: 'Interactive Watch Faces',
                tech: 'Swift / SwiftUI / ClockKit',
                year: '2025',
                available: false
            },
            'building-this-site': {
                title: 'Building This Portfolio',
                tech: 'HTML / CSS / JS / AI Workflows',
                year: '2025',
                available: true,
                description: "I'm a designer who's picked up code, not a developer by trade. Comfortable enough to break things and piece them back together. This site is the proof of that. I built it with creative directors and design managers in mind \u2014 no buried PDFs, no fiddly navigation. Just work, presented clearly, fast to load, and easy to scan on any screen.",
                approach: "A lot of what sits under the surface is me experimenting. I've been leaning into AI workflows quite heavily, using tools like Claude to accelerate the build, debug layout quirks, and learn as I go. Some evenings I'd fall asleep mid-prompt, pick it up the next morning, and carry on exactly where I left off. It's genuinely changed how I learn: iterate, break, fix, ship. Not everything here will make the final cut. Some bits are rough, some are overbuilt, and that's the point. This portfolio is alive, always evolving, much like the work inside it.",
                tools: 'HTML, CSS, Vanilla JS, Claude AI, Cursor, Netlify, GitHub'
            },
            'neural-network-viz': {
                title: 'Neural Network Visualization',
                tech: 'D3.js / Python',
                year: '2025',
                available: true,
                description: 'Interactive visualization of neural network architectures and training processes. The tool makes abstract machine learning concepts tangible through real-time data flow animations.',
                approach: 'Built with D3.js for the visualization layer and Python for data processing. The system ingests training logs and generates animated force-directed graphs showing how weights and activations change during training. Color-coded pathways illustrate information flow, while interactive controls let users pause, rewind, and explore specific layers.',
                tools: 'D3.js, Python, TensorFlow.js, Canvas API'
            },
            'audio-reactive-shaders': {
                title: 'Why AI slop exists',
                tech: 'GLSL / WebGL',
                year: '2024',
                available: true,
                description: 'Real-time visual compositions driven by audio analysis. Custom GLSL fragment shaders respond to frequency, amplitude, and rhythm, creating unique visual identities for any audio input.',
                approach: 'The Web Audio API performs real-time FFT analysis, decomposing audio into frequency bins. These values are passed as uniforms to GLSL shaders that transform them into visual parameters \u2014 color shifts, geometric distortions, particle behaviors. Each shader program is designed as a visual instrument, where the audio becomes the performer.',
                tools: 'WebGL, GLSL, Web Audio API, FFT Analysis'
            },
            'raymarching': {
                title: 'Raymarching Experiments',
                tech: 'Pure CSS / HTML',
                year: '2024',
                available: false
            },
            'generative-typography': {
                title: 'Generative Typography',
                tech: 'Canvas / JavaScript',
                year: '2024',
                available: false
            },
            'fluid-simulations': {
                title: 'Fluid Simulations',
                tech: 'WebGL / GLSL',
                year: '2023',
                available: false
            }
        };

        const SLUGS = Object.keys(RESEARCH);

        // ============================
        // GMT CLOCK
        // ============================
        function updateGMT() {
            const el = document.getElementById('gmtTime');
            if (!el) return;
            const now = new Date();
            const h = String(now.getUTCHours()).padStart(2, '0');
            const m = String(now.getUTCMinutes()).padStart(2, '0');
            el.textContent = 'GMT ' + h + ':' + m;
        }
        updateGMT();
        setInterval(updateGMT, 10000);

        // ============================
        // MENU TOGGLE
        // ============================
        const hamburger = document.getElementById('hamburger');
        const menuOverlay = document.getElementById('menuOverlay');
        const menuClose = document.getElementById('menuClose');

        hamburger.addEventListener('click', function () {
            menuOverlay.classList.add('active');
        });
        menuClose.addEventListener('click', function () {
            menuOverlay.classList.remove('active');
        });

        var menuLinks = document.querySelectorAll('.menu-overlay-link, .menu-overlay-cta');
        menuLinks.forEach(function (link) {
            link.addEventListener('click', function () {
                menuOverlay.classList.remove('active');
            });
        });

        // ============================
        // ROUTER
        // ============================
        const params = new URLSearchParams(window.location.search);
        const slug = params.get('r');
        const container = document.getElementById('pageContent');

        function tr(k) { return window.MGI18n ? window.MGI18n.t(k) : k; }

        function renderCurrent() {
            if (!slug || !RESEARCH[slug]) {
                renderNotFound();
            } else {
                const data = RESEARCH[slug];
                document.title = data.title + ' \u2014 ' + tr('meta.title.research').split(' — ')[0] + ' \u2014 Pedro Gomes';
                if (data.available) {
                    renderAvailable(data, slug);
                } else {
                    renderComingSoon(data, slug);
                }
            }
            if (window.MGI18n) window.MGI18n.apply(container);
        }
        renderCurrent();
        document.addEventListener('i18n:languagechange', renderCurrent);

        // ============================
        // RENDER: AVAILABLE RESEARCH
        // ============================
        function renderAvailable(data, slug) {
            var prevNext = getPrevNext(slug);
            container.innerHTML =
                '<section class="research-hero">' +
                    '<div class="research-hero-label fade-in" data-i18n="research.eyebrow">' + escHtml(tr('research.eyebrow')) + '</div>' +
                    '<h1 class="research-hero-title fade-in fade-in-delay-1">' + escHtml(data.title) + '</h1>' +
                    '<div class="research-hero-meta fade-in fade-in-delay-2">' +
                        '<div class="research-meta-item">' +
                            '<span class="research-meta-label" data-i18n="research.label.tech">' + escHtml(tr('research.label.tech')) + '</span>' +
                            '<span class="research-meta-value">' + escHtml(data.tech) + '</span>' +
                        '</div>' +
                        '<div class="research-meta-item">' +
                            '<span class="research-meta-label" data-i18n="research.label.year">' + escHtml(tr('research.label.year')) + '</span>' +
                            '<span class="research-meta-value">' + escHtml(data.year) + '</span>' +
                        '</div>' +
                        (data.tools ? (
                            '<div class="research-meta-item">' +
                                '<span class="research-meta-label" data-i18n="research.label.tools">' + escHtml(tr('research.label.tools')) + '</span>' +
                                '<span class="research-meta-value">' + escHtml(data.tools) + '</span>' +
                            '</div>'
                        ) : '') +
                    '</div>' +
                '</section>' +

                '<section class="research-body">' +
                    '<p class="research-description fade-in fade-in-delay-3">' + escHtml(data.description) + '</p>' +
                    '<div class="research-section-label fade-in fade-in-delay-3" data-i18n="research.approach">' + escHtml(tr('research.approach')) + '</div>' +
                    '<p class="research-approach fade-in fade-in-delay-4">' + escHtml(data.approach) + '</p>' +
                    '<div class="research-tools fade-in fade-in-delay-4"><span data-i18n="research.builtWith">' + escHtml(tr('research.builtWith')) + '</span> ' + escHtml(data.tools) + '</div>' +
                    '<div class="research-visual fade-in fade-in-delay-5">' +
                        '<span class="research-visual-text" data-i18n="research.vizSoon">' + escHtml(tr('research.vizSoon')) + '</span>' +
                    '</div>' +
                '</section>' +

                renderFooterNav(prevNext);
        }

        // ============================
        // RENDER: COMING SOON
        // ============================
        function renderComingSoon(data, slug) {
            var prevNext = getPrevNext(slug);
            container.innerHTML =
                '<section class="research-hero">' +
                    '<div class="research-hero-label fade-in" data-i18n="research.eyebrow">' + escHtml(tr('research.eyebrow')) + '</div>' +
                    '<h1 class="research-hero-title fade-in fade-in-delay-1">' + escHtml(data.title) + '</h1>' +
                    '<div class="research-hero-meta fade-in fade-in-delay-2">' +
                        '<div class="research-meta-item">' +
                            '<span class="research-meta-label" data-i18n="research.label.tech">' + escHtml(tr('research.label.tech')) + '</span>' +
                            '<span class="research-meta-value">' + escHtml(data.tech) + '</span>' +
                        '</div>' +
                        '<div class="research-meta-item">' +
                            '<span class="research-meta-label" data-i18n="research.label.year">' + escHtml(tr('research.label.year')) + '</span>' +
                            '<span class="research-meta-value">' + escHtml(data.year) + '</span>' +
                        '</div>' +
                    '</div>' +
                '</section>' +

                '<section class="coming-soon-container fade-in fade-in-delay-3">' +
                    '<div class="coming-soon-tag" data-i18n="research.csTag">' + escHtml(tr('research.csTag')) + '</div>' +
                    '<p class="coming-soon-subtitle" data-i18n="research.csSub">' + escHtml(tr('research.csSub')) + '</p>' +
                    '<div class="coming-soon-bar"></div>' +
                '</section>' +

                renderFooterNav(prevNext);
        }

        // ============================
        // RENDER: NOT FOUND
        // ============================
        function renderNotFound() {
            container.innerHTML =
                '<div class="not-found">' +
                    '<div class="not-found-code" data-i18n="research.nfCode">' + escHtml(tr('research.nfCode')) + '</div>' +
                    '<div class="not-found-text" data-i18n="research.nfText">' + escHtml(tr('research.nfText')) + '</div>' +
                    '<a href="/#research" class="not-found-link" data-i18n="research.nfBack">' + escHtml(tr('research.nfBack')) + '</a>' +
                '</div>';
        }

        // ============================
        // RENDER: FOOTER NAV
        // ============================
        function renderFooterNav(prevNext) {
            var html = '<nav class="research-footer-nav">' +
                '<a href="/#research" class="research-footer-back">' +
                    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">' +
                        '<line x1="19" y1="12" x2="5" y2="12"></line>' +
                        '<polyline points="12 19 5 12 12 5"></polyline>' +
                    '</svg>' +
                    '<span data-i18n="research.allResearch">' + escHtml(tr('research.allResearch')) + '</span>' +
                '</a>' +
                '<div class="research-prevnext">';

            if (prevNext.prev) {
                html += '<a href="/research.html?r=' + prevNext.prev.slug + '" class="research-prevnext-item prev">' +
                    '<span class="research-prevnext-label" data-i18n="research.prev">' + escHtml(tr('research.prev')) + '</span>' +
                    '<span class="research-prevnext-title">' + escHtml(prevNext.prev.title) + '</span>' +
                '</a>';
            } else {
                html += '<div class="research-prevnext-placeholder"></div>';
            }

            if (prevNext.next) {
                html += '<a href="/research.html?r=' + prevNext.next.slug + '" class="research-prevnext-item next">' +
                    '<span class="research-prevnext-label" data-i18n="research.next">' + escHtml(tr('research.next')) + '</span>' +
                    '<span class="research-prevnext-title">' + escHtml(prevNext.next.title) + '</span>' +
                '</a>';
            } else {
                html += '<div class="research-prevnext-placeholder"></div>';
            }

            html += '</div></nav>';
            return html;
        }

        // ============================
        // HELPERS
        // ============================
        function getPrevNext(slug) {
            var idx = SLUGS.indexOf(slug);
            var prev = idx > 0 ? { slug: SLUGS[idx - 1], title: RESEARCH[SLUGS[idx - 1]].title } : null;
            var next = idx < SLUGS.length - 1 ? { slug: SLUGS[idx + 1], title: RESEARCH[SLUGS[idx + 1]].title } : null;
            return { prev: prev, next: next };
        }

        function escHtml(str) {
            if (!str) return '';
            var d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }
    })();
    </script>
</body>
</html>
