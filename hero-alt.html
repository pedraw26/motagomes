<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mota Gomes — Hero (alt · B&W)</title>
<style>
    /* =============================================================
       HERO (ALT) — monochrome, rings pulse outward from the CTA.
       This pass fixes the alignment by putting the rings AND the CTA
       inside one shared .ring-group with grid-place-items:center —
       so they share the exact same visual centre and any responsive
       resizing keeps them locked together.
       ============================================================= */
    :root {
        --bg:         #050505;
        --ink:        #ffffff;
        --muted:      rgba(255,255,255,0.62);
        --glass-line: rgba(255,255,255,0.14);
        --sf: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
        background: var(--bg);
        color: var(--ink);
        font-family: var(--sf);
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
    }

    /* ─── Background light wash ───────────────────────────────── */
    .hero {
        position: relative;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        isolation: isolate;
        transition: transform 0.65s cubic-bezier(0.7, 0, 0.2, 1),
                    opacity    0.55s ease;
        will-change: transform, opacity;
    }
    /* Leaving state — hero slides down out of the viewport, revealing
       the next page behind it. Set when the CTA is clicked. */
    .hero.is-leaving {
        transform: translateY(100vh);
        opacity: 0;
    }

    /* Arrival state — hero starts slightly below + invisible on load,
       then settles in. Gives the page-in transition on return visits. */
    @keyframes heroArrive {
        from { transform: translateY(24px); opacity: 0; }
        to   { transform: translateY(0);    opacity: 1; }
    }
    .hero { animation: heroArrive 0.7s cubic-bezier(0.22, 1, 0.36, 1); }

    /* Under-layer that flashes through as the hero slides — the black
       next-page the user is heading toward. Just a solid fill for now. */
    .under {
        position: fixed;
        inset: 0;
        background: #050505;
        z-index: -3;
        pointer-events: none;
    }
    .hero::before {
        content: "";
        position: absolute;
        inset: -20% -10% 40% -10%;
        background: radial-gradient(ellipse 70% 60% at 50% 0%,
            rgba(255,255,255,0.28) 0%,
            rgba(255,255,255,0.10) 40%,
            transparent 72%);
        filter: blur(40px);
        z-index: -2;
    }
    .hero::after {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(ellipse at 50% 70%,
            rgba(255,255,255,0.12) 0%,
            transparent 55%);
        filter: blur(30px);
        z-index: -2;
    }
    .light-ray {
        position: absolute;
        top: -80px;
        left: 50%;
        width: 420px;
        height: 60%;
        transform: translateX(-50%);
        background: linear-gradient(to bottom,
            rgba(255,255,255,0.22) 0%,
            rgba(255,255,255,0.08) 35%,
            transparent 70%);
        filter: blur(24px);
        pointer-events: none;
        z-index: -1;
    }

    /* ─── NAV ─────────────────────────────────────────────────── */
    .nav {
        position: relative;
        padding: 26px 40px;
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        z-index: 10;
    }
    .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        color: var(--ink);
        font-weight: 600;
        font-size: 17px;
        letter-spacing: -0.01em;
    }
    .brand-mark {
        width: 26px;
        height: 26px;
        border: 1.8px solid var(--ink);
        border-radius: 6px;
        display: grid; place-items: center;
    }
    .brand-mark::before {
        content: "";
        width: 6px; height: 6px;
        border: 1.5px solid var(--ink);
        border-radius: 50%;
    }

    .nav-pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px;
        background: rgba(255,255,255,0.05);
        border: 1px solid var(--glass-line);
        border-radius: 999px;
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        box-shadow:
            inset 0 1px 0 rgba(255,255,255,0.08),
            0 10px 30px -10px rgba(0,0,0,0.5);
    }
    .nav-pill a {
        padding: 10px 22px;
        border-radius: 999px;
        font-size: 14px;
        font-weight: 500;
        color: var(--muted);
        text-decoration: none;
        transition: background 0.25s ease, color 0.25s ease;
    }
    .nav-pill a:hover { color: var(--ink); }
    .nav-pill a.active {
        background: rgba(255,255,255,0.14);
        color: var(--ink);
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.16);
    }

    .cta-top {
        justify-self: end;
        padding: 11px 22px;
        border-radius: 999px;
        background: #ffffff;
        color: #050505;
        font-weight: 600;
        font-size: 14px;
        text-decoration: none;
        box-shadow:
            0 10px 24px -6px rgba(255,255,255,0.25),
            inset 0 1px 0 rgba(255,255,255,0.8);
        transition: transform 0.25s ease, box-shadow 0.25s ease;
    }
    .cta-top:hover { transform: translateY(-1px); box-shadow: 0 14px 28px -6px rgba(255,255,255,0.35); }

    /* ─── STAGE ─────────────────────────────────────────────── */
    .stage {
        flex: 1;
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 64px 20px 0;
    }
    /* Signature in place of a headline */
    .signature {
        position: relative;
        z-index: 5;
        width: clamp(280px, 46vw, 620px);
        margin: 0 auto;
        color: #ffffff;
        filter: drop-shadow(0 0 28px rgba(255,255,255,0.22));
    }
    .signature svg { width: 100%; height: auto; display: block; }
    .signature svg path { fill: currentColor; }

    /* ─── RING GROUP
       Rings now use `inset` with an equal pixel gap on every side, so
       the spacing reads the same top/bottom/left/right. --gap scales
       with viewport via clamp(). ────────────────────────────────── */
    .ring-group {
        position: relative;
        margin-top: 60px;
        width: clamp(760px, 92vw, 1400px);
        aspect-ratio: 2.6 / 1;            /* taller so 4 insets still leave a proper moat */
        max-width: 100%;
        z-index: 1;
        --gap: clamp(22px, 3.2vw, 46px);  /* equal spacing all around — tuned so r5 stays stadium-shaped */
    }
    .ring {
        position: absolute;
        border-radius: 999px;
        background:
            radial-gradient(ellipse at 50% 50%,
                rgba(255,255,255,0.10) 0%,
                rgba(255,255,255,0.03) 45%,
                transparent 70%);
        box-shadow:
            inset 0 0 40px rgba(255,255,255,0.12),
            inset 0 0 0 1px rgba(255,255,255,0.10);
        transform-origin: center;
        will-change: transform, opacity;
    }

    /* Each ring is the same equal --gap tighter than the one outside it. */
    .ring.r1 { inset: 0;                            animation: ripple 3.6s ease-in-out infinite; }
    .ring.r2 { inset: calc(var(--gap) * 1);         animation: ripple 3.6s ease-in-out infinite; animation-delay: 0.45s; }
    .ring.r3 { inset: calc(var(--gap) * 2);         animation: ripple 3.6s ease-in-out infinite; animation-delay: 0.9s;  }
    .ring.r4 { inset: calc(var(--gap) * 3);
        background: radial-gradient(ellipse at 50% 50%,
            rgba(255,255,255,0.32) 0%,
            rgba(255,255,255,0.10) 50%,
            transparent 80%);
        box-shadow:
            inset 0 0 50px rgba(255,255,255,0.18),
            inset 0 0 0 1px rgba(255,255,255,0.14);
        animation: ripple-bright 3.6s ease-in-out infinite; animation-delay: 1.35s;
    }
    .ring.r5 {                            /* the static dark "moat"        */
        inset: calc(var(--gap) * 4);
        background: #050505;
        box-shadow:
            inset 0 0 24px rgba(255,255,255,0.14),
            0 0 0 1px rgba(255,255,255,0.25),
            0 0 60px rgba(255,255,255,0.12);
    }

    /* Ripple = vanish → peak → vanish again, gently growing outward.
       Transform origin is naturally centered because the ring is
       placed via `inset`, not via translate. */
    @keyframes ripple {
        0%   { transform: scale(0.97); opacity: 0;    }
        20%  { opacity: 0.55; }
        50%  { transform: scale(1.02); opacity: 0.75; }
        80%  { opacity: 0.35; }
        100% { transform: scale(1.06); opacity: 0;    }
    }
    @keyframes ripple-bright {
        0%   { transform: scale(0.97); opacity: 0; }
        20%  { opacity: 0.8; }
        50%  { transform: scale(1.02); opacity: 1; }
        80%  { opacity: 0.55; }
        100% { transform: scale(1.06); opacity: 0; }
    }
    @media (prefers-reduced-motion: reduce) {
        .ring { animation: none !important; }
    }

    /* ─── CTA — sits inside the same .ring-group, centred ─── */
    .cta-core {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        padding: 20px 48px;
        background: #050505;
        color: var(--muted);
        font-size: 22px;
        font-weight: 400;
        border-radius: 999px;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 18px;
        box-shadow:
            inset 0 0 24px rgba(255,255,255,0.08),
            0 0 0 1px rgba(255,255,255,0.35),
            0 18px 40px -10px rgba(255,255,255,0.18);
        z-index: 6;
        transition: color 0.3s ease, transform 0.3s cubic-bezier(0.22,1,0.36,1);
        white-space: nowrap;
    }
    .cta-core:hover {
        color: var(--ink);
        transform: translate(-50%, calc(-50% - 2px));
    }
    .cta-core .arrow {
        width: 34px; height: 34px;
        border: 1.5px solid rgba(255,255,255,0.55);
        border-radius: 50%;
        display: grid; place-items: center;
        transition: border-color 0.3s ease, transform 0.3s ease;
    }
    .cta-core:hover .arrow { border-color: var(--ink); transform: translateX(3px); }
    .cta-core .arrow svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 1.8; }

    /* ─── PARTICLES ─────────────────────────────────────── */
    .particle {
        position: absolute;
        width: 6px; height: 6px;
        border-radius: 50%;
        background: radial-gradient(circle at 30% 30%, #ffffff, rgba(255,255,255,0.4) 70%);
        box-shadow: 0 0 12px rgba(255,255,255,0.5);
        z-index: 4;
        animation: float 6s ease-in-out infinite;
    }
    .particle.p1 { left: 6%;   bottom: 30%; animation-delay: 0s;   }
    .particle.p2 { left: 94%;  bottom: 55%; animation-delay: 1.2s; width: 5px; height: 5px; }
    .particle.p3 { left: 14%;  bottom: 65%; animation-delay: 2.1s; }
    .particle.p4 { left: 86%;  bottom: 18%; animation-delay: 0.6s; }
    .particle.p5 { left: 50%;  bottom: 72%; animation-delay: 3s;   width: 4px; height: 4px; opacity: 0.8; }
    @keyframes float {
        0%, 100% { transform: translateY(0) scale(1); opacity: 0.9; }
        50%      { transform: translateY(-12px) scale(1.1); opacity: 1; }
    }

    /* ─── RESPONSIVE ─────────────────────────────────────── */
    @media (max-width: 720px) {
        .nav { padding: 18px 20px; grid-template-columns: auto 1fr auto; gap: 12px; }
        .nav-pill { display: none; }
        .cta-top { padding: 9px 16px; font-size: 13px; }
        .stage { padding: 40px 20px 0; }
        .ring-group { margin-top: 40px; aspect-ratio: 2.2 / 1; --gap: clamp(16px, 3vw, 28px); }
        .cta-core { padding: 14px 24px; font-size: 15px; gap: 10px; }
        .cta-core .arrow { width: 26px; height: 26px; }
        .brand { font-size: 15px; }
    }
</style>
</head>

<!-- Solid under-layer so the slide-down reveals darkness, not a white flash -->
<div class="under" aria-hidden="true"></div>

<script>
    // Click the CTA (or any nav pill link) → play the slide-down then
    // navigate to portfolio.html. Internal hash-only on the destination
    // is preserved. Held CMD/CTRL-click or middle-click opens in a new
    // tab without hijacking.
    (function () {
        var hero = document.querySelector('.hero');
        if (!hero) return;

        function animateAwayThenNavigate(href) {
            hero.classList.add('is-leaving');
            // Match the CSS transition duration
            setTimeout(function () { window.location.href = href; }, 620);
        }

        document.querySelectorAll('a.cta-core, .nav-pill a').forEach(function (a) {
            a.addEventListener('click', function (e) {
                if (e.metaKey || e.ctrlKey || e.shiftKey || e.button === 1) return; // new tab / background
                var href = a.getAttribute('href');
                if (!href || href.indexOf('mailto:') === 0 || href.charAt(0) === '#') return;
                e.preventDefault();
                animateAwayThenNavigate(href);
            });
        });

        // If the user comes back via the back button, the cached page
        // might still have the .is-leaving class. Clear it on pageshow.
        window.addEventListener('pageshow', function () { hero.classList.remove('is-leaving'); });
    })();
</script>
