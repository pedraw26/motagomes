<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OneX — Brand Guidelines</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    height: 100%;
    background: #e9e8e3;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  /* Fixed 1366×640 canvas — JS scales to fit any viewport */
  .page {
    width: 1366px;
    height: 640px;
    background: #e9e8e3;
    padding: 88px 104px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0 80px;
    align-items: start;
    transform-origin: top left;
    position: absolute;
    top: 0; left: 0;
  }

  /* ── Section header ── */
  .section-label {
    font-size: 13px;
    font-weight: 400;
    color: #b2b0aa;
    letter-spacing: 0.01em;
    margin-bottom: 10px;
    opacity: 0;
  }

  .section-rule {
    border: none;
    border-top: 1px solid #c8c7c1;
    margin-bottom: 48px;
    transform-origin: left center;
    opacity: 0;
  }

  /* ── Font ── */
  .font-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0 32px;
  }

  .specimen-aa {
    font-size: 128px;
    line-height: 1;
    color: #1c1c1c;
    margin-bottom: 26px;
    letter-spacing: -0.02em;
    opacity: 0;
  }

  .specimen-aa--bold  { font-weight: 800; }
  .specimen-aa--light { font-weight: 300; }

  .specimen-name {
    font-size: 18px;
    color: #1c1c1c;
    margin-bottom: 9px;
    line-height: 1.3;
    white-space: nowrap;
    opacity: 0;
  }

  .specimen-name--bold  { font-weight: 700; }
  .specimen-name--light { font-weight: 400; }

  .specimen-alpha {
    font-size: 10px;
    color: #1c1c1c;
    letter-spacing: 0.07em;
    line-height: 2.1;
    white-space: nowrap;
    opacity: 0;
  }

  .specimen-alpha--bold  { font-weight: 700; }
  .specimen-alpha--light { font-weight: 400; }

  /* ── Colours ── */
  .colour-grid {
    display: flex;
    gap: 14px;
    align-items: flex-start;
  }

  .swatch-col { display: flex; flex-direction: column; isolation: isolate; }

  .swatch {
    width: 108px;
    height: 108px;
    border-radius: 50%;
    margin-top: -44px;
    flex-shrink: 0;
    opacity: 0;
    mix-blend-mode: darken;
  }

  .swatch:first-child { margin-top: 0; }

  .g1 { background: #485b45; }
  .g2 { background: #6e7f6a; }
  .g3 { background: #98a896; }
  .g4 { background: #c2cdc0; }

  .o1 { background: #c96b28; }
  .o2 { background: #db9469; }
  .o3 { background: #e9bc9f; }
  .o4 { background: #f4dece; }

  .d1 { background: #1c1c1c; }
  .d2 { background: #5a5a5a; }
  .d3 { background: #9a9a9a; }
  .d4 { background: #cecece; }

  .w1 { background: #f0efeb; border: 1.5px solid #c0bfba; }

  /* ── Keyframes ── */
  @keyframes fade-up {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes punch-in {
    from { opacity: 0; transform: scale(1.07); }
    to   { opacity: 1; transform: scale(1); }
  }

  @keyframes float-in {
    from { opacity: 0; transform: translateY(-10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes rule-draw {
    from { opacity: 1; transform: scaleX(0); }
    to   { opacity: 1; transform: scaleX(1); }
  }

  @keyframes circle-drop {
    from { opacity: 0; transform: translateY(-22px) scale(0.88); }
    to   { opacity: 1; transform: translateY(0)   scale(1); }
  }
</style>
</head>
<body>

<div class="page" id="page">

  <!-- Font -->
  <section>
    <p class="section-label">Font</p>
    <hr class="section-rule" id="rule-font">

    <div class="font-grid">
      <div>
        <div class="specimen-aa specimen-aa--bold">Aa</div>
        <p class="specimen-name specimen-name--bold">Helvetica Neue Bold</p>
        <p class="specimen-alpha specimen-alpha--bold">ABCDEFGHIJKLMNOPQRSTUVWXYZ</p>
        <p class="specimen-alpha specimen-alpha--bold">abcdefghijklmnopqrstuvwxyz</p>
      </div>
      <div>
        <div class="specimen-aa specimen-aa--light">Aa</div>
        <p class="specimen-name specimen-name--light">Helvetica Neue Regular</p>
        <p class="specimen-alpha specimen-alpha--light">ABCDEFGHIJKLMNOPQRSTUVWXYZ</p>
        <p class="specimen-alpha specimen-alpha--light">abcdefghijklmnopqrstuvwxyz</p>
      </div>
    </div>
  </section>

  <!-- Colours -->
  <section>
    <p class="section-label">Colours</p>
    <hr class="section-rule" id="rule-colours">

    <div class="colour-grid">
      <div class="swatch-col">
        <div class="swatch g1"></div>
        <div class="swatch g2"></div>
        <div class="swatch g3"></div>
        <div class="swatch g4"></div>
      </div>
      <div class="swatch-col">
        <div class="swatch o1"></div>
        <div class="swatch o2"></div>
        <div class="swatch o3"></div>
        <div class="swatch o4"></div>
      </div>
      <div class="swatch-col">
        <div class="swatch d1"></div>
        <div class="swatch d2"></div>
        <div class="swatch d3"></div>
        <div class="swatch d4"></div>
      </div>
      <div class="swatch-col">
        <div class="swatch w1"></div>
      </div>
    </div>
  </section>

</div>

<script>
  // ── Viewport scaling ──────────────────────────────
  const PAGE_W = 1366, PAGE_H = 640;
  const page = document.getElementById('page');

  function fit() {
    const s = Math.min(window.innerWidth / PAGE_W, window.innerHeight / PAGE_H);
    const x = (window.innerWidth  - PAGE_W * s) / 2;
    const y = (window.innerHeight - PAGE_H * s) / 2;
    page.style.transform = `translate(${x}px, ${y}px) scale(${s})`;
  }
  fit();
  window.addEventListener('resize', fit);

  // ── Animation sequence ────────────────────────────
  const smooth  = 'cubic-bezier(0.16, 1, 0.3, 1)';
  const spring  = 'cubic-bezier(0.22, 1.2, 0.36, 1)';

  function anim(el, kf, dur, delay, ease) {
    if (!el) return;
    el.style.animation = `${kf} ${dur}s ${ease || smooth} ${delay}s both`;
  }

  function startAnimation() {
    const alphas = document.querySelectorAll('.specimen-alpha');

    // Labels — both at once
    document.querySelectorAll('.section-label').forEach(el =>
      anim(el, 'fade-up', 0.4, 0)
    );

    // Rules draw simultaneously
    anim(document.getElementById('rule-font'),    'rule-draw', 0.55, 0.12);
    anim(document.getElementById('rule-colours'), 'rule-draw', 0.55, 0.12);

    // Bold Aa punches in
    anim(document.querySelector('.specimen-aa--bold'),  'punch-in', 0.5, 0.42);

    // Regular Aa floats in
    anim(document.querySelector('.specimen-aa--light'), 'float-in', 0.5, 0.58);

    // Font names
    anim(document.querySelector('.specimen-name--bold'),  'fade-up', 0.35, 0.80);
    anim(document.querySelector('.specimen-name--light'), 'fade-up', 0.35, 0.90);

    // Alphabet lines (bold then regular, slight stagger)
    anim(alphas[0], 'fade-up', 0.3, 0.96);
    anim(alphas[1], 'fade-up', 0.3, 1.03);
    anim(alphas[2], 'fade-up', 0.3, 1.00);
    anim(alphas[3], 'fade-up', 0.3, 1.07);

    // Colour circles — row by row, left to right
    // Row 1
    anim(document.querySelector('.g1'), 'circle-drop', 0.48, 0.38, spring);
    anim(document.querySelector('.o1'), 'circle-drop', 0.48, 0.50, spring);
    anim(document.querySelector('.d1'), 'circle-drop', 0.48, 0.62, spring);
    anim(document.querySelector('.w1'), 'circle-drop', 0.48, 0.74, spring);
    // Row 2
    anim(document.querySelector('.g2'), 'circle-drop', 0.48, 0.62, spring);
    anim(document.querySelector('.o2'), 'circle-drop', 0.48, 0.74, spring);
    anim(document.querySelector('.d2'), 'circle-drop', 0.48, 0.86, spring);
    // Row 3
    anim(document.querySelector('.g3'), 'circle-drop', 0.48, 0.86, spring);
    anim(document.querySelector('.o3'), 'circle-drop', 0.48, 0.98, spring);
    anim(document.querySelector('.d3'), 'circle-drop', 0.48, 1.10, spring);
    // Row 4
    anim(document.querySelector('.g4'), 'circle-drop', 0.48, 1.10, spring);
    anim(document.querySelector('.o4'), 'circle-drop', 0.48, 1.22, spring);
    anim(document.querySelector('.d4'), 'circle-drop', 0.48, 1.34, spring);
  }

  function resetAndPlay() {
    // Collect every animated element
    const els = [
      ...document.querySelectorAll('.section-label'),
      document.getElementById('rule-font'),
      document.getElementById('rule-colours'),
      document.querySelector('.specimen-aa--bold'),
      document.querySelector('.specimen-aa--light'),
      document.querySelector('.specimen-name--bold'),
      document.querySelector('.specimen-name--light'),
      ...document.querySelectorAll('.specimen-alpha'),
      ...document.querySelectorAll('.swatch'),
    ];

    // Strip animations, force reflow, then replay
    els.forEach(el => { if (el) el.style.animation = 'none'; });
    page.offsetHeight; // single reflow for all
    startAnimation();

    setTimeout(resetAndPlay, 7000);
  }

  // Expose for portfolio integration — call window.onexPlay() when section enters viewport
  window.onexPlay = resetAndPlay;

  // Standalone only: auto-start when opened directly (not inside another page)
  if (window.top === window) {
    window.addEventListener('load', () => setTimeout(resetAndPlay, 300));
  }

  // iframe integration: listen for postMessage from parent portfolio page
  window.addEventListener('message', e => {
    if (e.data === 'onex:play') resetAndPlay();
  });
</script>
</body>
</html>
