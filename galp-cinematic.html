<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cinematic Hero · Visuals Only</title>
<style>
  :root {
    --color-foreground: #1a1a1a;
    --card-purple: #ffe3d4;                        /* very pale peach per reference swatch */

    /* Bezel geometry — fully fluid now. Height tracks viewport height;
       the phone's 320:660 aspect-ratio keeps its shape. Radius and bezel
       inset scale proportionally via clamp() so the rim/ring stay visually
       correct on every viewport from 200px iframe up to full desktop. */
    --bezel-h: clamp(280px, 74vh, 660px);
    --bezel-radius: clamp(1.6rem, 5.2vh, 3.2rem);
    --bezel-inset: clamp(4px, 1.1vh, 7px);
    --screen-radius: calc(var(--bezel-radius) - var(--bezel-inset));
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    color: var(--color-foreground);
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
    background-color: #ffe3d4;                 /* fallback beneath the animated layer */
  }

  /* Animated wrapping-paper backdrop — its own layer inside .hero so we can
     transform it without dragging the rest of the stage along. Responsive
     size via cover + a slow Ken-Burns drift so the pattern breathes gently
     instead of sitting dead-still. Inset -6% gives scale/translate buffer
     so edges never expose fallback colour during the drift. */
  .bg-layer {
    position: absolute;
    inset: -6%;
    background-image: url('https://res.cloudinary.com/dzgqzeebg/image/upload/f_auto,q_auto,w_1600,c_limit/v1776301771/Papel-embrulho1_dukbrt.jpg');
    background-size: cover;
    background-repeat: no-repeat;
    background-position: center center;
    z-index: 0;
    pointer-events: none;
    animation: bg-drift 28s ease-in-out infinite alternate;
    will-change: transform;
  }
  @keyframes bg-drift {
    0%   { transform: scale(1.00) translate(-1%, -1%); }
    50%  { transform: scale(1.04) translate(1%, 1%); }
    100% { transform: scale(1.00) translate(1%, -1%); }
  }
  @media (prefers-reduced-motion: reduce) {
    .bg-layer { animation: none; }
  }

  /* Pinned hero container */
  .hero {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    perspective: 1500px;
  }

  /* Card wrapper + main purple card */
  .card-wrapper {
    position: absolute; inset: 0; z-index: 20;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
    perspective: 1500px;
  }
  .main-card {
    position: relative; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    pointer-events: auto;
    width: 92vw; height: 92vh;
    border-radius: 32px;
    background: var(--card-purple);
    border: 1px solid rgba(255, 255, 255, 0.04);
    visibility: hidden;
  }
  @media (min-width: 768px) {
    .main-card { width: 85vw; height: 85vh; border-radius: 40px; }
  }

  .card-inner {
    position: relative;
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    z-index: 10;
  }

  /* Mockup sizing wrappers — height fills card; phone derives its own size
     from --bezel-h (viewport-relative), so no manual scale tier needed. */
  .mockup-scroll-wrapper {
    position: relative;
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    z-index: 10;
    visibility: hidden;
  }

  .mockup-scale {
    position: relative;
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
  }

  /* ---------------- Physical iPhone bezel ----------------
     Rebuilt as real nested layers (padding-based) instead of inset box-shadows.
     inset-shadow rasterization doesn't match real geometry on curved edges;
     combined with an animated GIF that exposes the mismatch as shimmer/tearing.
     Real padding layers = the silver rim, black ring, and screen all use their
     own border-radius so the browser clips each with real geometry. */
  .iphone-bezel {
    position: relative;
    height: var(--bezel-h);
    aspect-ratio: 320 / 660;                     /* width derives from height */
    border-radius: var(--bezel-radius);
    background: #ea5906;                         /* outer rim — campaign orange */
    padding: 2px;
    box-shadow: 0 20px 40px -20px rgba(0, 0, 0, 0.35);
    transform: translateZ(0);
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
  }
  .bezel-inner {
    width: 100%;
    height: 100%;
    border-radius: calc(var(--bezel-radius) - 2px);
    background: #000;                            /* black bezel ring */
    padding: calc(var(--bezel-inset) - 2px);
    overflow: hidden;                            /* real clip as safety net */
  }
  .screen {
    position: relative;
    width: 100%;
    height: 100%;
    border-radius: var(--screen-radius);
    background: #000;
    overflow: hidden;
    isolation: isolate;
  }
  /* Key fix: the gif carries its OWN border-radius + GPU layer so its
     animated frames rasterize pre-clipped. Relying on parent overflow:hidden
     to clip an animated replaced element produces sub-pixel edge shimmer in
     WebKit because the parent clip runs after each frame is rasterized. */
  .screen-gif {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    pointer-events: none;
    border-radius: inherit;
    transform: translateZ(0);
    -webkit-transform: translateZ(0);
    will-change: transform;
  }

  /* Dynamic Island — also scales with viewport so it stays proportional to the phone */
  .notch {
    position: absolute;
    top: clamp(3px, 0.8vh, 5px);
    left: 50%;
    transform: translateX(-50%);
    width: clamp(58px, 15vh, 100px);
    height: clamp(16px, 4.2vh, 28px);
    background: #000;
    border-radius: 999px;
    z-index: 2;
    display: flex; align-items: center; justify-content: flex-end;
    padding: 0 clamp(7px, 1.8vh, 12px);
  }
  .notch-dot {
    width: clamp(4px, 0.9vh, 6px);
    height: clamp(4px, 0.9vh, 6px);
    border-radius: 50%;
    background: #10b981;
    box-shadow: 0 0 6px rgba(16, 185, 129, 0.7);
  }

  /* No internal scroll needed now — the timeline is driven by the parent
     window's scroll position via the script below. */

  /* Scroll cue — small uppercase text, bottom center of the purple full-screen state.
     Starts hidden; GSAP fades it in once the card fills the viewport, fades it out
     before the phone mockup arrives. Light color so it reads against the purple. */
  .scroll-cue {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 30;
    font-size: 10px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    font-weight: 500;
    color: rgba(255, 255, 255, 0.75);
    animation: scroll-pulse 2.6s ease-in-out infinite;
    pointer-events: none;
    white-space: nowrap;
    visibility: hidden;
  }
  @keyframes scroll-pulse {
    0%, 100% { opacity: 0.35; }
    50%      { opacity: 1; }
  }
</style>
</head>
<body>

  <div class="hero" id="hero">
    <div class="bg-layer" aria-hidden="true"></div>
    <div class="scroll-cue" aria-hidden="true">Scroll</div>
    <div class="card-wrapper">
      <div class="main-card" id="mainCard">
        <div class="card-inner">
          <div class="mockup-scroll-wrapper">
            <div class="mockup-scale">
              <div class="iphone-bezel" id="mockup">
                <div class="bezel-inner">
                  <div class="screen">
                    <img class="screen-gif" src="https://res.cloudinary.com/dzgqzeebg/image/upload/f_auto,q_auto,w_900,c_limit/v1776600424/Snapinst.app_video_AQN764z3q6t8v-utzswUcfAzXUgONarG4UUC3HgbLE0xQdTD3SeOggvqui4tpemoPSYDYxX-PHxQ5lNY9SNxL85J-H8MB4m30kypMlk_lzep6q.gif" alt="" aria-hidden="true">
                    <div class="notch"><div class="notch-dot"></div></div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>
    /* Mouse parallax — phone tilts on rotateX/rotateY */
    const mockup = document.getElementById('mockup');
    let raf = 0;
    window.addEventListener('mousemove', (e) => {
      cancelAnimationFrame(raf);
      raf = requestAnimationFrame(() => {
        if (!mockup) return;
        const xVal = (e.clientX / window.innerWidth  - 0.5) * 2;
        const yVal = (e.clientY / window.innerHeight - 0.5) * 2;
        gsap.to(mockup, {
          rotationY:  xVal * 12,
          rotationX: -yVal * 12,
          ease: 'power3.out',
          duration: 1.2
        });
      });
    });

    /* Timeline stays paused; its progress is driven manually from the parent
       window's scroll position so the effect peaks when the iframe sits at
       the center of the browser viewport. Works at every viewport size
       because progress is computed from rect.top / viewport height. */
    const isMobile = window.innerWidth < 768;

    gsap.set('.main-card', { y: window.innerHeight + 200, autoAlpha: 1 });
    gsap.set('.mockup-scroll-wrapper', { autoAlpha: 0 });
    gsap.set('.scroll-cue', { autoAlpha: 0 });

    const tl = gsap.timeline({ paused: true });
    tl
      .to('.main-card', { y: 0, ease: 'power3.inOut', duration: 2 }, 0)
      .to('.main-card', { width: '100%', height: '100%', borderRadius: '0px', ease: 'power3.inOut', duration: 1.5 })
      .fromTo('.mockup-scroll-wrapper',
        { y: 300, z: -500, rotationX: 50, rotationY: -30, autoAlpha: 0, scale: 0.6 },
        { y: 0, z: 0, rotationX: 0, rotationY: 0, autoAlpha: 1, scale: 1, ease: 'expo.out', duration: 2.5 },
        '-=0.8'
      )
      .to('.scroll-cue', { autoAlpha: 1, duration: 0.25, ease: 'power2.out' })
      .to({}, { duration: 1.6 })
      .to('.scroll-cue', { autoAlpha: 0, duration: 0.25, ease: 'power2.in' });
      /* Previously had phone-exit + card-shrink + card-exit-top here — they
         caused an empty peach band to show between the iframe's phone-gone
         state and the next slide. Removing them keeps the phone visible on
         the full-screen purple card right up to the iframe's bottom edge,
         so the handoff to the wrappers-loop slide is seamless. */

    /* Drive timeline from the parent window's scroll position.
       Same-origin iframe → we can read parent rect + scroll directly.
       If embedded standalone (no parent), fall back to auto-play. */
    let parentWin = null, frameEl = null;
    try {
      if (window.parent && window.parent !== window) {
        window.parent.innerHeight;                  /* access-test: throws on cross-origin */
        parentWin = window.parent;
        frameEl = window.frameElement;
      }
    } catch (_) { parentWin = null; }

    if (parentWin && frameEl) {
      let rafId = 0;
      const update = () => {
        const rect = frameEl.getBoundingClientRect();
        const vh = parentWin.innerHeight;
        /* progress 0 = iframe top at viewport bottom; progress 1 = iframe
           bottom at viewport top. Effect peaks around 0.5 (iframe centered). */
        const p = Math.max(0, Math.min(1, (vh - rect.top) / (vh + rect.height)));
        tl.progress(p);
      };
      const onScrollOrResize = () => {
        cancelAnimationFrame(rafId);
        rafId = requestAnimationFrame(update);
      };
      parentWin.addEventListener('scroll', onScrollOrResize, { passive: true });
      parentWin.addEventListener('resize', onScrollOrResize);
      update();
    } else {
      /* Standalone preview: auto-play the timeline linearly on a short loop */
      tl.timeScale(0.7).play();
    }
  </script>
</body>
</html>
