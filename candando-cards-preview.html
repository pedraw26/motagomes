<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Candando Cards</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: #ffffff;
    display: grid;
    place-items: center;
    font-family: "Inter", ui-sans-serif, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Carousel wrapper ── */
  .carousel {
    position: relative;
    width: min(900px, calc(100vw - 64px));
  }

  /* ── Track — slides sit side by side, track slides left/right ── */
  .track-outer {
    overflow: hidden;
    border-radius: 8px;
    width: 100%;
  }

  .track {
    display: flex;
    transition: transform 0.52s cubic-bezier(.4, 0, .2, 1);
    will-change: transform;
  }

  /* ── Individual slide — width set by JS to match container ── */
  .slide {
    flex-shrink: 0;
    aspect-ratio: 3 / 2;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ── Candando card — same treatment as email mockup today ── */
  .card-img {
    width: 62%;
    aspect-ratio: 1692 / 1080;
    border-radius: 22px;
    object-fit: contain;
    background: #ffffff;
    box-shadow:
      0 1px 0 rgba(0, 0, 0, 0.04),
      0 6px 14px rgba(24, 24, 24, 0.06);
  }

  .slide-1 { background: rgba(232, 174, 66,  0.27); }
  .slide-2 { background: rgba(194, 48,  71,  0.27); }
  .slide-3 { background: rgba(74,  151, 196, 0.27); }
  .slide-4 { background: rgba(225, 90,  52,  0.27); }

  /* ── Dot indicators ── */
  .dots {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-top: 20px;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(0, 0, 0, 0.18);
    cursor: pointer;
    border: none;
    padding: 0;
    transition: background 0.25s ease, transform 0.25s ease;
  }

  .dot:hover {
    background: rgba(0, 0, 0, 0.4);
  }

  .dot.is-active {
    background: rgba(0, 0, 0, 0.75);
    transform: scale(1.25);
  }
</style>
</head>
<body>

<div class="carousel" aria-label="Candando colour slides">
  <div class="track-outer">
    <div class="track" id="track">
      <div class="slide slide-1"><img class="card-img" src="https://res.cloudinary.com/dzgqzeebg/image/upload/f_auto,q_auto/v1777144117/candando-card-kid.png" alt="Candando gift card"></div>
      <div class="slide slide-2"><img class="card-img" src="https://res.cloudinary.com/dzgqzeebg/image/upload/f_auto,q_auto/v1777144117/candando-card-kid.png" alt="Candando gift card"></div>
      <div class="slide slide-3"><img class="card-img" src="https://res.cloudinary.com/dzgqzeebg/image/upload/f_auto,q_auto/v1777144117/candando-card-kid.png" alt="Candando gift card"></div>
      <div class="slide slide-4"><img class="card-img" src="https://res.cloudinary.com/dzgqzeebg/image/upload/f_auto,q_auto/v1777144117/candando-card-kid.png" alt="Candando gift card"></div>
    </div>
  </div>

  <div class="dots" role="tablist" aria-label="Slide indicators" id="dots">
    <button class="dot is-active" role="tab" aria-selected="true"  aria-label="Slide 1"></button>
    <button class="dot"           role="tab" aria-selected="false" aria-label="Slide 2"></button>
    <button class="dot"           role="tab" aria-selected="false" aria-label="Slide 3"></button>
    <button class="dot"           role="tab" aria-selected="false" aria-label="Slide 4"></button>
  </div>
</div>

<script>
  (() => {
    const outer  = document.querySelector('.track-outer');
    const track  = document.getElementById('track');
    const slides = [...track.children];
    const dots   = [...document.getElementById('dots').children];
    const total  = slides.length;
    let current  = 0;
    let timer    = null;

    /* Set each slide's width to the container's rendered width so
       translateX in pixels is always exact — no %-of-track issues. */
    function sizeSlides() {
      const w = outer.offsetWidth;
      slides.forEach(s => { s.style.width = w + 'px'; });
    }

    function goTo(idx) {
      current = (idx + total) % total;
      const w = outer.offsetWidth;
      track.style.transform = `translateX(-${current * w}px)`;
      dots.forEach((d, i) => {
        d.classList.toggle('is-active', i === current);
        d.setAttribute('aria-selected', i === current);
      });
    }

    function next() { goTo(current + 1); }

    function startAuto() {
      clearInterval(timer);
      timer = setInterval(next, 3000);
    }

    /* Recalculate on resize */
    window.addEventListener('resize', () => { sizeSlides(); goTo(current); });

    /* Dot clicks */
    dots.forEach((d, i) => {
      d.addEventListener('click', () => { goTo(i); startAuto(); });
    });

    /* Keyboard arrows */
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight') { goTo(current + 1); startAuto(); }
      if (e.key === 'ArrowLeft')  { goTo(current - 1); startAuto(); }
    });

    sizeSlides();
    startAuto();
  })();
</script>
</body>
</html>
