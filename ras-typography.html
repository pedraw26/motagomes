<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8" />

<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Typography System</title>



<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">



<style>

  body {

    margin: 0;

    background: #000;

    color: #fff;

    font-family: 'Inter', sans-serif;

    overflow: hidden;

  }



  .container {

    height: 100vh;

    display: flex;

    align-items: center;

    justify-content: center;

    position: relative;

  }



  .type-block {

    position: absolute;

    text-align: center;

    opacity: 0;

    transform: translateY(20px);

    transition: all 0.6s ease;

  }



  .type-block.active {

    opacity: 1;

    transform: translateY(0);

  }



  .big {

    font-size: 120px;

    font-weight: 700;

    color: #3FE0D0;

    letter-spacing: -2px;

  }



  .label {

    margin-top: 16px;

    font-size: 14px;

    opacity: 0.6;

  }



  .title {

    position: absolute;

    top: 40px;

    left: 60px;

    font-size: 40px;

    font-weight: 600;

  }

</style>

</head>



<body>



<div class="container">



  <div class="type-block active">

    <div class="big" style="font-family: 'Urbanist', sans-serif;">Aa</div>

    <div class="label">Urbanist · 900</div>

  </div>



  <div class="type-block">

    <div class="big" style="font-family: 'Inter', sans-serif;">Aa</div>

    <div class="label">Inter · 600</div>

  </div>



  <div class="type-block">

    <div class="big" style="font-family: 'Urbanist', sans-serif; font-weight:300;">Aa</div>

    <div class="label">Urbanist · 300</div>

  </div>



  <div class="type-block">

    <div class="big" style="font-family: 'Inter', sans-serif; font-weight:400;">Aa</div>

    <div class="label">Inter · 400</div>

  </div>



</div>



<script>

  const blocks = document.querySelectorAll('.type-block');

  let index = 0;



  setInterval(() => {

    blocks[index].classList.remove('active');

    index = (index + 1) % blocks.length;

    blocks[index].classList.add('active');

  }, 2500);

</script>



</body>

</html>
