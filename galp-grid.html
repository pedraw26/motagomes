<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #baefbc;
    overflow: hidden;
    width: 100%;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 20px;
    padding: 20px 0;
  }

  .row {
    display: flex;
    gap: 20px;
    width: max-content;
    animation: scrollLeft 20s linear infinite;
  }

  .row:nth-child(2) {
    animation-duration: 25s;
    animation-direction: reverse;
  }

  .row:nth-child(3) {
    animation-duration: 22s;
  }

  @keyframes scrollLeft {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  .card {
    flex-shrink: 0;
    width: 380px;
    border-radius: 16px;
    overflow: hidden;
  }

  .card img {
    width: 100%;
    height: auto;
    object-fit: contain;
    display: block;
  }
</style>
</head>
<body>

<script>
const images = [
  'https://res.cloudinary.com/dzgqzeebg/image/upload/v1776303296/green_natal_p-4_gokjlf.jpg',
  'https://res.cloudinary.com/dzgqzeebg/image/upload/v1776303296/purple_natal_p-3_jda0t9.jpg',
  'https://res.cloudinary.com/dzgqzeebg/image/upload/v1776303297/orange_natal_p-2_dqyqzc.jpg'
];

// 3 rows, each with a different pattern offset
const patterns = [
  [0, 1, 2, 0, 1, 2],
  [1, 2, 0, 1, 2, 0],
  [2, 0, 1, 2, 0, 1]
];

patterns.forEach((pattern) => {
  const row = document.createElement('div');
  row.className = 'row';

  // Duplicate the pattern for seamless loop
  const doubled = [...pattern, ...pattern];

  doubled.forEach(idx => {
    const card = document.createElement('div');
    card.className = 'card';
    const img = document.createElement('img');
    img.src = images[idx];
    img.alt = '';
    card.appendChild(img);
    row.appendChild(card);
  });

  document.body.appendChild(row);
});
</script>

</body>
</html>
