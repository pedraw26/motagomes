  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    background: #1a1a1a;
    display: grid; place-items: center;
    font-family: "Inter", ui-sans-serif, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  /* ─── Portrait MUPI frame 120 × 175 cm ─── */
  .mupi {
    position: relative;
    width: min(460px, calc(100vw - 32px));
    aspect-ratio: 120 / 175;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 32px 80px rgba(0,0,0,0.55);
    background: #ffffff;
    container-type: size;
  }

  /* ── 2-panel ping-pong camera pan ──
     Track holds [logo, offer]. Offer pans DOWN to reveal the logo from the
     top; the logo then REVERSES back up to the offer (which re-animates).
     Organic back-and-forth — no hidden reset. */
  .scene-track {
    position: absolute;
    inset: 0;
    height: 200%;                  /* two stacked frames */
    display: flex;
    flex-direction: column;
    transform: translateY(-50%);   /* start on the offer (bottom) panel */
    transition: transform 0.9s cubic-bezier(0.76, 0, 0.24, 1);
    will-change: transform;
  }
  .scene-track[data-frame="logo"]  { transform: translateY(0%); }    /* logo from top */
  .scene-track[data-frame="offer"] { transform: translateY(-50%); }  /* reverse back */
  .scene-track.no-anim { transition: none; }

  .scene {
    position: relative;
    width: 100%;
    flex: 1 1 0;                   /* even pixel split — no sub-pixel seam gaps */
    min-height: 0;                 /* don't let tall offer content stretch a panel */
    overflow: hidden;
  }

  /* Logo panel — red with falling snow (does NOT re-animate; seamless) */
  .scene-logo {
    background: #d41f3d;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  /* White base with a single clean, symmetric round curve — softens the seam */
  .scene-logo::before {
    content: '';
    position: absolute;
    left: 0; right: 0; bottom: -1px;     /* -1px hides any sub-pixel seam */
    height: 18%;
    z-index: 3;                          /* above snow + logo, white fills the base */
    pointer-events: none;
    background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 240" preserveAspectRatio="none"><path fill="%23ffffff" d="M0,120 C360,36 840,36 1200,120 L1200,240 L0,240 Z"/></svg>') bottom center / 100% 100% no-repeat;
  }
  .scene-logo svg { width: 44%; height: auto; position: relative; z-index: 2; transform: translateY(-6%); }
  .logo-snow { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
  .flake {
    position: absolute;
    top: -4%;
    border-radius: 50%;
    background: #ffffff;
    opacity: 0;
    animation: fall linear infinite;
    will-change: transform, opacity;
  }
  @keyframes fall {
    0%   { transform: translateY(0)       translateX(0)            scale(1);    opacity: 0; }
    6%   { opacity: 1; }
    85%  { opacity: 0.7; }
    100% { transform: translateY(180cqh)  translateX(var(--drift)) scale(0.85); opacity: 0; }
  }

  /* ── Offer scene — headline-first app-promo layout ── */
  .offer {
    position: absolute;
    inset: 6cqh 8cqw;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
  }

  /* ═══════════ FRAME 1 — reconstructed 1:1 + orchestrated motion ═══════════
     Layers (top→bottom): headline L1 (black) · headline L2 "RECEBE 2000KZ" (gold)
     · card (+shadow +specular) · "Usa o código" label · gold pill · footnote.
     Idle "breathing" float lives on .offer so it never fights child entrances. */

  /* Headline — Inter 800 uppercase, two lines, line 2 gold (the value) */
  .headline {
    margin: 0 0 6cqh;
    font-family: 'Eveleth Clean', 'Inter', system-ui, sans-serif;
    font-weight: 400;
    text-transform: uppercase;
    font-size: clamp(17px, 5.7cqw, 28px);
    letter-spacing: 0.005em;
    line-height: 1.12;
    color: #111111;
    font-feature-settings: "kern" 1;
  }
  .headline .hl-1,
  .headline .hl-2 { display: block; }
  .headline .hl-2 { color: #f4ad32; }          /* "RECEBE 2000KZ" — brand gold */

  /* Card — full image, never cropped; static two-layer float shadow */
  .card {
    width: 92%;
    margin: 0 0 5.4cqh;
    aspect-ratio: 1400 / 905;
    border-radius: 18px;
    overflow: hidden;
    position: relative;
    background:
      url("card.png")
      center / contain no-repeat;
    box-shadow: 0 1px 2px rgba(0,0,0,0.18), 0 18px 40px -8px rgba(0,0,0,0.18);
    will-change: transform, opacity;
  }
  .card::after {                               /* faint top-edge specular lip */
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.35);
    pointer-events: none;
  }

  /* "Usa o código" label */
  .code-label {
    margin: 0 0 1.8cqh;
    font-family: 'Inter', system-ui, sans-serif;
    font-weight: 600;
    font-size: clamp(13px, 3.4cqw, 16px);
    letter-spacing: 0.005em;
    color: #111111;
    will-change: transform, opacity;
  }

  /* Gold code pill — perpetual specular sheen */
  .cta {
    position: relative;
    overflow: hidden;
    display: inline-block;
    background: #f4ad32;
    color: #ffffff;
    font-family: 'Inter', system-ui, sans-serif;
    font-size: clamp(15px, 4cqw, 19px);
    font-weight: 800;
    letter-spacing: -0.01em;
    padding: 1.7cqh 6cqw;
    border-radius: 999px;
    text-decoration: none;
    white-space: nowrap;
    text-shadow: 0 1px 1px rgba(120,80,10,0.30);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.25);
    transform-origin: 50% 50%;
    will-change: transform, opacity;
  }
  .cta strong { font-weight: 800; letter-spacing: -0.01em; }
  .cta::after {
    content: '';
    position: absolute;
    top: -50%; left: 0;
    width: 35%; height: 200%;
    background: linear-gradient(100deg,
      rgba(255,255,255,0) 0%, rgba(255,255,255,0.45) 50%, rgba(255,255,255,0) 100%);
    transform: translateX(-160%) skewX(-20deg);
    opacity: 0;
    pointer-events: none;
    animation: pill-sheen 5.6s cubic-bezier(0.40, 0, 0.20, 1) 2.8s infinite;
  }
  @keyframes pill-sheen {
    0%   { transform: translateX(-160%) skewX(-20deg); opacity: 0; }
    6%   { opacity: 0.5; }
    16%  { transform: translateX(160%)  skewX(-20deg); opacity: 0; }
    100% { transform: translateX(160%)  skewX(-20deg); opacity: 0; }
  }

  /* Footnote */
  .footnote {
    position: absolute;            /* pinned to the bottom; doesn't shift the cluster */
    bottom: 0;
    left: 0;
    right: 0;
    margin: 0;
    font-family: 'Inter', system-ui, sans-serif;
    font-size: clamp(10px, 2.4cqw, 12px);
    font-weight: 400;
    color: #8a8a8a;
    line-height: 1.4;
    will-change: clip-path, opacity;
  }

  /* ═══════ LOOPING ENTRANCE — gated by .scene-offer.play, re-fires each cycle ═══════ */
  /* Base (un-played / between loops) hidden states */
  .scene-offer .hl-1,
  .scene-offer .hl-2,
  .scene-offer .code-label { opacity: 0; transform: translateY(-14px); }
  .scene-offer .card       { opacity: 0; transform: translateX(-48px); }
  .scene-offer .cta        { opacity: 0; transform: scale(0.92); }
  .scene-offer .footnote   { opacity: 0; clip-path: inset(0 100% 0 0); }

  /* Gated entrance — orchestrated, sequential, replays on each .play toggle */
  .scene-offer.play .hl-1       { animation: offerTopDrop   470ms cubic-bezier(0.22,1,0.36,1)  130ms forwards; }
  .scene-offer.play .hl-2       { animation: offerTopDrop   470ms cubic-bezier(0.22,1,0.36,1)  600ms forwards; }
  .scene-offer.play .card       { animation: offerFromLeft  560ms cubic-bezier(0.22,1,0.36,1) 1110ms forwards; }
  .scene-offer.play .code-label { animation: offerTopDrop   420ms cubic-bezier(0.22,1,0.36,1) 1730ms forwards; }
  .scene-offer.play .cta        { animation: offerPillPop   520ms cubic-bezier(0.34,1.4,0.64,1) 2210ms forwards; }
  .scene-offer.play .footnote   {
    animation: offerWipeReveal 520ms cubic-bezier(0.22,1,0.36,1) 2770ms forwards,
               offerFade        200ms linear                     2770ms forwards;
  }
  @keyframes offerTopDrop  { from { opacity:0; transform: translateY(-14px); } to { opacity:1; transform: translateY(0); } }
  @keyframes offerFromLeft { from { opacity:0; transform: translateX(-48px); } to { opacity:1; transform: translateX(0); } }
  @keyframes offerPillPop  { from { opacity:0; transform: scale(0.92); } to { opacity:1; transform: scale(1); } }
  @keyframes offerWipeReveal { from { clip-path: inset(0 100% 0 0); } to { clip-path: inset(0 0 0 0); } }
  @keyframes offerFade     { from { opacity:0; } to { opacity:1; } }

  /* Whole-composition idle breathing — starts after the entrance settles,
     lives on .offer so it composes with (never overwrites) child transforms */
  .scene-offer .offer {
    animation: idle-float 6s cubic-bezier(0.45, 0, 0.55, 1) 2.8s infinite;
  }
  @keyframes idle-float {
    0%   { transform: translateY(0); }
    50%  { transform: translateY(-1.5px); }
    100% { transform: translateY(0); }
  }

  @media (prefers-reduced-motion: reduce) {
    .scene-offer .hl-1, .scene-offer .hl-2, .scene-offer .card,
    .scene-offer .code-label, .scene-offer .cta, .cta::after,
    .scene-offer .footnote, .scene-offer .offer, .flake {
      animation: none !important;
      opacity: 1 !important;
      transform: none !important;
      clip-path: none !important;
    }
    .flake { opacity: 0 !important; }   /* no perpetual snow under reduced-motion */
  }
</style>

<script>
  // 2-panel ping-pong loop (offer ⇄ logo) + snow.
  (() => {
    'use strict';

    // Deterministic snow (no Math.random dependency).
    function makeSnow(container, count) {
      if (!container) return;
      const frag = document.createDocumentFragment();
      const rnd = (seed) => { const x = Math.sin(seed * 12.9898 + 78.233) * 43758.5453; return x - Math.floor(x); };
      for (let i = 0; i < count; i++) {
        const f = document.createElement('div');
        f.className = 'flake';
        const size = 2 + rnd(i + 101) * 6;
        const left = rnd(i + 1) * 100;
        const dur = 6 + rnd(i + 211) * 8;
        const delay = -(rnd(i + 307) * 14);
        const drift = rnd(i + 419) * 40 - 20;
        const opacity = 0.4 + rnd(i + 523) * 0.6;
        f.style.cssText =
          `width:${size.toFixed(2)}px;height:${size.toFixed(2)}px;left:${left.toFixed(3)}%;` +
          `animation-duration:${dur.toFixed(2)}s;animation-delay:${delay.toFixed(2)}s;` +
          `--drift:${drift.toFixed(2)}px;opacity:${opacity.toFixed(3)};`;
        frag.appendChild(f);
      }
      container.appendChild(frag);
    }

    const track = document.getElementById('track');
    if (!track) return;
    const sceneOffer = document.getElementById('sceneOffer');
    makeSnow(document.getElementById('logoSnow'), 44);

    // Re-fire the offer entrance — reset to hidden then replay (reflow flushes it).
    function playOffer() {
      if (!sceneOffer) return;
      sceneOffer.classList.remove('play');
      void sceneOffer.offsetWidth;
      sceneOffer.classList.add('play');
    }

    const OFFER_HOLD = 5600, LOGO_HOLD = 3200, PAN = 950;
    let timer = null, running = true;
    const after = (ms, fn) => { if (timer) clearTimeout(timer); timer = setTimeout(() => { timer = null; if (running) fn(); }, ms); };
    const setFrame = (n) => { track.dataset.frame = n; };

    // Ping-pong: offer → pan DOWN to logo → REVERSE up to offer (re-animates) → repeat.
    function toLogo()  { setFrame('logo');  after(PAN, holdLogo); }
    function holdLogo(){ after(LOGO_HOLD, toOffer); }
    function toOffer() { setFrame('offer'); playOffer(); after(PAN, holdOffer); }   // reverse pan + replay
    function holdOffer(){ after(OFFER_HOLD, toLogo); }

    // Re-sync cleanly on tab refocus so we never resume mid-pan.
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) return;
      if (timer) { clearTimeout(timer); timer = null; }
      track.classList.add('no-anim');
      setFrame('offer');
      void track.offsetWidth;
      requestAnimationFrame(() => requestAnimationFrame(() => {
        track.classList.remove('no-anim');
        playOffer();
        if (running) holdOffer();
      }));
    });

    // First view: offer is the start frame — fire its entrance now, then hold.
    playOffer();
    holdOffer();
  })();
</script>
