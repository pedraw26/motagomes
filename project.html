<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project — Mota Gomes</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg">
    <style>
        :root {
            --sf-pro: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', sans-serif;
            --mono: 'SF Mono', 'Fira Code', 'Monaco', 'Menlo', monospace;
            --bg-black: #000000;
            --text: #ffffff;
            --text-80: #e5e5e5;
            --text-60: #999999;
            --text-40: #666666;
            --border-light: rgba(255, 255, 255, 0.25);
            --border-subtle: rgba(255, 255, 255, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--sf-pro);
            background: var(--bg-black);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ========================================
           HEADER
           ======================================== */

        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-subtle);
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.5s ease;
        }

        .header.hidden {
            transform: translateY(-100%);
            opacity: 0;
        }

        .header-content {
            width: 100%;
            max-width: none;
            margin: 0;
            padding: 20px 80px;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
        }

        .header-logo {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.01em;
            color: var(--text);
            text-decoration: none;
        }

        .header-center {
            justify-self: center;
            font-family: var(--sf-pro);
            font-size: 10px;
            letter-spacing: 0.1em;
            color: var(--text-40);
            font-variant-numeric: tabular-nums;
            line-height: 1;
            text-transform: uppercase;
        }

        .header-right {
            display: flex;
            align-items: center;
            justify-self: end;
            gap: 16px;
        }

        .menu-icon {
            width: 29px;
            height: 29px;
            position: relative;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .menu-icon span {
            display: block;
            background: #fff;
            height: 1.5px;
            border-radius: 1px;
            position: absolute;
            left: 3.5px;
            width: 22px;
            transition: all 0.3s ease;
        }

        .menu-icon span:nth-child(1) {
            top: 9px;
        }

        .menu-icon span:nth-child(2) {
            top: 17px;
        }

        .menu-icon:hover span:nth-child(2) {
            width: 14px;
        }

        /* ========================================
           MENU OVERLAY
           ======================================== */

        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            z-index: 999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .menu-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .menu-overlay-items {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 32px;
            text-align: center;
        }

        .menu-overlay-link {
            font-family: var(--sf-pro);
            font-size: clamp(2rem, 6vw, 4rem);
            font-weight: 300;
            letter-spacing: -0.02em;
            color: var(--text-60);
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .menu-overlay-link:hover {
            color: var(--text);
            transform: scale(1.05);
        }

        .menu-overlay-cta {
            margin-top: 40px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-family: var(--sf-pro);
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.01em;
            color: var(--text);
            text-decoration: none;
            padding: 9px 14px;
            border: 1px solid rgba(255, 255, 255, 0.34);
            border-radius: 999px;
            background: transparent;
            transition: all 0.3s ease;
        }

        .menu-overlay-cta:hover {
            background: var(--text);
            border-color: var(--text);
            color: var(--bg-black);
        }

        .menu-overlay-footer {
            position: absolute;
            bottom: 40px;
            display: flex;
            gap: 40px;
        }

        .menu-overlay-footer a {
            font-family: var(--sf-pro);
            font-size: 10px;
            letter-spacing: 0.1em;
            color: var(--text-40);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .menu-overlay-footer a:hover {
            color: var(--text);
        }

        /* ========================================
           GRADIENT BACKGROUNDS
           ======================================== */

        .gradient-obsidian {
            background: linear-gradient(135deg, #070b34 0%, #2f6bff 46%, #8fd3ff 100%);
        }

        .gradient-velvet {
            background: linear-gradient(135deg, #1b0033 0%, #7a1fff 45%, #ff4fcf 100%);
        }

        .gradient-midnight {
            background: linear-gradient(135deg, #001a14 0%, #00a86b 44%, #9effc8 100%);
        }

        .gradient-ocean {
            background: linear-gradient(135deg, #001b2e 0%, #0077ff 44%, #00d1ff 100%);
        }

        .gradient-sunset {
            background: linear-gradient(135deg, #2f0f00 0%, #ff5e00 40%, #ffcc00 100%);
        }

        .gradient-emerald {
            background: linear-gradient(135deg, #2a0a00 0%, #ff4d00 46%, #ffd166 100%);
        }

        .gradient-forest {
            background: linear-gradient(135deg, #051f10 0%, #10b85a 42%, #b4ff4a 100%);
        }

        .gradient-crimson {
            background: linear-gradient(135deg, #2b000f 0%, #ff2d55 46%, #ff9a3c 100%);
        }

        /* ========================================
           PROJECT HERO
           ======================================== */

        .project-hero {
            position: relative;
            aspect-ratio: 16 / 9;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 0 80px 80px;
            overflow: hidden;
        }

        .project-hero-gradient {
            position: absolute;
            inset: 0;
            opacity: 0.35;
            z-index: 0;
            background-attachment: fixed;
        }

        .project-hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.4) 100%);
            z-index: 1;
        }

        .project-hero-content {
            position: relative;
            z-index: 2;
            max-width: 900px;
        }

        .project-hero-label {
            font-family: var(--sf-pro);
            font-size: 10px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--text-60);
            margin-bottom: 24px;
        }

        .project-hero-title {
            font-family: var(--sf-pro);
            font-size: clamp(2.5rem, 6vw, 5rem);
            font-weight: 300;
            letter-spacing: -0.03em;
            line-height: 1.05;
            color: var(--text);
            margin-bottom: 32px;
        }

        .project-hero-url {
            font-family: var(--mono);
            font-size: 12px;
            letter-spacing: 0.05em;
            color: var(--text-40);
        }

        .project-hero-url a {
            color: var(--text-40);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .project-hero-url a:hover {
            color: var(--text);
        }

        /* ========================================
           SECTION SHARED
           ======================================== */

        .section {
            padding: 120px 80px;
            border-top: 1px solid var(--border-subtle);
        }

        .section-label {
            font-family: var(--sf-pro);
            font-size: 10px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--text-40);
            margin-bottom: 40px;
        }

        /* ========================================
           OVERVIEW — EDITORIAL REDESIGN
           ======================================== */

        .overview {
            padding: 0 80px;
        }

        /* Staggered reveal */
        [data-reveal-child] {
            opacity: 0;
            transform: translateY(28px);
            transition:
                opacity 0.7s cubic-bezier(0.16, 1, 0.3, 1),
                transform 0.7s cubic-bezier(0.16, 1, 0.3, 1);
        }

        [data-reveal-child].is-revealed {
            opacity: 1;
            transform: translateY(0);
        }

        /* Zone 1: Metadata */
        .overview__meta {
            padding: 100px 0 0;
        }

        .overview__meta-list {
            display: flex;
            gap: 64px;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .overview__meta-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .overview__label {
            font-family: var(--sf-pro);
            font-size: 10px;
            font-weight: 400;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--text-40);
            line-height: 1;
        }

        .overview__value {
            font-family: var(--sf-pro);
            font-size: 14px;
            font-weight: 400;
            color: var(--text-60);
            line-height: 1.5;
            letter-spacing: 0.01em;
        }

        /* Zone 2: Statement */
        .overview__statement {
            padding: 80px 0 100px;
            max-width: 70%;
        }

        .overview__statement-text {
            font-family: var(--sf-pro);
            font-size: clamp(1.8rem, 3vw, 2.8rem);
            font-weight: 200;
            line-height: 1.35;
            color: var(--text);
            letter-spacing: -0.025em;
        }

        /* Zone 3: Narrative */
        .overview__narrative {
            display: grid;
            grid-template-columns: 5fr 1fr 6fr;
            gap: 0;
            padding-bottom: 100px;
        }

        .overview__narrative-block {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .overview__narrative-block--challenge {
            grid-column: 1 / 2;
            padding-right: 40px;
        }

        .overview__narrative-block--solution {
            grid-column: 3 / 4;
            padding-top: 0;
        }

        .overview__narrative-text {
            font-family: var(--sf-pro);
            font-size: clamp(0.95rem, 1.15vw, 1.1rem);
            font-weight: 300;
            line-height: 1.75;
            color: var(--text-60);
            letter-spacing: 0.005em;
        }

        /* Zone 4: Metrics */
        .overview__metrics {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            padding: 64px 0 120px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }

        .overview__metric {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 40px 0;
        }

        .overview__metric-value {
            font-family: var(--mono);
            font-size: clamp(2.2rem, 3.5vw, 3.2rem);
            font-weight: 200;
            letter-spacing: -0.03em;
            line-height: 1;
            color: var(--text);
            font-variant-numeric: tabular-nums;
        }

        .overview__metric-label {
            font-family: var(--sf-pro);
            font-size: 10px;
            font-weight: 400;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--text-40);
            line-height: 1;
        }

        /* ========================================
           SHOWCASE GALLERY
           ======================================== */

        .showcase-gallery {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
            width: 100%;
            grid-auto-rows: auto;
        }

        .showcase-item {
            position: relative;
            overflow: hidden;
            aspect-ratio: 16 / 9;
        }

        .showcase-item.full {
            grid-column: 1 / -1;
        }

        .showcase-item.half {
            aspect-ratio: unset;
            overflow: visible;
        }

        .showcase-item.half img {
            width: 100%;
            height: auto !important;
            object-fit: contain !important;
        }

        .showcase-item:has(.showcase-colorstrip) {
            aspect-ratio: unset;
        }
        .showcase-colorstrip {
            display: flex;
            width: 100%;
        }
        .showcase-colorstrip > div {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 12px 14px;
        }
        .showcase-colorstrip .cs-role {
            font-family: var(--sf-pro);
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.02em;
            margin-bottom: 6px;
        }
        .showcase-colorstrip .cs-meta {
            font-family: var(--mono);
            font-size: 7.5px;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            opacity: 0.45;
            line-height: 1.8;
        }

        .showcase-slideshow {
            position: relative;
            width: 100%;
            height: 100%;
        }
        .showcase-slideshow img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            visibility: hidden;
        }
        .showcase-slideshow img.active {
            visibility: visible;
        }

        .showcase-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .showcase-item:hover img {
            transform: scale(1.03);
        }

        .showcase-item.has-iframe {
            aspect-ratio: 16 / 9;
        }

        .showcase-item.has-video {
            aspect-ratio: 16 / 9;
        }

        .showcase-item iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            overflow: hidden;
        }


        @media (max-width: 768px) {
            .showcase-gallery {
                grid-template-columns: 1fr;
            }
            .showcase-item.half {
                grid-column: 1 / -1;
            }
        }

        /* ========================================
           FOOTER NAVIGATION
           ======================================== */

        .footer-nav {
            position: relative;
            border-top: 1px solid var(--border-subtle);
            background: var(--bg-black);
            z-index: 100;
        }

        .footer-nav-inner {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            min-height: 72px;
        }

        .footer-nav-link {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 20px;
            font-family: var(--sf-pro);
            font-size: 10px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--text-40);
            text-decoration: none;
            transition: all 0.3s ease;
            border-right: 1px solid var(--border-subtle);
            white-space: nowrap;
        }

        .footer-nav-link:last-child {
            border-right: none;
        }

        .footer-nav-link:hover {
            color: var(--text);
            background: rgba(255, 255, 255, 0.03);
        }

        .footer-nav-link span.arrow {
            display: inline-block;
            transition: transform 0.3s ease;
        }

        .footer-nav-link:hover span.arrow-left {
            transform: translateX(-4px);
        }

        .footer-nav-link:hover span.arrow-right {
            transform: translateX(4px);
        }

        /* ========================================
           PAGE TRANSITIONS
           ======================================== */

        .page-content {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.15s forwards;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .section {
            opacity: 0;
            transform: translateY(30px);
        }

        .section.visible {
            animation: sectionReveal 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes sectionReveal {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ========================================
           404 / NOT FOUND STATE
           ======================================== */

        .not-found {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
            text-align: center;
            padding: 80px;
        }

        .not-found-code {
            font-family: var(--sf-pro);
            font-size: 10px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--text-40);
        }

        .not-found-title {
            font-family: var(--sf-pro);
            font-size: clamp(1.5rem, 3vw, 2.5rem);
            font-weight: 300;
            letter-spacing: -0.02em;
            color: var(--text);
        }

        .not-found-link {
            font-family: var(--sf-pro);
            font-size: 10px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--text-40);
            text-decoration: none;
            padding: 12px 24px;
            border: 1px solid var(--border-light);
            transition: all 0.3s ease;
            margin-top: 16px;
        }

        .not-found-link:hover {
            background: var(--text);
            color: var(--bg-black);
        }

        /* ========================================
           RESPONSIVE
           ======================================== */

        @media (max-width: 1024px) {
            .header-content {
                padding: 18px 40px;
            }

            .project-hero {
                padding: 0 40px 60px;
            }

            .section {
                padding: 80px 40px;
            }

            .overview {
                padding: 0 40px;
            }

            .overview__narrative {
                grid-template-columns: 1fr 1fr;
                gap: 40px;
            }

            .overview__narrative-block--challenge {
                padding-right: 0;
            }

            .overview__narrative-block--solution {
                padding-top: 0;
            }

            .overview__metrics {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .header-content {
                padding: 16px 24px;
            }

            .project-hero {
                padding: 0 24px 48px;
            }

            .section {
                padding: 64px 24px;
            }

            .overview {
                padding: 0 24px;
            }

            .overview__meta {
                padding-top: 64px;
            }

            .overview__meta-list {
                flex-wrap: wrap;
                gap: 32px 48px;
            }

            .overview__statement {
                padding: 56px 0 72px;
            }

            .overview__narrative {
                grid-template-columns: 1fr;
                gap: 48px;
                padding-bottom: 72px;
            }

            .overview__narrative-block--challenge {
                order: 2;
                grid-column: 1 / -1;
                padding-right: 0;
            }

            .overview__narrative-block--solution {
                order: 1;
                grid-column: 1 / -1;
                padding-top: 0;
            }

            .overview__metrics {
                grid-template-columns: 1fr 1fr;
                padding: 48px 0 80px;
            }

            .overview__metric {
                padding: 28px 0;
            }

            .footer-nav-inner {
                grid-template-columns: 1fr 1fr;
            }

            .footer-nav-link {
                font-size: 9px;
                padding: 18px 12px;
            }

            .footer-nav-link:nth-child(2) {
                border-right: none;
            }

            .footer-nav-link:nth-child(3) {
                border-top: 1px solid var(--border-subtle);
            }

            .footer-nav-link:nth-child(4) {
                border-top: 1px solid var(--border-subtle);
            }
        }

        @media (max-width: 480px) {
            .project-hero {
                padding: 0 20px 40px;
            }

            .section {
                padding: 48px 20px;
            }

            .overview {
                padding: 0 20px;
            }

            .overview__meta-list {
                flex-direction: column;
                gap: 24px;
            }

            .overview__meta-item {
                flex-direction: row;
                justify-content: space-between;
                align-items: baseline;
                gap: 16px;
            }

            .overview__statement {
                padding: 40px 0 56px;
            }

            .overview__metrics {
                grid-template-columns: 1fr;
                padding: 40px 0 64px;
            }

            .footer-nav-inner {
                grid-template-columns: 1fr;
            }

            .footer-nav-link {
                border-right: none;
                border-bottom: 1px solid var(--border-subtle);
            }

            .footer-nav-link:last-child {
                border-bottom: none;
            }
        }
    </style>

</head>

         NAVIGATION HEADER
         ======================================== -->

        <div class="header-content">
            <a href="/" class="header-logo">MG</a>
            <div class="header-center" id="gmtTime">GMT 00:00</div>
            <div class="header-right">
                <div class="menu-icon" id="hamburger">
                    <span></span>
                    <span></span>

        </div>

    <!-- Hidden Menu Overlay -->
    <div class="menu-overlay" id="menuOverlay">

            <a href="/#work" class="menu-overlay-link">Work</a>

    <!-- ========================================
         PAGE CONTENT (populated by JS)
         ======================================== -->
    <main id="projectPage"></main>

    <script>
    /* ========================================
       PROJECT DATA
       ======================================== */

    /* Grey placeholder images */
    const _g1 = 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAIAAACQd1PeAAAADElEQVR4nGOQkpICAACgAE8sk/soAAAAAElFTkSuQmCC';

                    <div class="overview__meta" data-reveal-child>
                        <dl class="overview__meta-list">
                            <div class="overview__meta-item">
                                <dt class="overview__label">Client</dt>
                                <dd class="overview__value">${project.client}</dd>
                            </div>
                            <div class="overview__meta-item">
                                <dt class="overview__label">Industry</dt>
                                <dd class="overview__value">${project.category}</dd>
                            </div>
                            <div class="overview__meta-item">
                                <dt class="overview__label">Year</dt>
                                <dd class="overview__value">${project.year}</dd>
                            </div>
                            <div class="overview__meta-item">
                                <dt class="overview__label">Services</dt>
                                <dd class="overview__value">${project.services}</dd>
                            </div>
                        </dl>
                    </div>

                    <div class="overview__statement" data-reveal-child>
                        <p class="overview__statement-text">${project.description}</p>
                    </div>

                    ${project.challenge ? `
                    <div class="overview__narrative" data-reveal-child>
                        <div class="overview__narrative-block overview__narrative-block--challenge">
                            <span class="overview__label">Challenge</span>
                            <p class="overview__narrative-text">${project.challenge}</p>
                        </div>
                        <div class="overview__narrative-block overview__narrative-block--solution">
                            <span class="overview__label">Solution</span>
                            <p class="overview__narrative-text">${project.solution}</p>
                        </div>
                    </div>
                    ` : ''}

                    <div class="overview__metrics" data-reveal-child>
                        ${project.metrics.map((m, i) => `
                            <div class="overview__metric" style="transition-delay: ${i * 80}ms">
                                <div class="overview__metric-value">${m.value.replace(/0/g, 'O')}</div>
                                <div class="overview__metric-label">${m.label}</div>
                            </div>
                        `).join('')}
                    </div>
                </section>

                <!-- SHOWCASE -->
                ${project.images ? `
                <section class="section section--showcase" data-reveal style="border-top:none; padding:0;">
                    <div class="showcase-gallery">
                        ${project.images.map(img => `
                            <div class="showcase-item ${img.layout}${img.type === 'html' ? ' has-iframe' : ''}${img.type === 'video' ? ' has-iframe has-video' : ''}">
                                ${img.type === 'html' && img.html
                                    ? img.html
                                    : img.type === 'html'
                                    ? `<iframe src="${img.src}" loading="lazy" title="${img.caption}" scrolling="no"></iframe>`
                                    : img.type === 'video'
                                    ? `<iframe src="${img.src}" loading="lazy" title="${img.caption}" frameborder="0" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe>`
                                    : img.type === 'slideshow'
                                    ? `<div class="showcase-slideshow" data-interval="${img.interval || 1500}">${img.src.map((s, i) => `<img src="${s}" alt="${img.caption}" loading="lazy" class="${i === 0 ? 'active' : ''}">`).join('')}</div>`
                                    : img.type === 'colorstrip'
                                    ? `<div class="showcase-colorstrip">${img.colors.map((c, ci) => { const hex = c.replace('#',''); const r = parseInt(hex.substr(0,2),16); const g = parseInt(hex.substr(2,2),16); const b = parseInt(hex.substr(4,2),16); const lum = (r*299+g*587+b*114)/1000; const tc = lum > 140 ? '#000' : '#fff'; const pnt = img.pantones && img.pantones[ci] ? img.pantones[ci] : ''; const role = img.roles && img.roles[ci] ? img.roles[ci] : ''; return `<div style="background:${c};color:${tc}">${role ? `<div class="cs-role">${role}</div>` : ''}<div class="cs-meta">${c.toUpperCase()}${pnt ? '<br>' + pnt : ''}</div></div>`; }).join('')}</div>`
                                    : `<img src="${img.src}" alt="${img.caption}" loading="lazy"${img.style ? ` style="${img.style}"` : ''}>`}
                            </div>
                        `).join('')}
                    </div>
                </section>
                ` : ''}

                <!-- FOOTER NAVIGATION -->
                <nav class="footer-nav">
                    <div class="footer-nav-inner">
                        <a href="/#work" class="footer-nav-link">
                            <span class="arrow arrow-left">&larr;</span>&nbsp;&nbsp;Back
                        </a>
                        <a href="project.html?p=${prevSlug}" class="footer-nav-link">
                            <span class="arrow arrow-left">&larr;</span>&nbsp;&nbsp;${prevProject.client}
                        </a>
                        <a href="project.html?p=${nextSlug}" class="footer-nav-link">
                            ${nextProject.client}&nbsp;&nbsp;<span class="arrow arrow-right">&rarr;</span>
                        </a>
                        <a href="/" class="footer-nav-link">
                            Main Menu
                        </a>
                    </div>
                </nav>
            </div>
        `;

        // Observe sections for reveal animation
        initRevealObserver();
    }

    /* ========================================
       SECTION REVEAL ON SCROLL
       ======================================== */

    function initRevealObserver() {
        // Legacy data-reveal sections
        const sections = document.querySelectorAll('[data-reveal]');
        const sectionObserver = new IntersectionObserver((entries) => {
            entries.forEach((entry, i) => {
                if (entry.isIntersecting) {
                    entry.target.style.animationDelay = `${i * 0.08}s`;
                    entry.target.classList.add('visible');
                    sectionObserver.unobserve(entry.target);
                }
            });
        }, {
            threshold: 0.12,
            rootMargin: '0px 0px -40px 0px'
        });
        sections.forEach(s => sectionObserver.observe(s));

        // Staggered reveal groups (editorial overview)
        const groups = document.querySelectorAll('[data-reveal-group]');
        const childObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const children = entry.target.querySelectorAll('[data-reveal-child]');
                    children.forEach((child, i) => {
                        setTimeout(() => {
                            child.classList.add('is-revealed');
                        }, i * 120);
                    });
                    childObserver.unobserve(entry.target);
                }
            });
        }, {
            threshold: 0.08,
            rootMargin: '0px 0px -60px 0px'
        });
        groups.forEach(g => childObserver.observe(g));
    }

    /* ========================================
       HEADER SCROLL BEHAVIOR
       ======================================== */

    let lastScrollY = 0;
    let headerHidden = false;

    window.addEventListener('scroll', () => {
        const currentY = window.scrollY;
        if (currentY > 120 && currentY > lastScrollY && !headerHidden) {
            document.getElementById('header').classList.add('hidden');
            headerHidden = true;
        } else if (currentY < lastScrollY && headerHidden) {
            document.getElementById('header').classList.remove('hidden');
            headerHidden = false;
        }
        lastScrollY = currentY;
    }, { passive: true });

    /* ========================================
       GMT CLOCK
       ======================================== */

    function updateGMT() {
        const el = document.getElementById('gmtTime');
        if (!el) return;
        const fmt = new Intl.DateTimeFormat('en-GB', {
            timeZone: 'Europe/London',
            hour: '2-digit', minute: '2-digit',
            hour12: false
        });
        const offset = new Intl.DateTimeFormat('en-GB', {
            timeZone: 'Europe/London',
            timeZoneName: 'short'
        }).formatToParts(new Date()).find(p => p.type === 'timeZoneName');
        const tz = offset ? offset.value : 'GMT';
        el.textContent = tz + ' ' + fmt.format(new Date());
    }

    updateGMT();
    setInterval(updateGMT, 1000);

    /* ========================================
       HAMBURGER MENU
       ======================================== */

    const hamburger = document.getElementById('hamburger');
    const menuOverlay = document.getElementById('menuOverlay');
    const menuLinks = document.querySelectorAll('.menu-overlay-link, .menu-overlay-cta');

    hamburger.addEventListener('click', () => {
        menuOverlay.classList.toggle('active');
    });

    menuLinks.forEach(link => {
        link.addEventListener('click', () => {
            menuOverlay.classList.remove('active');
        });
    });

    // Close menu on Escape
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && menuOverlay.classList.contains('active')) {
            menuOverlay.classList.remove('active');
        }
    });

    /* ========================================
       RENDER
       ======================================== */

    const slug = getSlug();
    renderProject(slug);

    // Showcase slideshows
    document.querySelectorAll('.showcase-slideshow').forEach(ss => {
        const imgs = ss.querySelectorAll('img');
        if (imgs.length < 2) return;
        let current = 0;
        const interval = parseInt(ss.dataset.interval) || 1500;
        setInterval(() => {
            imgs[current].classList.remove('active');
            current = (current + 1) % imgs.length;
            imgs[current].classList.add('active');
        }, interval);
    });

    </script>
</body>
</html>
