<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project — Mota Gomes</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg">
    <!-- Preconnect to Cloudinary: saves ~100-300ms on first image handshake (DNS + TLS + TCP upfront) -->
    <link rel="preconnect" href="https://res.cloudinary.com" crossorigin>
    <link rel="dns-prefetch" href="https://res.cloudinary.com">
    <style>
        :root {
            --sf-pro: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', sans-serif;
            --mono: 'SF Mono', 'Fira Code', 'Monaco', 'Menlo', monospace;
            --bg-black: #000000;
            --text: #ffffff;
            --text-80: #e5e5e5;
            --text-60: #999999;
            --text-40: #666666;
            --border-light: rgba(255, 255, 255, 0.25);
            --border-subtle: rgba(255, 255, 255, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--sf-pro);
            background: var(--bg-black);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ========================================
           HEADER
           ======================================== */

        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-subtle);
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.5s ease;
        }

        .header.hidden {
            transform: translateY(-100%);
            opacity: 0;
        }

        .header-content {
            width: 100%;
            max-width: none;
            margin: 0;
            padding: 20px 80px;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
        }

        .header-logo {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.01em;
            color: var(--text);
            text-decoration: none;
        }

        .header-center {
            justify-self: center;
            font-family: var(--sf-pro);
            font-size: 10px;
            letter-spacing: 0.1em;
            color: var(--text-40);
            font-variant-numeric: tabular-nums;
            line-height: 1;
            text-transform: uppercase;
        }

        .header-right {
            display: flex;
            align-items: center;
            justify-self: end;
            gap: 16px;
        }

        .menu-icon {
            width: 29px;
            height: 29px;
            position: relative;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .menu-icon span {
            display: block;
            background: #fff;
            height: 1.5px;
            border-radius: 1px;
            position: absolute;
            left: 3.5px;
            width: 22px;
            transition: all 0.3s ease;
        }

        .menu-icon span:nth-child(1) {
            top: 9px;
        }

        .menu-icon span:nth-child(2) {
            top: 17px;
        }

        .menu-icon:hover span:nth-child(2) {
            width: 14px;
        }

        /* ========================================
           MENU OVERLAY
           ======================================== */

        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            z-index: 999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .menu-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .menu-overlay-items {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 32px;
            text-align: center;
        }

        .menu-overlay-link {
            font-family: var(--sf-pro);
            font-size: clamp(2rem, 6vw, 4rem);
            font-weight: 300;
            letter-spacing: -0.02em;
            color: var(--text-60);
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .menu-overlay-link:hover {
            color: var(--text);
            transform: scale(1.05);
        }

        .menu-overlay-cta {
            margin-top: 40px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-family: var(--sf-pro);
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.01em;
            color: var(--text);
            text-decoration: none;
            padding: 9px 14px;
            border: 1px solid rgba(255, 255, 255, 0.34);
            border-radius: 999px;
            background: transparent;
            transition: all 0.3s ease;
        }

        .menu-overlay-cta:hover {
            background: var(--text);
            border-color: var(--text);
            color: var(--bg-black);
        }

        .menu-overlay-footer {
            position: absolute;
            bottom: 40px;
            display: flex;
            gap: 40px;
        }

        .menu-overlay-footer a {
            font-family: var(--sf-pro);
            font-size: 10px;
            letter-spacing: 0.1em;
            color: var(--text-40);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .menu-overlay-footer a:hover {
            color: var(--text);
        }

        /* ========================================
           GRADIENT BACKGROUNDS
           ======================================== */

        .gradient-obsidian {
            background: linear-gradient(135deg, #070b34 0%, #2f6bff 46%, #8fd3ff 100%);
        }

        .gradient-velvet {
            background: linear-gradient(135deg, #1b0033 0%, #7a1fff 45%, #ff4fcf 100%);
        }

        .gradient-midnight {
            background: linear-gradient(135deg, #001a14 0%, #00a86b 44%, #9effc8 100%);
        }

        .gradient-ocean {
            background: linear-gradient(135deg, #001b2e 0%, #0077ff 44%, #00d1ff 100%);
        }

        .gradient-sunset {
            background: linear-gradient(135deg, #2f0f00 0%, #ff5e00 40%, #ffcc00 100%);
        }

        .gradient-emerald {
            background: linear-gradient(135deg, #2a0a00 0%, #ff4d00 46%, #ffd166 100%);
        }

        .gradient-forest {
            background: linear-gradient(135deg, #051f10 0%, #10b85a 42%, #b4ff4a 100%);
        }

        .gradient-crimson {
            background: linear-gradient(135deg, #2b000f 0%, #ff2d55 46%, #ff9a3c 100%);
        }

        /* ========================================
           PROJECT HERO
           ======================================== */

        .project-hero {
            position: relative;
            aspect-ratio: 16 / 9;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 0 80px 80px;
            overflow: hidden;
        }

        .project-hero-gradient {
            position: absolute;
            inset: 0;
            opacity: 0.35;
            z-index: 0;
            /* background-attachment: fixed removed — it forced a full-page repaint on every scroll frame,
               especially combined with the blurred header backdrop-filter. Huge scroll perf win. */
        }

        .project-hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.4) 100%);
            z-index: 1;
        }

        .project-hero-content {
            position: relative;
            z-index: 2;
            max-width: 900px;
        }

        .project-hero-label {
            font-family: var(--sf-pro);
            font-size: 10px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--text-60);
            margin-bottom: 24px;
        }

        .project-hero-title {
            font-family: var(--sf-pro);
            font-size: clamp(2.5rem, 6vw, 5rem);
            font-weight: 300;
            letter-spacing: -0.03em;
            line-height: 1.05;
            color: var(--text);
            margin-bottom: 32px;
        }

        .project-hero-url {
            font-family: var(--mono);
            font-size: 12px;
            letter-spacing: 0.05em;
            color: var(--text-40);
        }

        .project-hero-url a {
            color: var(--text-40);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .project-hero-url a:hover {
            color: var(--text);
        }

        /* ========================================
           SECTION SHARED
           ======================================== */

        .section {
            padding: 120px 80px;
            border-top: 1px solid var(--border-subtle);
        }

        .section-label {
            font-family: var(--sf-pro);
            font-size: 10px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--text-40);
            margin-bottom: 40px;
        }

        /* ========================================
           OVERVIEW — EDITORIAL REDESIGN
           ======================================== */

        .overview {
            padding: 0 80px;
        }

        /* Staggered reveal */
        [data-reveal-child] {
            opacity: 0;
            transform: translateY(28px);
            transition:
                opacity 0.7s cubic-bezier(0.16, 1, 0.3, 1),
                transform 0.7s cubic-bezier(0.16, 1, 0.3, 1);
        }

        [data-reveal-child].is-revealed {
            opacity: 1;
            transform: translateY(0);
        }

        /* Zone 1: Metadata */
        .overview__meta {
            padding: 100px 0 0;
        }

        .overview__meta-list {
            display: flex;
            gap: 64px;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .overview__meta-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .overview__label {
            font-family: var(--sf-pro);
            font-size: 10px;
            font-weight: 400;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--text-40);
            line-height: 1;
        }

        .overview__value {
            font-family: var(--sf-pro);
            font-size: 14px;
            font-weight: 400;
            color: var(--text-60);
            line-height: 1.5;
            letter-spacing: 0.01em;
        }

        /* Zone 2: Statement */
        .overview__statement {
            padding: 80px 0 100px;
            /* max-width: 70% removed — was clamping the paragraph too narrow and leaving
               the right half of the row empty. Now fills the same measure as the narrative
               block below it. */
        }

        .overview__statement-text {
            font-family: var(--sf-pro);
            font-size: clamp(1.8rem, 3vw, 2.8rem);
            font-weight: 200;
            line-height: 1.35;
            color: var(--text);
            letter-spacing: -0.025em;
        }

        /* Zone 3: Narrative */
        .overview__narrative {
            display: grid;
            grid-template-columns: 5fr 1fr 6fr;
            gap: 0;
            padding-bottom: 100px;
        }

        .overview__narrative-block {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .overview__narrative-block--challenge {
            grid-column: 1 / 2;
            padding-right: 40px;
        }

        .overview__narrative-block--solution {
            grid-column: 3 / 4;
            padding-top: 0;
        }

        .overview__narrative-text {
            font-family: var(--sf-pro);
            font-size: clamp(0.95rem, 1.15vw, 1.1rem);
            font-weight: 300;
            line-height: 1.75;
            color: var(--text-60);
            letter-spacing: 0.005em;
        }

        /* Zone 4: Metrics */
        .overview__metrics {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            padding: 64px 0 120px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }

        .overview__metric {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 40px 24px 40px 0;
        }

        .overview__metric-value {
            font-family: var(--mono);
            font-size: clamp(2.2rem, 3.5vw, 3.2rem);
            font-weight: 200;
            letter-spacing: -0.03em;
            line-height: 1;
            color: var(--text);
            font-variant-numeric: tabular-nums;
        }

        .overview__metric-label {
            font-family: var(--sf-pro);
            font-size: 10px;
            font-weight: 400;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--text-40);
            line-height: 1.5;
            max-width: 180px;
        }

        /* Animated metallic text — gold + silver, looped */
        .metal-text {
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            background-size: 200% 100%;
            animation: metal-sweep 16s linear infinite;
            font-weight: 400;
        }
        .metal-text.gold {
            background-image: linear-gradient(
                100deg,
                #7a5a1c 0%,
                #c89a3a 18%,
                #f3d77a 32%,
                #fff3b8 42%,
                #f3d77a 52%,
                #c89a3a 68%,
                #7a5a1c 82%,
                #c89a3a 100%
            );
        }
        .metal-text.silver {
            background-image: linear-gradient(
                100deg,
                #6a6a6f 0%,
                #a8a8ad 18%,
                #e5e5ea 32%,
                #ffffff 42%,
                #e5e5ea 52%,
                #a8a8ad 68%,
                #6a6a6f 82%,
                #a8a8ad 100%
            );
        }
        @keyframes metal-sweep {
            0%   { background-position: 200% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ========================================
           SHOWCASE GALLERY
           ======================================== */

        .showcase-gallery {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
            width: 100%;
            grid-auto-rows: auto;
        }

        .showcase-item {
            position: relative;
            overflow: hidden;
            aspect-ratio: 16 / 9;
        }

        .showcase-item.full {
            grid-column: 1 / -1;
        }

        .showcase-item.half {
            aspect-ratio: unset;
        }

        .showcase-item.half img,
        .showcase-item.half video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .showcase-item:has(.showcase-colorstrip) {
            aspect-ratio: unset;
        }
        .showcase-colorstrip {
            display: flex;
            width: 100%;
        }
        .showcase-colorstrip > div {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 12px 14px;
        }
        .showcase-colorstrip .cs-role {
            font-family: var(--sf-pro);
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.02em;
            margin-bottom: 6px;
        }
        .showcase-colorstrip .cs-meta {
            font-family: var(--mono);
            font-size: 7.5px;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            opacity: 0.45;
            line-height: 1.8;
        }

        /* Standard Bank royal-blue slide — 3 large 3:4 screens scrolling left→right */
        .showcase-item.has-sbscreens {
            aspect-ratio: 16 / 9;
            background: #0033A0;   /* Standard Bank royal blue */
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
        }
        .showcase-item.has-sbscreens .sbs-track {
            display: flex;
            align-items: center;
            width: max-content;
            height: 100%;
            animation: sbs-marquee 40s linear infinite;
            animation-delay: -17s;   /* start mid-cycle so page load looks already in motion */
        }
        /* Images are pre-cropped — cells fit each image's natural aspect (1848/2715).
           Aspect-ratio reserves the layout space before the image loads (no snap),
           and a fade-in smooths the pop as each arrives. */
        .showcase-item.has-sbscreens .sbs-cell {
            height: 75%;
            aspect-ratio: 1848 / 2715;
            flex-shrink: 0;
            margin-right: 40px;
            box-shadow: 0 24px 80px -30px rgba(0,0,0,0.5);
            display: flex;
            align-items: stretch;
            overflow: hidden;
            background: #0b1f5c;   /* slightly darker blue placeholder — hides any flash */
        }
        .showcase-item.has-sbscreens .sbs-cell img {
            height: 100%;
            width: 100%;
            object-fit: cover;
            display: block;
            opacity: 0;
            transition: opacity .8s cubic-bezier(.22, 1, .36, 1);
        }
        .showcase-item.has-sbscreens .sbs-cell img.loaded,
        .showcase-item.has-sbscreens .sbs-cell img[data-loaded="true"] {
            opacity: 1;
        }
        /* Icon fallback — only applies when no images provided */
        .showcase-item.has-sbscreens .sbs-cell.sbs-cell-icon {
            aspect-ratio: 3 / 4;
            width: min(36vw, 420px);
            height: auto;
            background: #ffffff;
            border: 1px solid rgba(255,255,255,0.12);
            align-items: center;
            justify-content: center;
            color: rgba(18,16,16,0.22);
        }
        .showcase-item.has-sbscreens .sbs-cell.sbs-cell-icon svg {
            width: 28px;
            height: 28px;
            display: block;
            opacity: .85;
        }
        @keyframes sbs-marquee {
            0%   { transform: translateX(-50%); }
            100% { transform: translateX(0); }
        }
        @media (max-width: 768px) {
            .showcase-item.has-sbscreens .sbs-cell { margin-right: 22px; height: 68%; }
            .showcase-item.has-sbscreens .sbs-cell.sbs-cell-icon { width: min(62vw, 260px); height: auto; }
        }

        /* Standard Bank royal-blue cross-fade — single centered portrait, cycles through frames (documentary V6, no text).
           Height is 16:9 minus 50px — shorter than a standard slide; inner image scales proportionally via % height. */
        .showcase-item.has-sbcrossfade {
            aspect-ratio: auto;
            position: relative;
            width: 100%;
            height: 0;
            padding-bottom: calc(56.25% - 50px);
            background: #0033A0;
            overflow: hidden;
        }
        .showcase-item.has-sbcrossfade .sbx-stage {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .showcase-item.has-sbcrossfade .sbx-frame {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            animation: sbx-cycle 24s cubic-bezier(.22, 1, .36, 1) infinite;
        }
        .showcase-item.has-sbcrossfade .sbx-frame img {
            height: 82%;
            width: auto;
            max-width: 70%;
            object-fit: cover;
            display: block;
            filter: contrast(1.04);
            box-shadow: 0 40px 80px -30px rgba(0, 0, 0, 0.6);
        }
        .showcase-item.has-sbcrossfade .sbx-frame:nth-child(1) { animation-delay: 0s; }
        .showcase-item.has-sbcrossfade .sbx-frame:nth-child(2) { animation-delay: -4s; }
        .showcase-item.has-sbcrossfade .sbx-frame:nth-child(3) { animation-delay: -8s; }
        .showcase-item.has-sbcrossfade .sbx-frame:nth-child(4) { animation-delay: -12s; }
        .showcase-item.has-sbcrossfade .sbx-frame:nth-child(5) { animation-delay: -16s; }
        .showcase-item.has-sbcrossfade .sbx-frame:nth-child(6) { animation-delay: -20s; }
        @keyframes sbx-cycle {
            0%, 1%   { opacity: 0; }
            4%, 16%  { opacity: 1; }
            19%, 100%{ opacity: 0; }
        }
        @media (max-width: 768px) {
            .showcase-item.has-sbcrossfade .sbx-frame img { height: 72%; max-width: 82%; }
        }

        /* Standard Bank royal-blue DARKROOM — photo-paper cream cells with image developing from invert/contrast
           into positive, wet-sheen pass, on infinite loop. No text. Replaces sbcrossfade as the main SB marquee. */
        .showcase-item.has-sbdarkroom {
            aspect-ratio: auto;
            position: relative;
            width: 100%;
            height: 0;
            padding-bottom: calc(56.25% - 50px);
            background: #111;                       /* matches original V5 darkroom backdrop, not royal blue */
            overflow: hidden;
        }
        .showcase-item.has-sbdarkroom .sbd-grid {
            position: absolute;
            inset: 10% 6%;
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 14px;
            align-items: center;
        }
        .showcase-item.has-sbdarkroom .sbd-cell {
            aspect-ratio: 1848 / 2715;
            position: relative;
            overflow: hidden;
            background: #e8e2d0;                       /* blank photo paper cream before image develops */
            box-shadow: 0 22px 50px -22px rgba(0, 0, 0, 0.55);
        }
        /* Images display static — no develop filter, no shine sweep. Keeps the V5 darkroom
           layout (cream paper cells on royal blue) without the kinetic effect. */
        .showcase-item.has-sbdarkroom .sbd-cell img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        @media (max-width: 768px) {
            .showcase-item.has-sbdarkroom .sbd-grid { inset: 8% 4%; gap: 8px; }
        }

        /* Standard Bank stat-pair — 2-card layout on a white background for contrast.
           Left: royal-blue card with animated % + body copy + SB shield.
           Right: image (or dark placeholder until artwork is supplied). */
        .showcase-item.has-sbstatpair {
            aspect-ratio: auto;
            background: #ffffff;
            /* Match reference: cards flush to left/right edges, generous white above/below and between. */
            padding: clamp(50px, 7vw, 110px) 0;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: clamp(40px, 6vw, 96px);
            align-items: stretch;
        }
        .sbsp-card {
            position: relative;
            overflow: hidden;
            aspect-ratio: 16 / 9;
        }
        .sbsp-card-stat {
            background: #0033A0;
            padding: clamp(28px, 4vw, 56px);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }
        /* Scoped under .showcase-item.has-sbstatpair so it beats the global .showcase-item img {width:100%} rule */
        .showcase-item.has-sbstatpair .sbsp-logo {
            position: absolute;
            top: clamp(20px, 2.6vw, 36px);
            right: clamp(20px, 2.6vw, 36px);
            width: clamp(22px, 1.9vw, 32px);
            height: auto;
            display: block;
            opacity: 0.9;
            object-fit: contain;
        }
        .sbsp-eyebrow {
            position: absolute;
            top: clamp(22px, 2.8vw, 40px);
            left: clamp(22px, 3vw, 44px);
            font-family: var(--sf-pro);
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.72);
            z-index: 2;
        }
        .sbsp-stat-row {
            display: flex;
            align-items: flex-end;
            gap: clamp(18px, 2.4vw, 36px);
        }
        .sbsp-stat-num {
            font-family: var(--sf-pro);
            font-size: clamp(64px, 10vw, 168px);
            font-weight: 300;
            color: #ffffff;
            line-height: 0.88;

                                        <div class="doc-controls">
                                            <button class="doc-btn doc-play" aria-label="Pause"><svg class="i-pause" viewBox="0 0 24 24"><rect x="7" y="5" width="3.2" height="14" rx=".6"/><rect x="13.8" y="5" width="3.2" height="14" rx=".6"/></svg><svg class="i-play" viewBox="0 0 24 24" style="display:none"><polygon points="7,5 7,19 19,12"/></svg></button>
                                            <button class="doc-btn doc-mute" aria-label="Unmute"><svg class="i-muted" viewBox="0 0 24 24"><path d="M4 9v6h4l6 4V5L8 9H4z"/><line x1="16" y1="9" x2="22" y2="15" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" fill="none"/><line x1="22" y1="9" x2="16" y2="15" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" fill="none"/></svg><svg class="i-sound" viewBox="0 0 24 24" style="display:none"><path d="M4 9v6h4l6 4V5L8 9H4z"/><path d="M17 8.5a5 5 0 0 1 0 7" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round"/><path d="M19.5 6.5a8 8 0 0 1 0 11" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round"/></svg></button>
                                            <div class="doc-progress"><div class="doc-progress-fill"></div></div>
                                            <div class="doc-time">00:00 / --:--</div>
                                        </div>
                                        <div class="doc-endcard">
                                            <div class="doc-endcard-text">Thanks for watching.</div>
                                            <div class="doc-endcard-sub">End</div>
                                            <a href="/#work" class="mbtn" style="margin-top:28px" aria-label="Back to portfolio">
                                                <span class="mbtn-circle" aria-hidden="true"></span>
                                                <span class="mbtn-icon" aria-hidden="true">
                                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
                                                </span>
                                                <span class="mbtn-label">View More Work</span>
                                            </a>
                                        </div>
                                       </div>`
                                    : img.type === 'video'
                                    ? `<iframe src="${img.src}" loading="lazy" title="${img.caption}" frameborder="0" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe>`
                                    : img.type === 'mp4'
                                    ? `<video src="${img.src}" autoplay muted loop playsinline preload="metadata" poster="${img.poster || ''}" class="${img.effect === 'cinematic-zoom' ? 'cinematic-zoom' : ''}" style="width:100%;height:100%;object-fit:cover;display:block;background:#000;"></video>`
                                    : img.type === 'slideshow'
                                    ? `<div class="showcase-slideshow" data-interval="${img.interval || 1500}">${img.src.map((s, i) => `<img src="${s}" alt="${img.caption}" loading="lazy" class="${i === 0 ? 'active' : ''}">`).join('')}</div>`
                                    : img.type === 'bwsplit'
                                    ? `<div class="bw-split"></div>`
                                    : img.type === 'sbcrossfade'
                                    ? `<div class="sbx-stage">${(img.images || []).map(u => `<div class="sbx-frame"><img src="${u}" alt="" loading="lazy" decoding="async" fetchpriority="low"></div>`).join('')}</div>`
                                    : img.type === 'sbdarkroom'
                                    ? `<div class="sbd-grid">${(img.images || []).map(u => `<div class="sbd-cell"><img src="${u}" alt="" loading="lazy" decoding="async" fetchpriority="low"></div>`).join('')}</div>`
                                    : img.type === 'sbstatpair'
                                    ? (() => {
                                        const sbShield = `<img class="sbsp-logo" src="https://res.cloudinary.com/dzgqzeebg/image/upload/f_auto,q_auto,w_200,c_limit/v1776556065/logo_STB_dv8toe.webp" alt="Standard Bank" loading="lazy" decoding="async">`;
                                        const placeholderSvg = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="1"/><circle cx="9" cy="9" r="1.6"/><path d="M21 15l-4.5-4.5a1.5 1.5 0 0 0-2.12 0L3 21"/></svg>`;
                                        const target = parseInt(img.stat || '84', 10);
                                        const bodyText = img.body || 'Audience reaction was overwhelmingly positive — viewers described the campaign as emotional and said they felt represented.';
                                        const rightInner = img.imageSrc
                                            ? `<img src="${img.imageSrc}" alt="${img.imageCaption || ''}" loading="lazy" decoding="async">`
                                            : `<div class="sbsp-placeholder">${placeholderSvg}<span>Image placeholder</span></div>`;
                                        const rightClass = img.imageSrc ? 'sbsp-card sbsp-card-image has-image' : 'sbsp-card sbsp-card-image';
                                        const eyebrow = img.eyebrow != null ? img.eyebrow : 'Findings';
                                        return `
                                            <div class="sbsp-card sbsp-card-stat">
                                                ${eyebrow ? `<div class="sbsp-eyebrow">${eyebrow}</div>` : ''}
                                                ${sbShield}
                                                <div class="sbsp-stat-row">
                                                    <div class="sbsp-stat-num" data-count-to="${target}">0%</div>
                                                    <p class="sbsp-stat-body">${bodyText}</p>
                                                </div>
                                            </div>
                                            <div class="${rightClass}">${rightInner}</div>
                                        `;
                                    })()
                                    : img.type === 'sbscreens'
                                    ? (() => {
                                        const icon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="1"/><circle cx="9" cy="9" r="1.6"/><path d="M21 15l-4.5-4.5a1.5 1.5 0 0 0-2.12 0L3 21"/></svg>`;
                                        const hasImgs = Array.isArray(img.images) && img.images.length > 0;
                                        // Eager load + onload fade — avoids the layout snap and the "pop" when each image arrives.
                                        const cellsSource = hasImgs
                                            ? img.images.map((u, i) => `<div class="sbs-cell"><img src="${u}" alt="" width="1848" height="2715" loading="eager" decoding="async"${i < 3 ? ' fetchpriority="high"' : ''} onload="this.setAttribute('data-loaded','true')"></div>`).join('')
                                            : Array.from({length: img.count || 4}, () => `<div class="sbs-cell sbs-cell-icon">${icon}</div>`).join('');
                                        return `<div class="sbs-track">${cellsSource}${cellsSource}</div>`;
                                    })()
                                    : img.type === 'placeholders'
                                    ? (() => {
                                        const cellSvg = `<div class="ph-cell"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="1"/><circle cx="9" cy="9" r="1.6"/><path d="M21 15l-4.5-4.5a1.5 1.5 0 0 0-2.12 0L3 21"/></svg></div>`;
                                        const setA = Array.from({length: img.count || 8}, () => cellSvg).join('');
                                        const kicker = img.kicker || 'Conceptual illustration';
                                        const eyebrow = img.eyebrow != null ? img.eyebrow : 'For the campaign';
                                        const cta = img.ctaText || 'See more of my personal work';
                                        const ctaHref = img.ctaHref || 'https://www.instagram.com/motagomes_/';
                                        const igHref = img.igHref || ctaHref;
                                        const igSvg = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="4.5"/><circle cx="12" cy="12" r="4"/><circle cx="17.4" cy="6.6" r="1" fill="currentColor" stroke="none"/></svg>`;
                                        const arrow = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="13,6 19,12 13,18"/></svg>`;
                                        return `<div class="ph-kicker"><span>${kicker}</span>${eyebrow ? `<span>${eyebrow}</span>` : ''}</div>
                                                <div class="showcase-placeholders"><div class="ph-track">${setA}${setA}</div></div>
                                                <div class="ph-footer"><a class="ph-cta" href="${ctaHref}" target="_blank" rel="noopener">${cta} ${arrow}</a><a class="ph-ig" href="${igHref}" target="_blank" rel="noopener" aria-label="Instagram">${igSvg}</a></div>`;
                                    })()
                                    : img.type === 'colorstrip'
                                    ? `<div class="showcase-colorstrip">${img.colors.map((c, ci) => { const hex = c.replace('#',''); const r = parseInt(hex.substr(0,2),16); const g = parseInt(hex.substr(2,2),16); const b = parseInt(hex.substr(4,2),16); const lum = (r*299+g*587+b*114)/1000; const tc = lum > 140 ? '#000' : '#fff'; const pnt = img.pantones && img.pantones[ci] ? img.pantones[ci] : ''; const role = img.roles && img.roles[ci] ? img.roles[ci] : ''; return `<div style="background:${c};color:${tc}">${role ? `<div class="cs-role">${role}</div>` : ''}<div class="cs-meta">${c.toUpperCase()}${pnt ? '<br>' + pnt : ''}</div></div>`; }).join('')}</div>`
                                    : `<img src="${img.src}" alt="${img.caption}" loading="lazy"${img.style ? ` style="${img.style}"` : ''}>`}
                            </div>
                        `).join('')}
                    </div>
                </section>
                ` : ''}

                <!-- FOOTER NAVIGATION -->
                <nav class="footer-nav">
                    <div class="footer-nav-inner">
                        <a href="/#work" class="footer-nav-link">Back</a>
                        <a href="project.html?p=${prevSlug}" class="footer-nav-link">${prevProject.client}</a>
                        <a href="project.html?p=${nextSlug}" class="footer-nav-link">${nextProject.client}</a>
                        <a href="/" class="footer-nav-link">Main Menu</a>
                    </div>
                </nav>
            </div>
        `;

        // Observe sections for reveal animation
        initRevealObserver();
    }

    /* ========================================
       SECTION REVEAL ON SCROLL
       ======================================== */

    function initRevealObserver() {
        // Legacy data-reveal sections
        const sections = document.querySelectorAll('[data-reveal]');
        const sectionObserver = new IntersectionObserver((entries) => {
            entries.forEach((entry, i) => {
                if (entry.isIntersecting) {
                    entry.target.style.animationDelay = `${i * 0.08}s`;
                    entry.target.classList.add('visible');
                    sectionObserver.unobserve(entry.target);
                }
            });
        }, {
            threshold: 0.12,
            rootMargin: '0px 0px -40px 0px'
        });
        sections.forEach(s => sectionObserver.observe(s));

        // Staggered reveal groups (editorial overview)
        const groups = document.querySelectorAll('[data-reveal-group]');
        const childObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const children = entry.target.querySelectorAll('[data-reveal-child]');
                    children.forEach((child, i) => {
                        setTimeout(() => {
                            child.classList.add('is-revealed');
                        }, i * 120);
                    });
                    childObserver.unobserve(entry.target);
                }
            });
        }, {
            threshold: 0.08,
            rootMargin: '0px 0px -60px 0px'
        });
        groups.forEach(g => childObserver.observe(g));
    }

    /* ========================================
       HEADER SCROLL BEHAVIOR
       ======================================== */

    let lastScrollY = 0;
    let headerHidden = false;

    window.addEventListener('scroll', () => {
        const currentY = window.scrollY;
        if (currentY > 120 && currentY > lastScrollY && !headerHidden) {
            document.getElementById('header').classList.add('hidden');
            headerHidden = true;
        } else if (currentY < lastScrollY && headerHidden) {
            document.getElementById('header').classList.remove('hidden');
            headerHidden = false;
        }
        lastScrollY = currentY;
    }, { passive: true });

    /* ========================================
       GMT CLOCK
       ======================================== */

    function updateGMT() {
        const el = document.getElementById('gmtTime');
        if (!el) return;
        const fmt = new Intl.DateTimeFormat('en-GB', {
            timeZone: 'Europe/London',
            hour: '2-digit', minute: '2-digit',
            hour12: false
        });
        const offset = new Intl.DateTimeFormat('en-GB', {
            timeZone: 'Europe/London',
            timeZoneName: 'short'
        }).formatToParts(new Date()).find(p => p.type === 'timeZoneName');
        const tz = offset ? offset.value : 'GMT';
        el.textContent = tz + ' ' + fmt.format(new Date());
    }

    updateGMT();
    setInterval(updateGMT, 1000);

    /* ========================================
       HAMBURGER MENU
       ======================================== */

    const hamburger = document.getElementById('hamburger');
    const menuOverlay = document.getElementById('menuOverlay');
    const menuLinks = document.querySelectorAll('.menu-overlay-link, .menu-overlay-cta');

    hamburger.addEventListener('click', () => {
        menuOverlay.classList.toggle('active');
    });

    menuLinks.forEach(link => {
        link.addEventListener('click', () => {
            menuOverlay.classList.remove('active');
        });
    });

    // Close menu on Escape
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && menuOverlay.classList.contains('active')) {
            menuOverlay.classList.remove('active');
        }
    });

    /* ========================================
       RENDER
       ======================================== */

    const slug = getSlug();
    renderProject(slug);

    // Showcase slideshows
    document.querySelectorAll('.showcase-slideshow').forEach(ss => {
        const imgs = ss.querySelectorAll('img');
        if (imgs.length < 2) return;
        let current = 0;
        const interval = parseInt(ss.dataset.interval) || 1500;
        setInterval(() => {
            imgs[current].classList.remove('active');
            current = (current + 1) % imgs.length;
            imgs[current].classList.add('active');
        }, interval);
    });

    // Cinematic zoom-out — restart on each video loop via Web Animations API (no DOM thrash)
    document.querySelectorAll('video.cinematic-zoom').forEach(v => {
        let lastTime = 0;
        v.addEventListener('timeupdate', () => {
            if (v.currentTime < lastTime - 0.5) {
                // seek every running CSS animation on this element back to 0 and keep it playing
                v.getAnimations().forEach(a => {
                    try { a.currentTime = 0; a.play(); } catch(e) {}
                });
            }
            lastTime = v.currentTime;
        });
    });

    // Documentary click-to-play with custom controls — uses the official Vimeo Player SDK
    function fmtTime(s) {
        if (!isFinite(s) || s < 0) return '--:--';
        const m = Math.floor(s / 60);
        const r = Math.floor(s % 60);
        return String(m).padStart(2,'0') + ':' + String(r).padStart(2,'0');
    }
    // Lazy-load Vimeo Player SDK once, shared across all doc-players on the page
    let vimeoSdkPromise = null;
    function loadVimeoSdk() {
        if (window.Vimeo && window.Vimeo.Player) return Promise.resolve();
        if (vimeoSdkPromise) return vimeoSdkPromise;
        vimeoSdkPromise = new Promise((resolve, reject) => {
            const s = document.createElement('script');
            s.src = 'https://player.vimeo.com/api/player.js';
            s.async = true;
            s.onload = resolve;
            s.onerror = reject;
            document.head.appendChild(s);
        });
        return vimeoSdkPromise;
    }

    document.querySelectorAll('.doc-player').forEach(dp => {
        const playBtn = dp.querySelector('.doc-play');
        const muteBtn = dp.querySelector('.doc-mute');
        const iPlay  = playBtn && playBtn.querySelector('.i-play');
        const iPause = playBtn && playBtn.querySelector('.i-pause');
        const iSound = muteBtn && muteBtn.querySelector('.i-sound');
        const iMuted = muteBtn && muteBtn.querySelector('.i-muted');
        const fill = dp.querySelector('.doc-progress-fill');
        const time = dp.querySelector('.doc-time');
        const progress = dp.querySelector('.doc-progress');
        let player = null;
        let duration = 0;
        let isPlaying = false;
        let isMuted = false;
        let hideTimer = null;

        const setPlayUI = (playing) => {
            isPlaying = playing;
            if (iPlay && iPause) {
                iPlay.style.display  = playing ? 'none' : 'block';
                iPause.style.display = playing ? 'block' : 'none';
            }
            if (playBtn) playBtn.setAttribute('aria-label', playing ? 'Pause' : 'Play');
        };
        const setMuteUI = (muted) => {
            isMuted = muted;
            if (iSound && iMuted) {
                iSound.style.display = muted ? 'none' : 'block';
                iMuted.style.display = muted ? 'block' : 'none';
            }
            if (muteBtn) muteBtn.setAttribute('aria-label', muted ? 'Unmute' : 'Mute');
        };
        const scheduleHide = () => {
            clearTimeout(hideTimer);
            hideTimer = setTimeout(() => dp.classList.remove('show-controls'), 2600);
        };

        const startPlayback = () => {
            if (dp.classList.contains('playing')) return;
            const src = dp.dataset.src;
            // Build the Vimeo iframe — chromeless
            const frame = document.createElement('iframe');
            frame.className = 'doc-frame';
            const url = src
                + (src.indexOf('?') > -1 ? '&' : '?')
                + 'autoplay=1&controls=0&title=0&byline=0&portrait=0&dnt=1';
            frame.src = url;
            frame.title = dp.querySelector('.doc-title')?.textContent || 'Documentary';
            frame.setAttribute('frameborder', '0');
            frame.setAttribute('allow', 'autoplay; fullscreen; picture-in-picture');
            frame.setAttribute('allowfullscreen', '');
            dp.appendChild(frame);
            dp.classList.add('playing', 'show-controls');
            setPlayUI(true);
            setMuteUI(false);
            scheduleHide();

            loadVimeoSdk().then(() => {
                player = new Vimeo.Player(frame);
                player.ready().then(() => {
                    player.setVolume(1).catch(()=>{});
                    player.getDuration().then(d => {
                        duration = d || 0;
                        if (time) time.textContent = '00:00 / ' + fmtTime(duration);
                    }).catch(()=>{});
                });
                player.on('play',  () => { setPlayUI(true); dp.classList.remove('ended'); });
                player.on('pause', () => setPlayUI(false));
                player.on('ended', () => { setPlayUI(false); dp.classList.add('ended'); });
                player.on('timeupdate', data => {
                    duration = data.duration || duration;
                    if (fill && duration) fill.style.width = (data.seconds / duration * 100) + '%';
                    if (time) time.textContent = fmtTime(data.seconds) + ' / ' + fmtTime(duration);
                });
                player.on('volumechange', data => {
                    setMuteUI((data.volume || 0) === 0);
                });
            }).catch(err => console.warn('Vimeo SDK failed to load', err));
        };

        // Poster click starts playback
        dp.addEventListener('click', (e) => {
            if (dp.classList.contains('playing')) return;
            if (e.target.closest('.doc-controls')) return;
            startPlayback();
        });

        // While playing: keep controls visible on hover or mousemove
        dp.addEventListener('mousemove', () => {
            if (!dp.classList.contains('playing')) return;
            dp.classList.add('show-controls');
            scheduleHide();
        });

        // Play / pause button
        playBtn && playBtn.addEventListener('click', async (e) => {
            e.stopPropagation();
            if (!player) return;
            try {
                if (isPlaying) await player.pause();
                else           await player.play();
            } catch (err) {
                // Browser blocked play — retry muted as a recovery path
                try { await player.setVolume(0); setMuteUI(true); await player.play(); } catch (_) {}
            }
            scheduleHide();
        });

        // Mute / unmute button
        muteBtn && muteBtn.addEventListener('click', async (e) => {
            e.stopPropagation();
            if (!player) return;
            try { await player.setVolume(isMuted ? 1 : 0); } catch(_){}
            scheduleHide();
        });

        // Scrub-bar click
        progress && progress.addEventListener('click', async (e) => {
            e.stopPropagation();
            if (!player || !duration) return;
            const rect = progress.getBoundingClientRect();
            const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
            try { await player.setCurrentTime(pct * duration); } catch(_){}
            scheduleHide();
        });
    });

    // YouTube custom player
    document.querySelectorAll('.yt-player').forEach(player => {
        const iframe = player.querySelector('iframe');
        const overlay = player.querySelector('.yt-overlay');
        const btn = player.querySelector('.yt-play-btn');
        let playing = false;

        function postMsg(action) {
            iframe.contentWindow.postMessage(JSON.stringify({event:'command', func: action, args:''}), '*');
        }

        overlay.addEventListener('click', () => {
            if (!playing) {
                iframe.style.pointerEvents = 'none';
                postMsg('playVideo');
                overlay.classList.add('playing');
                btn.innerHTML = '<svg width="64" height="64" viewBox="0 0 64 64" fill="none"><circle cx="32" cy="32" r="31" stroke="white" stroke-width="2"/><rect x="22" y="20" width="6" height="24" rx="1" fill="white"/><rect x="36" y="20" width="6" height="24" rx="1" fill="white"/></svg>';
                playing = true;
            } else {
                postMsg('pauseVideo');
                overlay.classList.remove('playing');
                btn.innerHTML = '<svg width="64" height="64" viewBox="0 0 64 64" fill="none"><circle cx="32" cy="32" r="31" stroke="white" stroke-width="2"/><polygon points="26,20 26,44 46,32" fill="white"/></svg>';
                playing = false;
            }
        });
    });

    // Count-up animation for sbstatpair stat numbers (triggers once when scrolled into view).
    // Uses requestAnimationFrame + ease-out cubic for a smooth, restrained feel — no spring overshoot.
    const statNums = document.querySelectorAll('.sbsp-stat-num[data-count-to]');
    if (statNums.length && 'IntersectionObserver' in window) {
        const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const statObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (!entry.isIntersecting) return;
                const el = entry.target;
                const target = parseInt(el.dataset.countTo, 10) || 0;
                if (prefersReduced) {
                    el.textContent = target + '%';
                    statObserver.unobserve(el);
                    return;
                }
                const duration = 1800;
                const t0 = performance.now();
                const tick = (now) => {
                    const p = Math.min((now - t0) / duration, 1);
                    const eased = 1 - Math.pow(1 - p, 3); // ease-out cubic
                    el.textContent = Math.round(eased * target) + '%';
                    if (p < 1) requestAnimationFrame(tick);
                };
                requestAnimationFrame(tick);
                statObserver.unobserve(el);
            });
        }, { threshold: 0.45 });
        statNums.forEach(el => statObserver.observe(el));
    }

    </script>
</body>
