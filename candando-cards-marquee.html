<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Candando Cards — Marquee</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{width:100%;height:100%;overflow:hidden;background:#f6f4f1;
    font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;}
  .stage{position:absolute;inset:0;display:flex;align-items:center;overflow:hidden;background:#f6f4f1;}
  .marquee{display:flex;align-items:center;gap:clamp(20px,2.5vw,52px);width:max-content;
    padding:0 clamp(20px,2.5vw,52px);
    animation:scroll-right 45s linear infinite;will-change:transform;}
  /* left-to-right motion: row starts shifted left, slides to 0 */
  @keyframes scroll-right{
    from{transform:translateX(0);}
    to  {transform:translateX(-50%);}
  }
  .card{height:59.5vh;width:auto;flex-shrink:0;display:block;object-fit:contain;
    border-radius:16px;filter:drop-shadow(0 24px 44px rgba(0,0,0,0.16));}
  .stage:hover .marquee{animation-play-state:paused;}
</style>
</head>
<body>
<div class="stage">
  <div class="marquee">
    <img class="card" src="/assets/v1782423020_ioqjsnmmcwwowiztizxf.jpg" alt="Candando gift card">
    <img class="card" src="/assets/v1782423022_isqgtd6qhypi8xu7jh18.jpg" alt="Candando gift card">
    <img class="card" src="/assets/v1782423023_rfkm3jjbftha1sfquihl.jpg" alt="Candando gift card">
    <img class="card" src="/assets/v1782423026_fyhhz5vief0ayswxbvff.webp" alt="Candando gift card">
    <img class="card" src="/assets/v1782423642_z6hin6cuxixwmrfz2to7.jpg" alt="Candando gift card">
    <img class="card" src="/assets/v1782423020_ioqjsnmmcwwowiztizxf.jpg" alt="" aria-hidden="true">
    <img class="card" src="/assets/v1782423022_isqgtd6qhypi8xu7jh18.jpg" alt="" aria-hidden="true">
    <img class="card" src="/assets/v1782423023_rfkm3jjbftha1sfquihl.jpg" alt="" aria-hidden="true">
    <img class="card" src="/assets/v1782423026_fyhhz5vief0ayswxbvff.webp" alt="" aria-hidden="true">
    <img class="card" src="/assets/v1782423642_z6hin6cuxixwmrfz2to7.jpg" alt="" aria-hidden="true">
  </div>
</div>
</body>
</html>
