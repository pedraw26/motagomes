<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mota Gomes — Coming Soon</title>
<meta name="description" content="A new portfolio site is on the way.">
<link rel="icon" type="image/png" href="https://res.cloudinary.com/dzgqzeebg/image/upload/v1760000000/favicon.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #ffffff;
    color: #111111;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow: hidden;
  }

  .stage {
    position: relative;
    width: 100%;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px;
  }

  /* Top bar */
  .topbar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    padding: 28px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 10;
  }

  .logo {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.02em;
    color: #111;
  }

  .clock {
    font-size: 12px;
    font-weight: 500;
    color: rgba(0,0,0,0.45);
    letter-spacing: 0.1em;
    font-variant-numeric: tabular-nums;
  }

  /* Main content */
  .content {
    text-align: center;
    max-width: 640px;
    position: relative;
    z-index: 2;
  }

  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px;
    border: 1px solid rgba(0,0,0,0.12);
    border-radius: 100px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(0,0,0,0.55);
    margin-bottom: 32px;
  }

  .status-pill .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #ff5722;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(1.3); }
  }

  h1 {
    font-size: clamp(44px, 7vw, 88px);
    font-weight: 700;
    line-height: 1;
    letter-spacing: -0.03em;
    color: #111;
    margin-bottom: 24px;
  }

  h1 .ital {
    font-style: italic;
    font-weight: 300;
    color: rgba(0,0,0,0.4);
  }

  .lede {
    font-size: 16px;
    font-weight: 400;
    line-height: 1.6;
    color: rgba(0,0,0,0.55);
    max-width: 460px;
    margin: 0 auto 48px;
  }

  /* Login */
  .login-wrap {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 6px 6px 6px 20px;
    border: 1px solid rgba(0,0,0,0.15);
    border-radius: 100px;
    background: rgba(0,0,0,0.02);
    transition: border-color .25s ease, background .25s ease;
    min-width: 320px;
  }

  .login-wrap:focus-within {
    border-color: rgba(0,0,0,0.35);
    background: #ffffff;
  }

  .login-wrap.error {
    border-color: #ff3b30;
    animation: shake .35s ease;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-5px); }
    75% { transform: translateX(5px); }
  }

  .login-wrap input {
    flex: 1;
    border: none;
    outline: none;
    background: transparent;
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    color: #111;
    padding: 10px 0;
    letter-spacing: 0.02em;
  }

  .login-wrap input::placeholder {
    color: rgba(0,0,0,0.35);
    font-weight: 400;
  }

  .login-wrap button {
    border: none;
    background: #111;
    color: #fff;
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 10px 20px;
    border-radius: 100px;
    cursor: pointer;
    transition: background .2s ease, transform .2s ease;
  }

  .login-wrap button:hover {
    background: #333;
    transform: translateX(2px);
  }

  .login-wrap button:active {
    transform: scale(0.97);
  }

  .hint {
    margin-top: 16px;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(0,0,0,0.35);
    min-height: 14px;
    transition: color .2s ease;
  }

  .hint.error { color: #ff3b30; }

  /* Footer */
  .footer {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 28px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 11px;
    color: rgba(0,0,0,0.4);
    letter-spacing: 0.05em;
    z-index: 10;
  }

  .footer .links {
    display: flex;
    gap: 20px;
  }

  .footer a {
    color: inherit;
    text-decoration: none;
    transition: color .2s ease;
  }

  .footer a:hover { color: #111; }

  /* Decorative ring */
  .ring {
    position: absolute;
    border: 1px solid rgba(0,0,0,0.06);
    border-radius: 50%;
    pointer-events: none;
    z-index: 1;
  }

  .ring-1 {
    width: 900px;
    height: 900px;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  .ring-2 {
    width: 1300px;
    height: 1300px;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  .ring-3 {
    width: 500px;
    height: 500px;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    border-color: rgba(0,0,0,0.08);
  }

  @media (max-width: 640px) {
    .login-wrap { min-width: 0; width: 100%; max-width: 340px; }
    .topbar, .footer { padding: 20px; }
    .stage { padding: 20px; }
    .footer { flex-direction: column; gap: 8px; text-align: center; }
    .ring-1, .ring-2 { display: none; }
  }
</style>
</head>
<body>

<div class="stage">

  <!-- Decorative rings -->
  <div class="ring ring-2"></div>
  <div class="ring ring-1"></div>
  <div class="ring ring-3"></div>

  <!-- Top bar -->
  <div class="topbar">
    <div class="logo">MG</div>
    <div class="clock" id="clock">— — : — —</div>
  </div>

  <!-- Main content -->
  <div class="content">
    <div class="status-pill">
      <span class="dot"></span>
      <span>In the works</span>
    </div>

    <h1>Coming <span class="ital">soon.</span></h1>

    <p class="lede">
      A new portfolio is on the way. In the meantime, if you have the keys — come on in.
    </p>

    <form class="login-wrap" id="loginForm" autocomplete="off">
      <input type="password" id="pw" placeholder="Enter password" autocomplete="off" spellcheck="false">
      <button type="submit" id="enterBtn">Enter</button>
    </form>
    <div class="hint" id="hint">Press enter to continue</div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <div>© 2026 Mota Gomes</div>
    <div class="links">
      <a href="mailto:hello@motagomes.com">Email</a>
      <a href="https://www.linkedin.com/in/pedromotagomes" target="_blank" rel="noopener">LinkedIn</a>
      <a href="https://www.behance.net/pedromotagomes" target="_blank" rel="noopener">Behance</a>
    </div>
  </div>

</div>

<script>
  // Clock
  function tick() {
    const now = new Date();
    const h = String(now.getUTCHours()).padStart(2, '0');
    const m = String(now.getUTCMinutes()).padStart(2, '0');
    document.getElementById('clock').textContent = `GMT ${h}:${m}`;
  }
  tick();
  setInterval(tick, 10000);

  // Auto-forward if already unlocked this session
  if (sessionStorage.getItem('mg_unlocked') === '1') {
    window.location.replace('/portfolio.html');
  }

  const form = document.getElementById('loginForm');
  const input = document.getElementById('pw');
  const wrap = form;
  const hint = document.getElementById('hint');

  form.addEventListener('submit', function(e) {
    e.preventDefault();
    const val = input.value.trim().toLowerCase();
    if (val === 'motagomes') {
      sessionStorage.setItem('mg_unlocked', '1');
      hint.textContent = 'Welcome back —';
      hint.classList.remove('error');
      wrap.classList.remove('error');
      setTimeout(() => {
        window.location.href = '/portfolio.html';
      }, 450);
    } else {
      wrap.classList.add('error');
      hint.textContent = 'Incorrect password';
      hint.classList.add('error');
      input.value = '';
      setTimeout(() => {
        wrap.classList.remove('error');
      }, 400);
    }
  });

  input.addEventListener('input', function() {
    if (wrap.classList.contains('error')) {
      wrap.classList.remove('error');
      hint.textContent = 'Press enter to continue';
      hint.classList.remove('error');
    }
  });

  // Focus the input after a short delay
  setTimeout(() => input.focus(), 400);
</script>

</body>
</html>
