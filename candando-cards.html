<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Candando Cards</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    height: 100%;
    background: #ffffff;
    display: grid;
    place-items: center;
    font-family: "Inter", ui-sans-serif, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
    direction: ltr;
  }

  .carousel {
    position: relative;
    width: 100%;
    height: 100%;
  }

  /* ── Stage — fills the entire iframe so the slide background colours
     reach the frame edges ── */
  .stage {
    position: relative;
    width: 100%;
    height: 100%;
    overflow: hidden;
    border-radius: 0;
  }

  /* ── Slides — pure crossfade, no movement ── */
  .slide {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    z-index: 0;
    transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1);
    will-change: opacity;
  }
  .slide.is-active {
    opacity: 1;
    z-index: 2;
  }
  .slide.is-exiting {
    opacity: 0;
    z-index: 1;
  }

  .slide-1 { background: rgba(232, 174, 66,  0.27); }
  .slide-2 { background: rgba(194, 48,  71,  0.27); }
  .slide-3 { background: rgba(80, 145, 195, 0.27); }
  .slide-4 { background: rgba(225, 90,  52,  0.27); }

  /* ── Card — all variants exact same size, +40% ── */
  .card-img,
  .card-block {
    width: min(542px, 60%);
    aspect-ratio: 1692 / 1080;
    border-radius: 22px;
    box-shadow: 0 1px 0 rgba(0,0,0,0.04), 0 6px 14px rgba(24,24,24,0.06);
    background: #ffffff;
  }
  .card-img {
    object-fit: cover;
  }

  .slide-1 .card-block { background: rgb(232, 174, 66); }
  .slide-2 .card-block { background: rgb(194, 48,  71); }
  .slide-4 .card-block { background: rgb(225, 90,  52); }

  /* ── Dots ── */
  .dots {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-top: 20px;
  }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: rgba(0,0,0,0.18);
    cursor: pointer;
    border: none;
    padding: 0;
    transition: background 0.25s ease, transform 0.25s ease;
  }
  .dot:hover { background: rgba(0,0,0,0.4); }
  .dot.is-active {
    background: rgba(0,0,0,0.75);
    transform: scale(1.25);
  }
</style>
</head>
<body>

<div class="carousel" aria-label="Candando colour slides">
  <div class="stage" id="stage">
    <div class="slide slide-1 is-active">
      <div class="card-block"></div>
    </div>
    <div class="slide slide-2">
      <img class="card-img" src="https://res.cloudinary.com/dzgqzeebg/image/upload/f_auto,q_auto/v1777219506/atfmaczybm5gpkzukudn.png" alt="Candando gift card">
    </div>
    <div class="slide slide-3">
      <img class="card-img" src="https://res.cloudinary.com/dzgqzeebg/image/upload/f_auto,q_auto/v1777144117/candando-card-kid.png" alt="Candando gift card">
    </div>
    <div class="slide slide-4">
      <div class="card-block"></div>
    </div>
  </div>

</div>

<script>
  (() => {
    const slides   = [...document.querySelectorAll('.slide')];
    const dots     = [];
    const total    = slides.length;
    let current    = 0;
    let animating  = false;
    let timer      = null;

    function updateDots(idx) {
      dots.forEach((d, i) => {
        d.classList.toggle('is-active', i === idx);
        d.setAttribute('aria-selected', i === idx);
      });
    }

    function goTo(idx) {
      if (animating) return;
      const next = ((idx % total) + total) % total;
      if (next === current) return;
      animating = true;

      const outSlide = slides[current];
      const inSlide  = slides[next];

      /* outgoing: shrink + drift left */
      outSlide.classList.remove('is-active');
      outSlide.classList.add('is-exiting');

      /* incoming: slide in from right + grow */
      inSlide.classList.add('is-active');

      updateDots(next);
      current = next;

      /* clean up exiting class after transition */
      setTimeout(() => {
        outSlide.classList.remove('is-exiting');
        animating = false;
      }, 600);
    }

    function next() { goTo(current + 1); }

    function startAuto() {
      clearInterval(timer);
      timer = setInterval(next, 4500);
    }

    dots.forEach((d, i) => {
      d.addEventListener('click', () => { goTo(i); startAuto(); });
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight') { next(); startAuto(); }
      if (e.key === 'ArrowLeft')  { goTo(current - 1); startAuto(); }
    });

    startAuto();
  })();
</script>
</body>
</html>
