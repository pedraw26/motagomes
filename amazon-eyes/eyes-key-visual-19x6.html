  :root{ --hl-size:11.1; --sub-size:4.05; --sub-delay:0.9s; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{ background:#0779ff; display:flex; align-items:center; justify-content:center; }

  .stage{
    position:relative; width:100vw; aspect-ratio:19/6; max-height:100vh;
    background:#0779ff; overflow:hidden; container-type:size;
    display:flex; flex-direction:column; justify-content:center; padding:0 5cqw;
  }
  .headline{
    font-family:"AmazonEmberDisplay","Amazon Ember Display",-apple-system,sans-serif;
    font-weight:800; color:#fff; line-height:1.05; letter-spacing:-0.015em;
    font-kerning:normal; text-rendering:optimizeLegibility; font-feature-settings:"kern" 1,"liga" 1;
  }
  .headline .l1,.headline .l2{ display:block; font-size:calc(var(--hl-size)*1cqw); }
  .headline .g,.sub .g{ display:inline-block; }
  .headline .w{ display:inline-block; opacity:0; animation:wordIn 0.14s ease-out var(--d,0s) forwards; }
  .sp{ display:inline-block; width:0.26em; }
  .sub{
    font-family:"AmazonEmber","Amazon Ember",-apple-system,sans-serif;
    font-weight:500; color:#fff; font-size:calc(var(--sub-size)*1cqw); line-height:1;
    margin-top:2.4cqw; transform:translate(0cqw, -1.8cqw); letter-spacing:-0.012em;
    font-kerning:normal; text-rendering:optimizeLegibility; font-feature-settings:"kern" 1,"liga" 1;
    animation:subDrop 0.6s cubic-bezier(.22,.7,.24,1) var(--sub-delay) both;
  }
  @media (max-height:31.58vw){ .stage{ width:auto; height:100vh; aspect-ratio:19/6; } }

  @keyframes wordIn{ from{ opacity:0; } to{ opacity:1; } }
  @keyframes subDrop{
    from{ opacity:0; transform:translate(0cqw, calc(-1.8cqw - 0.32em)); }
    to{   opacity:1; transform:translate(0cqw, -1.8cqw); }
  }
  @media (prefers-reduced-motion:reduce){ .headline .w,.sub{ animation:none; opacity:1; } }

  /* language toggle */
  #lang{ position:fixed; top:16px; right:16px; z-index:20; display:flex; gap:4px;
    background:rgba(0,0,0,.18); padding:4px; border-radius:999px; backdrop-filter:blur(8px); }
  #lang button{ border:none; cursor:pointer; padding:7px 15px; border-radius:999px;
    font:600 12px/1 -apple-system,system-ui,sans-serif; letter-spacing:.06em; color:#fff;
    background:transparent; transition:background .18s; }
  #lang button.on{ background:#fff; color:#0779ff; }
  @media print{ #lang{ display:none; } }
</style>
</head>
<body>
  <div class="stage" id="stage"></div>

  <div id="lang">
    <button data-l="en" class="on">EN</button>
    <button data-l="es">ES</button>
    <button data-l="de">DE</button>
  </div>

<script>
  const G=(m,c)=>`<span class="g" style="margin-left:${m}em">${c}</span>`;
  const SP='<span class="sp"></span>';

  const LANGS={
    en:{
      hlSize:11.1, subSize:4.05,
      l1:[ G('-0.069','E')+G('0.012','y')+G('-0.025','e')+G('-0.011','s'),
           G('0','o')+G('-0.045','n') ],
      l2:[ G('0','t')+G('0','h')+G('-0.017','e'),
           G('0','d')+G('-0.019','e')+G('-0.01','a')+G('-0.040','l')+G('0.031','s')+G('0','.') ],
      sub:G('-0.065','P')+G('-0.013','r')+G('0.026','i')+G('-0.032','m')+G('-0.013','e')+SP
         +G('-0.026','D')+G('0.006','a')+G('0.019','y')+SP
         +G('0.026','i')+G('0','s')+SP
         +G('0','h')+G('-0.013','e')+G('-0.013','r')+G('0.022','e')+G('0','.')
    },
    es:{
      hlSize:8.7, subSize:3.7,
      l1:['Pon','los','ojos','en'],
      l2:['las','ofertas.'],
      sub:'Prime Day ya está aquí.'
    },
    de:{
      hlSize:8.7, subSize:3.7,
      l1:['Augen','auf'],
      l2:['die','Angebote.'],
      sub:'Prime Day ist da.'
    }
  };

  const root=document.documentElement, stage=document.getElementById('stage');
  function render(lang){
    const L=LANGS[lang];
    root.style.setProperty('--hl-size',L.hlSize);
    root.style.setProperty('--sub-size',L.subSize);
    const l1=L.l1.map(w=>`<span class="w">${w}</span>`).join(SP);
    const l2=L.l2.map(w=>`<span class="w">${w}</span>`).join(SP);
    stage.innerHTML=`<div class="headline"><span class="l1">${l1}</span><span class="l2">${l2}</span></div><div class="sub">${L.sub}</div>`;
    const ws=stage.querySelectorAll('.w');
    ws.forEach((w,i)=>w.style.setProperty('--d',(0.10+i*0.14).toFixed(2)+'s'));
    root.style.setProperty('--sub-delay',(0.10+ws.length*0.14+0.15).toFixed(2)+'s');
    document.documentElement.lang=lang;
    document.querySelectorAll('#lang button').forEach(x=>x.classList.toggle('on',x.dataset.l===lang));
    // seconds until this language's animation fully settles
    return 0.10 + ws.length*0.14 + 0.15 + 0.6;
  }

  const ORDER=['en','es','de'];
  const HOLD=2.2;                 // seconds held after the animation settles
  let idx=0, timer=null;
  function play(){
    const settle=render(ORDER[idx]);
    idx=(idx+1)%ORDER.length;
    timer=setTimeout(play,(settle+HOLD)*1000);
  }
  // manual jump: clicking a language takes over and keeps cycling from there
  document.querySelectorAll('#lang button').forEach(b=>{
    b.addEventListener('click',()=>{
      clearTimeout(timer);
      idx=ORDER.indexOf(b.dataset.l);
      play();
    });
  });
  play();
</script>
</body>
</html>
