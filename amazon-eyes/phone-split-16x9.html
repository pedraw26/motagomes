<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eyes on the Deals — OOH + Lock Screen</title>
<style>
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  /* frame is 3:2 -> two 3:4 halves fill it edge to edge */
  .frame{ width:100%; aspect-ratio:3/2; display:flex; overflow:hidden;
    font-family:-apple-system,"Helvetica Neue",system-ui,sans-serif; }
  .half{ flex:0 0 50%; width:50%; height:100%; overflow:hidden; }
  /* subway citylight poster fills its half */
  .half.subway img{ width:100%; height:100%; object-fit:cover; display:block; }
  /* iPhone 17 fills its half (white matches mockup bg) */
  .half.phone{ background:#ffffff; display:flex; align-items:center; justify-content:center; }
  .half.phone img{ height:98%; width:auto; max-width:100%; object-fit:contain; display:block; }
</style>
</head>
<body>
  <div class="frame">
    <div class="half subway"><img src="subway-poster.avif?v=3" alt="Amazon Eyes on the Deals — subway citylight poster"></div>
    <div class="half phone"><img src="iphone17.avif?v=1" alt="Amazon Eyes on the Deals — iPhone 17 lock-screen push notification"></div>
  </div>
</body>
</html>
