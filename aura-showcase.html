        var meta = numericTextMeta.find(function (item) { return item.el === el; });
        if (!meta) return;
        animateNumericLabel(meta, yellowTextDelay + i * yellowTextStagger, 1200);
      });

      var settleDelay = yellowTextDelay + yellowTexts.length * yellowTextStagger + 600;
      var settleDuration = 2400;
      allBaseStrokes.forEach(function (el) {
        var base = opacityOf(el);
        el.animate(
          [
            { opacity: base },
            { opacity: Math.max(0.18, base * 0.8) },
            { opacity: base }
          ],
          {
            duration: settleDuration,
            delay: settleDelay,
            iterations: 1,
            easing: "ease-in-out",
            fill: "forwards"
          }
        );
      });

      window.setTimeout(runSequence, 11600);
    }

    runSequence();
  })();
</script>
