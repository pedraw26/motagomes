<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Green Screen GIF Overlay</title>
  <style>
    :root {
      --screen-left: 23.09%;
      --screen-top: 14.88%;
      --screen-width: 54.19%;
      --screen-height: 54.09%;
      --edge-bleed: 0.18%;
      --ui-bg: rgba(12, 13, 12, 0.78);
      --ui-border: rgba(255, 255, 255, 0.16);
      --text: #f6f3ea;
      --muted: #c9c1b3;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #11110f;
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    .stage {
      position: relative;
      width: min(100vw, calc(100vh * 1672 / 941));
      aspect-ratio: 1672 / 941;
      overflow: hidden;
      background: #15130f;
    }

    .stage::before,
    .stage::after {
      content: "";
      position: absolute;
      pointer-events: none;
    }

    .stage::before {
      inset: 0;
      z-index: 4;
      opacity: 0.13;
      mix-blend-mode: screen;
      background-image:
        linear-gradient(90deg, transparent 0 18%, rgba(255, 255, 255, 0.12) 18.2% 18.35%, transparent 18.55% 100%),
        linear-gradient(90deg, transparent 0 67%, rgba(0, 0, 0, 0.18) 67.1% 67.2%, transparent 67.4% 100%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.08), transparent 34%, rgba(0, 0, 0, 0.06) 68%, transparent);
      background-size: 360px 100%, 520px 100%, 100% 42px;
      animation: filmWeave 2.8s steps(7) infinite;
    }

    .stage::after {
      inset: -35%;
      z-index: 5;
      opacity: 0.16;
      mix-blend-mode: overlay;
      background-image:
        radial-gradient(circle at 16% 22%, rgba(255, 255, 255, 0.7) 0 0.7px, transparent 1px),
        radial-gradient(circle at 64% 58%, rgba(0, 0, 0, 0.48) 0 0.8px, transparent 1.2px),
        radial-gradient(circle at 38% 84%, rgba(255, 255, 255, 0.42) 0 0.6px, transparent 1px),
        radial-gradient(circle at 82% 18%, rgba(0, 0, 0, 0.38) 0 0.7px, transparent 1.1px);
      background-size: 13px 13px, 19px 19px, 23px 23px, 31px 31px;
      animation: filmGrain 520ms steps(8) infinite;
    }

    @keyframes filmWeave {
      0% { transform: translate3d(0, 0, 0); opacity: 0.09; }
      28% { transform: translate3d(0.18%, -0.1%, 0); opacity: 0.14; }
      56% { transform: translate3d(-0.12%, 0.16%, 0); opacity: 0.11; }
      82% { transform: translate3d(0.08%, 0.08%, 0); opacity: 0.15; }
      100% { transform: translate3d(0, 0, 0); opacity: 0.09; }
    }

    @keyframes filmGrain {
      0% { transform: translate3d(0, 0, 0); }
      12% { transform: translate3d(-4%, 3%, 0); }
      25% { transform: translate3d(3%, -5%, 0); }
      37% { transform: translate3d(5%, 2%, 0); }
      50% { transform: translate3d(-2%, -3%, 0); }
      62% { transform: translate3d(4%, 5%, 0); }
      75% { transform: translate3d(-5%, -2%, 0); }
      87% { transform: translate3d(2%, 4%, 0); }
      100% { transform: translate3d(0, 0, 0); }
    }

    .room,
    .gif-screen {
      position: absolute;
      display: block;
    }

    .room {
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      z-index: 1;
      pointer-events: none;
      user-select: none;
    }

    .gif-screen {
      left: calc(var(--screen-left) - var(--edge-bleed));
      top: var(--screen-top);
      width: calc(var(--screen-width) + var(--edge-bleed));
      height: calc(var(--screen-height) + var(--edge-bleed));
      object-fit: cover;
      filter: brightness(1.08) saturate(1.03);
      z-index: 2;
      background: #050505;
    }

    .screen-shade {
      position: absolute;
      left: var(--screen-left);
      top: var(--screen-top);
      width: var(--screen-width);
      height: var(--screen-height);
      z-index: 3;
      pointer-events: none;
      box-shadow:
        inset 0 0 28px rgba(0, 0, 0, 0.24),
        inset 0 16px 28px rgba(255, 255, 255, 0.08);
      mix-blend-mode: multiply;
      opacity: 0.42;
    }

    .controls {
      display: none;
      position: fixed;
      left: 16px;
      bottom: 16px;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      border: 1px solid var(--ui-border);
      border-radius: 8px;
      background: var(--ui-bg);
      backdrop-filter: blur(12px);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.28);
    }

    .file-button {
      display: inline-flex;
      align-items: center;
      min-height: 36px;
      padding: 0 14px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 6px;
      background: #f2ecdf;
      color: #1b1711;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }

    .file-name {
      max-width: min(48vw, 320px);
      overflow: hidden;
      color: var(--muted);
      font-size: 12px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    input[type="file"] {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0 0 0 0);
      white-space: nowrap;
    }

    @media (max-width: 700px) {
      body {
        align-items: start;
      }

      .stage {
        width: 100vw;
      }

      .controls {
        right: 10px;
        bottom: 10px;
        left: 10px;
      }

      .file-name {
        min-width: 0;
        flex: 1;
      }
    }
  </style>
</head>
<body>
  <main class="stage" aria-label="Room preview with animated screen">
    <img class="gif-screen" id="gifScreen" src="https://res.cloudinary.com/dzgqzeebg/image/upload/v1779932876/galp-card_vn3fdn_2-optimized_ncu7aw.gif" alt="">
    <div class="screen-shade" aria-hidden="true"></div>
    <img class="room" src="https://res.cloudinary.com/dzgqzeebg/image/upload/v1779932620/first_img_bk_ejizls.png" alt="Room with display">
  </main>

  <div class="controls">
    <label class="file-button" for="gifPicker">Choose GIF</label>
    <input id="gifPicker" type="file" accept="image/gif,image/*,video/mp4,video/webm">
    <span class="file-name" id="fileName">Using Cloudinary GIF</span>
  </div>

  <script>
    const picker = document.querySelector('#gifPicker');
    let screen = document.querySelector('#gifScreen');
    const fileName = document.querySelector('#fileName');
    let currentObjectUrl = null;

    picker.addEventListener('change', () => {
      const file = picker.files && picker.files[0];
      if (!file) return;

      if (currentObjectUrl) {
        URL.revokeObjectURL(currentObjectUrl);
      }

      currentObjectUrl = URL.createObjectURL(file);
      fileName.textContent = file.name;

      if (file.type.startsWith('video/')) {
        const video = document.createElement('video');
        video.className = screen.className;
        video.id = screen.id;
        video.src = currentObjectUrl;
        video.autoplay = true;
        video.loop = true;
        video.muted = true;
        video.playsInline = true;
        video.setAttribute('aria-hidden', 'true');
        screen.replaceWith(video);
        screen = video;
        return;
      }

      if (screen.tagName.toLowerCase() !== 'img') {
        const img = document.createElement('img');
        img.className = screen.className;
        img.id = screen.id;
        img.alt = '';
        screen.replaceWith(img);
        screen = img;
      }

      screen.src = currentObjectUrl;
    });
  </script>
</body>
</html>
