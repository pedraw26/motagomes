<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Candando — Múpi Digital</title>
<style>
  @font-face {
    font-family: 'Eveleth';
    src: url('/fonts/EvelethClean-Regular.ttf') format('truetype'),
         local('Eveleth Clean Regular');
    font-weight: 400;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: 'Eveleth';
    src: url('/fonts/Eveleth-Bold.ttf') format('truetype'),
         local('Eveleth Bold');
    font-weight: 700;
    font-style: normal;
    font-display: swap;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    height: 100%;
    background: #1a1a1a;
    display: grid;
    place-items: center;
    font-family: "Inter", ui-sans-serif, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  /* ── Mupi frame — 2:3 portrait (120×175cm) ── */
  .mupi {
    position: relative;
    width: min(420px, calc(100vw - 32px));
    aspect-ratio: 120 / 175;
    background: #ffffff;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 32px 80px rgba(0,0,0,0.55);
  }

  /* ── L0 — Red background (full mupi) ── */
  .mupi-red {
    position: absolute;
    inset: 0;
    background: #d41f3d;
    z-index: 0;
  }

  /* ── L1 — Snow (red zone only, behind card + curve) ── */
  .snow-layer {
    position: absolute;
    inset: 0 0 56% 0;
    z-index: 1;
    pointer-events: none;
    overflow: hidden;
  }

  .flake {
    position: absolute;
    top: -10%;
    border-radius: 50%;
    background: #ffffff;
    animation: fall linear infinite;
    will-change: transform, opacity;
  }

  @keyframes fall {
    0%   { transform: translateY(0)       translateX(0)            scale(1);    opacity: 0; }
    5%   { opacity: 1; }
    85%  { opacity: 0.7; }
    100% { transform: translateY(110%)    translateX(var(--drift)) scale(0.85); opacity: 0; }
  }

  /* ── L2 — White curved frame ── */
  .mupi-curve {
    position: absolute;
    bottom: 56%;
    left: -30%;
    width: 160%;
    height: calc(44% * 0.55);
    background: #ffffff;
    border-radius: 50% 50% 0 0 / 65% 65% 0 0;
    z-index: 2;
  }

  /* ── L3 — Card — full bleed ── */
  .mupi-card {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    aspect-ratio: 693 / 448;
    background:
      url("https://res.cloudinary.com/dzgqzeebg/image/upload/f_auto,q_auto,w_800/v1777219506/atfmaczybm5gpkzukudn.png")
      center / cover no-repeat;
    z-index: 3;
  }

  /* ── L4 — Copy block ── */
  .mupi-body {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 58%;
    background: #ffffff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2% 8% 4%;
    gap: 1.5%;
    z-index: 4;
  }

  .mupi-eyebrow {
    font-size: clamp(11px, 3vw, 16px);
    font-weight: 700;
    color: #1a1a1a;
    letter-spacing: 0.01em;
  }

  .mupi-headline {
    font-family: 'Eveleth', 'Bebas Neue', sans-serif;
    font-size: clamp(36px, 13vw, 66px);
    font-weight: 400;
    color: #d41f3d;
    line-height: 0.9;
    letter-spacing: 0.02em;
    text-transform: uppercase;
  }

  .mupi-amount {
    display: flex;
    align-items: baseline;
    justify-content: center;
    gap: 2%;
  }

  .mupi-amount-number {
    font-family: 'Eveleth', 'Bebas Neue', sans-serif;
    font-size: clamp(64px, 22vw, 108px);
    font-weight: 400;
    color: #f4ad32;
    line-height: 0.88;
    letter-spacing: 0.02em;
  }

  .mupi-amount-currency {
    font-family: 'Eveleth', 'Bebas Neue', sans-serif;
    font-size: clamp(18px, 6vw, 30px);
    font-weight: 400;
    color: #f4ad32;
    letter-spacing: 0.06em;
    align-self: flex-end;
    padding-bottom: 4%;
  }

  /* ── CTA button ── */
  .mupi-cta {
    display: inline-block;
    background: #d41f3d;
    color: #ffffff;
    font-size: clamp(9px, 2.6vw, 13px);
    font-weight: 500;
    letter-spacing: 0.01em;
    padding: 3.5% 10%;
    border-radius: 999px;
    text-decoration: none;
    white-space: nowrap;
  }

  .mupi-cta strong {
    font-weight: 800;
    letter-spacing: 0.02em;
  }

  /* ── Footer ── */
  .mupi-footer {
    font-size: clamp(7px, 2vw, 11px);
    font-weight: 600;
    color: #555555;
    letter-spacing: 0.01em;
    text-transform: uppercase;
  }

</style>
</head>
<body>

<div class="mupi" role="img" aria-label="Múpi Candando — Ativa o teu cartão e recebe 2000 KZ">

  <!-- L0 red background -->
  <div class="mupi-red"></div>

  <!-- L1 snow -->
  <div class="snow-layer" id="snow"></div>

  <!-- L2 white curve -->
  <div class="mupi-curve"></div>

  <!-- L3 card — full bleed -->
  <div class="mupi-card" role="img" aria-label="Cartão Candando"></div>

  <!-- L4 copy -->
  <div class="mupi-body">
    <p class="mupi-eyebrow">Activa o teu cartão</p>
    <p class="mupi-headline">Recebe</p>
    <div class="mupi-amount">
      <span class="mupi-amount-number">2000</span>
      <span class="mupi-amount-currency">KZ</span>
    </div>
    <a href="#" class="mupi-cta">Usa o código: <strong>Dando 1250</strong></a>
    <p class="mupi-footer">Válido em todas as lojas Candando e parceiros</p>
  </div>

</div>

<script>
  (() => {
    const container = document.getElementById('snow');
    const COUNT = 38;
    const sizes = [3, 4, 5, 6, 7, 8, 10, 12, 14];

    for (let i = 0; i < COUNT; i++) {
      const f = document.createElement('div');
      f.className = 'flake';

      const size    = sizes[Math.floor(Math.random() * sizes.length)];
      const left    = Math.random() * 100;
      const delay   = -(Math.random() * 12);
      const dur     = 6 + Math.random() * 10;
      const drift   = (Math.random() - 0.5) * 30;
      const opacity = 0.45 + Math.random() * 0.55;

      f.style.cssText = `
        width: ${size}px;
        height: ${size}px;
        left: ${left}%;
        animation-duration: ${dur}s;
        animation-delay: ${delay}s;
        --drift: ${drift}px;
        opacity: ${opacity};
      `;

      container.appendChild(f);
    }
  })();
</script>
</body>
</html>
