<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Candando — Múpi Digital</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    height: 100%;
    background: #1a1a1a;
    display: grid;
    place-items: center;
    font-family: "Inter", ui-sans-serif, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  /* ── Mupi frame — 2:3 portrait (120×175cm) ── */
  .mupi {
    position: relative;
    width: min(420px, calc(100vw - 32px));
    aspect-ratio: 120 / 175;
    background: #ffffff;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 32px 80px rgba(0,0,0,0.55);
  }

  /* ── Red top panel ── */
  .mupi-top {
    position: absolute;
    inset: 0 0 auto 0;
    height: 58%;
    background: #d41f3d;
  }

  /* Curved white cutout — wide stretched ellipse */
  .mupi-top::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: -30%;
    width: 160%;
    height: 52%;
    background: #ffffff;
    border-radius: 50% 50% 0 0 / 65% 65% 0 0;
  }

  /* ── Card image — floats over the curve ── */
  .mupi-card {
    position: absolute;
    top: 12%;
    left: 50%;
    transform: translateX(-50%);
    width: 78%;
    aspect-ratio: 1692 / 1080;
    border-radius: 10px;
    background:
      url("https://res.cloudinary.com/dzgqzeebg/image/upload/f_auto,q_auto,w_800/v1777216158/uiy21ws7qrax18tnegdq.webp")
      center / cover no-repeat;
    box-shadow: 0 8px 32px rgba(0,0,0,0.28);
    z-index: 2;
  }

  /* ── White bottom copy section ── */
  .mupi-body {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 46%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 0 6% 6%;
    z-index: 1;
  }

  .mupi-eyebrow {
    font-size: clamp(9px, 2.4vw, 13px);
    font-weight: 500;
    color: #1a1a1a;
    letter-spacing: 0.01em;
    margin-bottom: 2%;
  }

  .mupi-headline {
    font-family: 'Eveleth', 'Bebas Neue', sans-serif;
    font-size: clamp(34px, 12vw, 62px);
    font-weight: 400;
    color: #d41f3d;
    line-height: 0.9;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    margin-bottom: 0;
  }

  .mupi-amount {
    display: flex;
    align-items: baseline;
    justify-content: center;
    gap: 1.5%;
    margin-bottom: 6%;
  }

  .mupi-amount-number {
    font-family: 'Eveleth', 'Bebas Neue', sans-serif;
    font-size: clamp(48px, 17vw, 88px);
    font-weight: 400;
    color: #f4ad32;
    line-height: 0.9;
    letter-spacing: 0.02em;
  }

  .mupi-amount-currency {
    font-family: 'Eveleth', 'Bebas Neue', sans-serif;
    font-size: clamp(14px, 4.5vw, 24px);
    font-weight: 400;
    color: #f4ad32;
    letter-spacing: 0.06em;
    margin-bottom: 12%;
  }

  /* ── CTA button ── */
  .mupi-cta {
    display: inline-block;
    background: #d41f3d;
    color: #ffffff;
    font-size: clamp(9px, 2.6vw, 13px);
    font-weight: 500;
    letter-spacing: 0.01em;
    padding: 3.5% 8%;
    border-radius: 999px;
    text-decoration: none;
    white-space: nowrap;
  }

  .mupi-cta strong {
    font-weight: 800;
    letter-spacing: 0.02em;
  }

  /* ── Logo top-left ── */
  .mupi-logo {
    position: absolute;
    top: 5%;
    left: 7%;
    z-index: 3;
    width: 14%;
    opacity: 0.92;
  }

  .mupi-logo svg {
    width: 100%;
    height: auto;
    fill: #ffffff;
  }
</style>
</head>
<body>

<div class="mupi" role="img" aria-label="Múpi Candando — Ativa o teu cartão e recebe 2000 KZ">

  <div class="mupi-top"></div>

  <!-- Logo -->
  <div class="mupi-logo" aria-hidden="true">
    <svg viewBox="0 0 239.33 230.17" xmlns="http://www.w3.org/2000/svg">
      <path fill="#fff" d="M0,119.21c.11-31.96,12.65-61.97,35.33-84.5,46.81-46.5,122.73-46.25,169.23.56,22.53,22.68,34.87,52.77,34.77,84.73-.11,31.96-12.65,61.97-35.33,84.5-10.26,10.19-22.09,18.34-35.17,24.23-6.17,2.78-13.41,1.44-18.17-3.36l-31.24-31.45-31.45,31.24c-4.8,4.77-12.04,6.06-18.19,3.24-13.04-5.98-24.82-14.21-35.01-24.47C12.24,181.26-.11,151.17,0,119.21M206.89,119.9c.08-24.07-9.53-46.68-27-63.38-15.14-14.47-35.12-23.06-56.05-24.03-26.05-1.21-50.69,8.9-68.37,28.07-14.2,15.39-22.39,35.54-23,56.47-.7,24.15,8.35,46.99,25.31,64.06,4.18,4.21,8.73,7.95,13.6,11.2,1.27.85,2.95.71,4.04-.37l21.13-21-14.17-14.27c-9.89-9.96-15.32-23.17-15.27-37.21.05-14.04,5.56-27.22,15.52-37.11,20.56-20.42,53.9-20.31,74.32.25,9.92,9.98,15.34,23.24,15.27,37.32-.07,14.17-6.11,27.66-16.17,37.65l-13.61,13.52,21,21.14c1.08,1.08,2.76,1.23,4.04.4,4.89-3.21,9.46-6.92,13.67-11.11,16.53-16.42,25.67-38.29,25.75-61.59M139.77,119.68c.02-5.37-2.06-10.43-5.84-14.24-7.82-7.87-20.57-7.91-28.44-.09-3.81,3.79-5.92,8.83-5.94,14.2-.02,5.37,2.06,10.43,5.84,14.24l14.17,14.27,14.27-14.17c3.81-3.79,5.92-8.83,5.94-14.2"/>
    </svg>
  </div>

  <!-- Card image -->
  <div class="mupi-card" role="img" aria-label="Cartão Candando"></div>

  <!-- Copy -->
  <div class="mupi-body">
    <p class="mupi-eyebrow">Ativa o teu cartão</p>
    <p class="mupi-headline">Recebe</p>
    <div class="mupi-amount">
      <span class="mupi-amount-number">2000</span>
      <span class="mupi-amount-currency">KZ</span>
    </div>
    <a href="#" class="mupi-cta">Usa o código: <strong>dando1250</strong></a>
  </div>

</div>

</body>
</html>
