<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Candando — Múpi Digital</title>
<style>
  @font-face {
    font-family: 'Eveleth';
    src: url('/fonts/EvelethClean-Regular.ttf') format('truetype'),
         local('Eveleth Clean Regular');
    font-weight: 400;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: 'Eveleth';
    src: url('/fonts/Eveleth-Bold.ttf') format('truetype'),
         local('Eveleth Bold');
    font-weight: 700;
    font-style: normal;
    font-display: swap;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    height: 100%;
    background: #1a1a1a;
    display: grid;
    place-items: center;
    font-family: "Inter", ui-sans-serif, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  /* ── Mupi frame — 2:3 portrait (120×175cm) ── */
  .mupi {
    position: relative;
    width: min(420px, calc(100vw - 32px));
    aspect-ratio: 120 / 175;
    background: #ffffff;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 32px 80px rgba(0,0,0,0.55);
  }

  /* ── Red top panel ── */
  .mupi-top {
    position: absolute;
    inset: 0 0 auto 0;
    height: 58%;
    background: #d41f3d;
  }

  /* Curved white cutout — wide stretched ellipse */
  .mupi-top::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: -30%;
    width: 160%;
    height: 52%;
    background: #ffffff;
    border-radius: 50% 50% 0 0 / 65% 65% 0 0;
  }

  /* ── Card image — floats over the curve ── */
  .mupi-card {
    position: absolute;
    top: 12%;
    left: 50%;
    transform: translateX(-50%);
    width: 78%;
    aspect-ratio: 1692 / 1080;
    border-radius: 10px;
    background:
      url("https://res.cloudinary.com/dzgqzeebg/image/upload/f_auto,q_auto,w_800/v1777216158/uiy21ws7qrax18tnegdq.webp")
      center / cover no-repeat;
    box-shadow: 0 8px 32px rgba(0,0,0,0.28);
    z-index: 2;
  }

  /* ── White bottom copy section ── */
  .mupi-body {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 46%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 0 6% 6%;
    z-index: 1;
  }

  .mupi-eyebrow {
    font-size: clamp(9px, 2.4vw, 13px);
    font-weight: 500;
    color: #1a1a1a;
    letter-spacing: 0.01em;
    margin-bottom: 2%;
  }

  .mupi-headline {
    font-family: 'Eveleth', 'Bebas Neue', sans-serif;
    font-size: clamp(34px, 12vw, 62px);
    font-weight: 400;
    color: #d41f3d;
    line-height: 0.9;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    margin-bottom: 0;
  }

  .mupi-amount {
    display: flex;
    align-items: baseline;
    justify-content: center;
    gap: 1.5%;
    margin-bottom: 6%;
  }

  .mupi-amount-number {
    font-family: 'Eveleth', 'Bebas Neue', sans-serif;
    font-size: clamp(48px, 17vw, 88px);
    font-weight: 400;
    color: #f4ad32;
    line-height: 0.9;
    letter-spacing: 0.02em;
  }

  .mupi-amount-currency {
    font-family: 'Eveleth', 'Bebas Neue', sans-serif;
    font-size: clamp(14px, 4.5vw, 24px);
    font-weight: 400;
    color: #f4ad32;
    letter-spacing: 0.06em;
    margin-bottom: 12%;
  }

  /* ── Snow ── */
  .snow-layer {
    position: absolute;
    inset: 0;
    z-index: 3;
    pointer-events: none;
    overflow: hidden;
    border-radius: 12px;
  }

  .flake {
    position: absolute;
    top: -10%;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.72);
    animation: fall linear infinite;
    will-change: transform, opacity;
  }

  @keyframes fall {
    0%   { transform: translateY(0)   translateX(0)    scale(1);   opacity: 0; }
    5%   { opacity: 1; }
    90%  { opacity: 0.6; }
    100% { transform: translateY(115vh) translateX(var(--drift)) scale(0.85); opacity: 0; }
  }

  /* ── CTA button ── */
  .mupi-cta {
    display: inline-block;
    background: #d41f3d;
    color: #ffffff;
    font-size: clamp(9px, 2.6vw, 13px);
    font-weight: 500;
    letter-spacing: 0.01em;
    padding: 3.5% 8%;
    border-radius: 999px;
    text-decoration: none;
    white-space: nowrap;
  }

  .mupi-cta strong {
    font-weight: 800;
    letter-spacing: 0.02em;
  }

</style>
</head>
<body>

<div class="mupi" role="img" aria-label="Múpi Candando — Ativa o teu cartão e recebe 2000 KZ">

  <div class="mupi-top"></div>

  <!-- Snow -->
  <div class="snow-layer" id="snow"></div>

  <!-- Card image -->
  <div class="mupi-card" role="img" aria-label="Cartão Candando"></div>

  <!-- Copy -->
  <div class="mupi-body">
    <p class="mupi-eyebrow">Ativa o teu cartão</p>
    <p class="mupi-headline">Recebe</p>
    <div class="mupi-amount">
      <span class="mupi-amount-number">2000</span>
      <span class="mupi-amount-currency">KZ</span>
    </div>
    <a href="#" class="mupi-cta">Usa o código: <strong>dando1250</strong></a>
  </div>

</div>

<script>
  (() => {
    const container = document.getElementById('snow');
    const COUNT = 38;

    // Sizes (px): mix of tiny, small, medium — no huge ones
    const sizes = [3, 4, 5, 6, 7, 8, 10, 12, 14];

    for (let i = 0; i < COUNT; i++) {
      const f = document.createElement('div');
      f.className = 'flake';

      const size    = sizes[Math.floor(Math.random() * sizes.length)];
      const left    = Math.random() * 100;           // % across width
      const delay   = -(Math.random() * 12);         // stagger so they don't all start at once
      const dur     = 6 + Math.random() * 10;        // 6–16 s fall duration
      const drift   = (Math.random() - 0.5) * 30;   // ±15 px horizontal wander
      const opacity = 0.45 + Math.random() * 0.55;  // 0.45–1.0 base opacity

      f.style.cssText = `
        width: ${size}px;
        height: ${size}px;
        left: ${left}%;
        animation-duration: ${dur}s;
        animation-delay: ${delay}s;
        --drift: ${drift}px;
        opacity: ${opacity};
      `;

      container.appendChild(f);
    }
  })();
</script>
</body>
</html>
