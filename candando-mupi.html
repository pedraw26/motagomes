<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Candando — Múpi Digital</title>
<style>
  @font-face {
    font-family: 'Eveleth';
    src: url('/fonts/EvelethClean-Regular.ttf') format('truetype'),
         local('Eveleth Clean Regular');
    font-weight: 400;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: 'Eveleth';
    src: url('/fonts/Eveleth-Bold.ttf') format('truetype'),
         local('Eveleth Bold');
    font-weight: 700;
    font-style: normal;
    font-display: swap;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    height: 100%;
    background: #1a1a1a;
    display: grid;
    place-items: center;
    font-family: "Inter", ui-sans-serif, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  /* ─────────────────────────────────────────
     Mupi frame  120 × 175 cm → 0.6857 ratio
  ───────────────────────────────────────── */
  .mupi {
    position: relative;
    width: min(420px, calc(100vw - 32px));
    aspect-ratio: 120 / 175;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 32px 80px rgba(0,0,0,0.55);
    background: #ffffff;
  }

  /* L0 — red panel (top 53%) */
  .mupi-red {
    position: absolute;
    inset: 0 0 auto 0;
    height: 53%;
    background: #d41f3d;
    z-index: 0;
  }

  /* L1 — snow (constrained to red zone) */
  .snow-layer {
    position: absolute;
    inset: 0 0 47% 0;
    z-index: 1;
    pointer-events: none;
    overflow: hidden;
  }
  .flake {
    position: absolute;
    top: -10%;
    border-radius: 50%;
    background: #ffffff;
    animation: fall linear infinite;
    will-change: transform, opacity;
  }
  @keyframes fall {
    0%   { transform: translateY(0)    translateX(0)            scale(1);    opacity: 0; }
    6%   { opacity: 1; }
    85%  { opacity: 0.7; }
    100% { transform: translateY(110%) translateX(var(--drift)) scale(0.85); opacity: 0; }
  }

  /* L2 — white curve */
  .mupi-curve {
    position: absolute;
    bottom: 47%;
    left: -30%;
    width: 160%;
    height: calc(53% * 0.52);
    background: #ffffff;
    border-radius: 50% 50% 0 0 / 65% 65% 0 0;
    z-index: 2;
  }

  /* L3 — card
     measured: top ≈ 14%, height ≈ 30% of mupi
     width derived: 30% × (175/120) / (448/693) ≈ 76%               */
  .mupi-card {
    position: absolute;
    top: 13%;
    left: 50%;
    transform: translateX(-50%);
    width: 78%;
    aspect-ratio: 693 / 448;
    border-radius: 10px;
    background:
      url("https://res.cloudinary.com/dzgqzeebg/image/upload/f_auto,q_auto,w_800/v1777219506/atfmaczybm5gpkzukudn.png")
      center / cover no-repeat;
    box-shadow: 0 8px 28px rgba(0,0,0,0.30);
    z-index: 3;
  }

  /* L4 — copy block (white, bottom 53%) */
  .mupi-body {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 53%;
    background: #ffffff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    text-align: center;
    padding: 10% 8% 5%;
    z-index: 4;
  }

  /* "Activa o teu cartao" + RECEBE grouped at top */
  .mupi-top-copy {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1%;
  }

  .mupi-eyebrow {
    font-size: clamp(11px, 3.2vw, 16px);
    font-weight: 700;
    color: #1a1a1a;
    letter-spacing: 0.01em;
  }

  .mupi-headline {
    font-family: 'Eveleth', 'Bebas Neue', sans-serif;
    font-size: clamp(30px, 10vw, 48px);
    font-weight: 400;
    color: #d41f3d;
    line-height: 0.9;
    letter-spacing: 0.02em;
    text-transform: uppercase;
  }

  /* 2000 KZ */
  .mupi-amount {
    display: flex;
    align-items: baseline;
    justify-content: center;
    gap: 2%;
  }

  .mupi-amount-number {
    font-family: 'Eveleth', 'Bebas Neue', sans-serif;
    font-size: clamp(72px, 23vw, 112px);
    font-weight: 400;
    color: #f4ad32;
    line-height: 0.88;
    letter-spacing: 0.02em;
  }

  .mupi-amount-currency {
    font-family: 'Eveleth', 'Bebas Neue', sans-serif;
    font-size: clamp(18px, 5.5vw, 28px);
    font-weight: 400;
    color: #f4ad32;
    letter-spacing: 0.06em;
    padding-bottom: 6%;
  }

  /* Button */
  .mupi-cta {
    display: inline-block;
    background: #d41f3d;
    color: #ffffff;
    font-size: clamp(9px, 2.6vw, 13px);
    font-weight: 500;
    letter-spacing: 0.01em;
    padding: 3.5% 10%;
    border-radius: 999px;
    text-decoration: none;
    white-space: nowrap;
  }
  .mupi-cta strong {
    font-weight: 800;
    letter-spacing: 0.02em;
  }

  /* Footer */
  .mupi-footer {
    font-size: clamp(7px, 1.9vw, 10px);
    font-weight: 600;
    color: #444444;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

</style>
</head>
<body>

<div class="mupi" role="img" aria-label="Múpi Candando — Ativa o teu cartão e recebe 2000 KZ">

  <!-- L0 red -->
  <div class="mupi-red"></div>

  <!-- L1 snow -->
  <div class="snow-layer" id="snow"></div>

  <!-- L2 curve -->
  <div class="mupi-curve"></div>

  <!-- L3 card -->
  <div class="mupi-card" role="img" aria-label="Cartão Candando"></div>

  <!-- L4 copy -->
  <div class="mupi-body">
    <div class="mupi-top-copy">
      <p class="mupi-eyebrow">Activa o teu cartão</p>
      <p class="mupi-headline">Recebe</p>
    </div>
    <div class="mupi-amount">
      <span class="mupi-amount-number">2000</span>
      <span class="mupi-amount-currency">KZ</span>
    </div>
    <a href="#" class="mupi-cta">Usa o código: <strong>Dando 1250</strong></a>
    <p class="mupi-footer">Válido em todas as lojas Candando e parceiros</p>
  </div>

</div>

<script>
  (() => {
    const container = document.getElementById('snow');
    const COUNT = 38;
    const sizes = [3, 4, 5, 6, 7, 8, 10, 12, 14];
    for (let i = 0; i < COUNT; i++) {
      const f = document.createElement('div');
      f.className = 'flake';
      const size    = sizes[Math.floor(Math.random() * sizes.length)];
      const left    = Math.random() * 100;
      const delay   = -(Math.random() * 12);
      const dur     = 6 + Math.random() * 10;
      const drift   = (Math.random() - 0.5) * 30;
      const opacity = 0.45 + Math.random() * 0.55;
      f.style.cssText = `
        width:${size}px; height:${size}px;
        left:${left}%;
        animation-duration:${dur}s;
        animation-delay:${delay}s;
        --drift:${drift}px;
        opacity:${opacity};
      `;
      container.appendChild(f);
    }
  })();
</script>
</body>
</html>
