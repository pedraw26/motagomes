<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Economy of Words — UI Elements</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,600;0,700;0,800&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ width:100%; height:100%; overflow:hidden; }
  body{
    background:#1314F0;
    font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
    display:flex; align-items:center; justify-content:center;
  }

  /* Fixed 1420×512 stage (reference crop aspect), scaled to viewport */
  #stage{
    position:relative; width:1420px; height:1356px;
    transform-origin:center center; flex-shrink:0;
  }

  .el{ position:absolute; z-index:2; margin-top:89px; }

  /* ---------- gentle idle float (staggered so they drift independently) ---------- */
  @keyframes floaty{
    0%,100%{ transform:translateY(0); }
    50%    { transform:translateY(-9px); }
  }
  .float{ animation:floaty 5.2s ease-in-out infinite; }
  .float.d1{ animation-delay:-1.2s; }
  .float.d2{ animation-delay:-2.4s; }
  .float.d3{ animation-delay:-3.4s; }
  .float.d4{ animation-delay:-4.3s; }

  @media (prefers-reduced-motion: reduce){ .float{ animation:none; } }

  /* ---------- ZEN CHARACTER — meditating figure, behind the buttons ---------- */
  /* measured 1:1 to the reference: hat center x680 top y187 (scale 0.654) */
  .character{
    position:absolute; left:-5px; top:86px; margin-top:89px;
    width:1384px; height:auto; z-index:1;
    pointer-events:none; user-select:none;
    transform-origin:50% 22%;
    animation:charBreathe 4.6s ease-in-out infinite;
  }
  @keyframes charBreathe{
    0%,100%{ transform:translateY(0)    scale(1);     }
    50%    { transform:translateY(-4px) scale(1.008); }
  }
  @media (prefers-reduced-motion: reduce){ .character{ animation:none; } }

  /* ---------- FOCUS — dark glass button with halo rings ---------- */
  /* measured: button bbox x198 y273 w314 h166 r≈67 */
  .focus-wrap{ left:198px; top:273px; }
  /* radar / sonar emit: each ring starts small+visible hugging the button,
     expands outward while fading fully to 0, then restarts. Three rings on
     staggered delays → a new ring emits as the previous dies = continuous
     outward pulse. All rings share one geometry (inset:-14px band just outside
     the button) and grow via scale. */
  .focus-ring{
    position:absolute; inset:-14px;
    border-radius:80px;
    border:7px solid rgba(255,255,255,0.14);
    filter:blur(1.5px);
    transform-origin:center center;
    opacity:0;
    animation:radar 3.1s ease-out infinite;
  }
  .focus-ring.r2{ animation-delay:-1.03s; }
  .focus-ring.r3{ animation-delay:-2.06s; }
  @keyframes radar{
    0%   { opacity:0.75; transform:scale(0.90); }
    12%  { opacity:0.7;  transform:scale(0.95); }
    100% { opacity:0;    transform:scale(1.16); }
  }
  @media (prefers-reduced-motion: reduce){
    .focus-ring{ animation:none; opacity:0.4; transform:scale(1); }
    .focus-ring.r3{ opacity:0; }
  }
  .focus-btn{
    position:relative;
    width:314px; height:166px;
    border-radius:67px;
    background:radial-gradient(80% 70% at 50% 50%, rgba(70,74,220,0.55) 0%, rgba(48,53,210,0.60) 45%, rgba(24,29,200,0.66) 88%);
    -webkit-backdrop-filter:blur(7px) saturate(115%); backdrop-filter:blur(7px) saturate(115%);
    border:2px solid rgba(150,153,250,0.38);
    border-top-color:rgba(215,218,255,0.50);
    box-shadow:
      inset 0 2px 4px rgba(235,236,255,0.85),
      inset 0 -3px 8px rgba(120,124,250,0.25);
    display:flex; align-items:center; justify-content:center;
    font-size:63px; font-weight:700; letter-spacing:-0.01em;
  }
  /* "Focus" word with a light-blue shine sweep gliding left→right.
     Base fill white; a moving light-blue highlight stripe rides across via
     background-clip:text. Slow/premium, synced into the master cycle. */
  .focus-word{
    position:relative;
    color:#fff;
    text-shadow:0 0 18px rgba(140,144,255,0.55);
    background-image:linear-gradient(100deg,
      rgba(255,255,255,0) 38%,
      rgba(150,200,255,0.35) 46%,
      rgba(210,235,255,0.95) 50%,
      rgba(150,200,255,0.35) 54%,
      rgba(255,255,255,0) 62%);
    background-size:260% 100%;
    background-position:150% 0;
    background-repeat:no-repeat;
    -webkit-background-clip:text; background-clip:text;
    animation:focusSweep 6.4s ease-in-out infinite;
  }
  /* sweep occupies the first ~1.9s of the 6.4s master cycle, then rests */
  @keyframes focusSweep{
    0%   { background-position:150% 0; }
    30%  { background-position:-60% 0; }
    31%,100%{ background-position:-60% 0; }
  }
  @media (prefers-reduced-motion: reduce){
    .focus-word{ animation:none; background-image:none; }
  }

  /* ---------- INSIGHT — solid white speech bubble ---------- */
  /* measured: bubble x356 y94 w211 h84 r≈38; tail right edge at rel-x 160, 29×28, tip bottom-right */
  .insight{ left:356px; top:94px; }
  .insight-bubble{
    position:relative;
    width:211px; height:84px;
    background:#fff;
    border-radius:38px;
    display:flex; align-items:center; justify-content:center;
    color:#0505E8; font-size:34px; font-weight:700; letter-spacing:-0.01em;
  }
  /* looping content swap: "Insight" ⇄ ⓘ (crossfade + scale/blur, fixed bubble box) */
  .ins-word,.ins-info{
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
  }
  .ins-word{
    opacity:1;
    animation:insWord 5.9s cubic-bezier(0.16,1,0.3,1) infinite;
  }
  .ins-info{
    opacity:0;
    animation:insInfo 5.9s cubic-bezier(0.16,1,0.3,1) infinite;
  }
  .ins-circle{                      /* classic circled serif "i" info glyph */
    width:44px; height:44px;
    border:3px solid #0505E8; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-family:Georgia,'Times New Roman',serif;
    font-weight:700; font-style:italic; font-size:28px;
    color:#0505E8; line-height:1;
    padding-bottom:2px;
  }
  @keyframes insWord{
    0%,42%   { opacity:1; transform:scale(1);    filter:blur(0); }
    50%,92%  { opacity:0; transform:scale(0.82); filter:blur(4px); }
    100%     { opacity:1; transform:scale(1);    filter:blur(0); }
  }
  @keyframes insInfo{
    0%,42%   { opacity:0; transform:scale(0.82); filter:blur(4px); }
    50%,92%  { opacity:1; transform:scale(1);    filter:blur(0); }
    100%     { opacity:0; transform:scale(0.82); filter:blur(4px); }
  }
  @media (prefers-reduced-motion: reduce){
    .ins-word,.ins-info{ animation:none; }      /* static "Insight" */
  }
  .insight-bubble::after{           /* tail — vertical right edge, tip bottom-right */
    content:''; position:absolute;
    left:131px; bottom:-28px;
    width:0; height:0;
    border-top:28px solid #fff;
    border-left:29px solid transparent;
  }

  /* ---------- BALANCE — frosted glass speech bubble ---------- */
  /* measured: bubble x888 y271 w352 h126 r≈44; tail vertical left edge at rel-x 59, 45×44 */
  .balance{ left:888px; top:271px; }
  .balance-bubble{
    position:relative;
    width:352px; height:126px;
    background:linear-gradient(126deg, #fff 0%, #fff 10%, rgba(255,255,255,0.79) 30%, rgba(255,255,255,0.66) 41%, rgba(255,255,255,0.43) 88%, rgba(255,255,255,0.40) 100%);
    border-radius:44px;
    display:flex; align-items:center; justify-content:center;
    color:#0804EB; font-size:59px; font-weight:700; letter-spacing:-0.015em;
  }
  .balance-bubble::after{           /* tail — vertical left edge, tip bottom-left */
    content:''; position:absolute;
    left:59px; bottom:-44px;
    width:0; height:0;
    border-top:44px solid rgba(250,250,255,0.72);
    border-right:45px solid transparent;
  }

  /* ---------- LIGHTBULB — glass bulb with white screw base ---------- */
  /* measured: glass circle x643 y39 d77; neck to y121; base bar 30×11 @y122; tip 14×6 @y137 */
  .bulb{ left:643px; top:39px; width:77px; }
  /* GLASS BODY: single continuous pear/teardrop = round dome (77px) tapering
     smoothly to a ~40px waist at the base — one SVG path, no dome-to-neck seam.
     Lights up (brightens) when the travel orb arrives. */
  .bulb-glass{
    position:relative; z-index:1;
    width:77px; height:88px; margin:0 auto;
    display:block;
    animation:bulbGlow 6.4s ease-in-out infinite;
  }
  .bulb-glass path{
    /* base (unlit) translucent glass fill */
    fill:rgba(255,255,255,0.42);
    stroke:rgba(255,255,255,0.48);
    stroke-width:1;
  }
  .bulb-filament{                    /* soft glow point, lower half of the glass body */
    position:absolute; left:50%; top:60%;
    width:24px; height:24px; border-radius:50%;
    transform:translate(-50%,-50%);
    background:radial-gradient(circle, rgba(255,255,255,0.22) 0%, rgba(255,255,255,0.10) 55%, transparent 78%);
    filter:blur(1.5px);
    animation:filamentGlow 6.4s ease-in-out infinite;
  }
  /* on orb arrival (~40% of cycle) the bulb flashes brighter, then settles */
  @keyframes bulbGlow{
    0%,100% { filter:brightness(1)    drop-shadow(0 0 4px rgba(190,220,255,0.30)); }
    50%     { filter:brightness(1.12) drop-shadow(0 0 9px rgba(190,220,255,0.50)); }
  }
  @keyframes filamentGlow{
    0%,100% { opacity:0.9; transform:translate(-50%,-50%) scale(1);    }
    50%     { opacity:1;   transform:translate(-50%,-50%) scale(1.18); }
  }
  @media (prefers-reduced-motion: reduce){
    .bulb-glass,.bulb-filament{ animation:none; }
  }
  .bulb-base{                        /* METAL screw bar — separate, not merged with glass */
    width:30px; height:11px; margin:-1px auto 0;
    background:linear-gradient(#ffffff, #eef0f6);
    border-radius:3px;
    position:relative; z-index:2;
  }
  .bulb-base::after{                 /* metal contact tip, small gap below bar */
    content:''; position:absolute; left:50%; top:15px;
    transform:translateX(-50%);
    width:14px; height:6px;
    background:linear-gradient(#ffffff, #e6e8ef); border-radius:2px 2px 5px 5px;
  }


  /* ---------- COMPASS PILL — glass toggle with glowing ringed dial ---------- */
  /* measured: pill x801 y94 w311 h90 r45; dial center at (949,139) → rel (148,45);
     sphere r33; bright ring peak r≈48; dark halo ring r≈62 */
  .compass{ left:801px; top:94px; }
  .compass-halo{                     /* faint stadium outline ring around pill */
    position:absolute; inset:-20px;
    border-radius:65px;
    border:7px solid rgba(255,255,255,0.06);
    filter:blur(3px);
  }
  .compass-pill{
    position:relative;
    width:311px; height:90px;
    border-radius:45px;
    background:rgb(28,35,209);
    border:1.5px solid rgba(255,255,255,0.09);
  }
  .compass-dial{                     /* anchor at dial center */
    position:absolute; left:148px; top:50%;
    width:0; height:0;
  }
  .dial-dark-ring{                   /* dark halo ring, r≈62 */
    position:absolute; left:-62px; top:-62px;
    width:124px; height:124px; border-radius:50%;
    border:9px solid rgba(10,10,60,0.40);
    filter:blur(4px);
  }
  .dial-glow-ring{                   /* bright white ring, peak r≈48 */
    position:absolute; left:-48px; top:-48px;
    width:96px; height:96px; border-radius:50%;
    border:8px solid rgba(255,255,255,0.60);
    box-shadow:0 0 16px 5px rgba(255,255,255,0.30), inset 0 0 14px 4px rgba(255,255,255,0.32);
    filter:blur(3px);
  }
  .dial-sphere{                      /* dark blue sphere, r33 */
    position:absolute; left:-33px; top:-33px;
    width:66px; height:66px; border-radius:50%;
    background:radial-gradient(circle at 50% 32%, rgb(46,54,216) 0%, rgb(26,36,212) 45%, rgb(22,30,210) 100%);
    display:flex; align-items:center; justify-content:center;
  }
  .needle-rot{                       /* rotation origin = dial center; base heading 45° (NE) */
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    transform:rotate(45deg);
    animation:seek 10.5s ease-in-out infinite;
  }
  /* compass "seeking a heading": sweep, slight overshoot, settle; ends +360° for a seamless loop */
  @keyframes seek{
    0%  { transform:rotate(45deg); }
    16% { transform:rotate(170deg); }
    22% { transform:rotate(158deg); }
    30% { transform:rotate(160deg); }
    44% { transform:rotate(76deg); }
    50% { transform:rotate(86deg); }
    57% { transform:rotate(84deg); }
    72% { transform:rotate(298deg); }
    78% { transform:rotate(288deg); }
    85% { transform:rotate(291deg); }
    96% { transform:rotate(409deg); }
    100%{ transform:rotate(405deg); }
  }
  @media (prefers-reduced-motion: reduce){ .needle-rot{ animation:none; } }
  .needle{ display:block; }          /* white kite SVG, long 59px, wide 25px, rounded tips */
</style>
</head>

  <!-- Focus button -->
  <div class="el focus-wrap float d1">
    <div class="focus-ring"></div>
    <div class="focus-ring r2"></div>
    <div class="focus-ring r3"></div>
    <div class="focus-btn"><span class="focus-word">Focus</span></div>
  </div>


  <!-- Insight bubble -->
  <div class="el insight float d2">
    <div class="insight-bubble">
      <span class="ins-word">Insight</span>
      <span class="ins-info" aria-hidden="true"><span class="ins-circle">i</span></span>
    </div>
  </div>

  <!-- Lightbulb: merged glass pear (dome+neck) + separate metal base -->
  <div class="el bulb float d3">
    <svg class="bulb-glass" viewBox="0 0 77 88" xmlns="http://www.w3.org/2000/svg">
      <!-- single continuous teardrop: circular dome smoothly tapering to a ~40px waist -->
      <path d="M38.5 1
               C59 1 76 17.5 76 38
               C76 54 66 64 60 74
               C56.5 80 55 84 54 88
               L23 88
               C22 84 20.5 80 17 74
               C11 64 1 54 1 38
               C1 17.5 18 1 38.5 1 Z"/>
    </svg>
    <div class="bulb-filament"></div>
    <div class="bulb-base"></div>
  </div>

  <!-- Compass pill -->
  <div class="el compass float d4">
    <div class="compass-halo"></div>
    <div class="compass-pill">
      <div class="compass-dial">
        <div class="dial-dark-ring"></div>
        <div class="dial-glow-ring"></div>
        <div class="dial-sphere">
          <div class="needle-rot">
            <svg class="needle" width="25" height="59" viewBox="0 0 25 59" xmlns="http://www.w3.org/2000/svg">
              <path d="M12.5 3 L22 29.5 L12.5 56 L3 29.5 Z"
                    fill="#fff" stroke="#fff" stroke-width="6" stroke-linejoin="round"/>
              <circle cx="12.5" cy="29.5" r="5" fill="rgb(48,54,214)"/>
            </svg>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Balance bubble -->
  <div class="el balance float">
    <div class="balance-bubble">Balance</div>
  </div>
</div>

<script>
  function fitStage(){
    var sc = Math.min(window.innerWidth/1420, window.innerHeight/1356);
    document.getElementById('stage').style.transform = 'scale(' + sc + ')';
  }
  window.addEventListener('load', fitStage);
  window.addEventListener('resize', fitStage);
  fitStage();
</script>
</body>
</html>
