<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Candando — Múpi Digital</title>
<style>
  @font-face {
    font-family: 'Eveleth';
    src: url('/fonts/EvelethClean-Regular.ttf') format('truetype'),
         local('Eveleth Clean Regular');
    font-weight: 400;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: 'Eveleth';
    src: url('/fonts/Eveleth-Bold.ttf') format('truetype'),
         local('Eveleth Bold');
    font-weight: 700;
    font-style: normal;
    font-display: swap;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    height: 100%;
    background: #1a1a1a;
    display: grid;
    place-items: center;
    font-family: "Inter", ui-sans-serif, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  /* ─────────────────────────────────────────
     Mupi frame  120 × 175 cm → 0.6857 ratio
  ───────────────────────────────────────── */
  .mupi {
    position: relative;
    width: min(420px, calc(100vw - 32px));
    aspect-ratio: 120 / 175;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 32px 80px rgba(0,0,0,0.55);
    background: #d41f3d;
    container-type: size;
  }

  /* L0 — red panel (top 53%) */
  .mupi-red {
    position: absolute;
    inset: 0 0 auto 0;
    height: 53%;
    background: #d41f3d;
    z-index: 0;
  }

  /* Snow — restricted to top 52% so it never enters the white panel.
     The card (z-index 10, above snow z-index 6) blocks snow in the card area. */
  .snow-layer {
    position: absolute;
    inset: 0;
    z-index: 6;
    pointer-events: none;
    overflow: hidden;
    clip-path: polygon(0% 0%, 100% 0%, 100% 52%, 0% 52%);
  }
  .snow-layer.logo-phase {
    clip-path: none;
    z-index: 25;
  }
  .flake {
    position: absolute;
    top: -2%;
    border-radius: 50%;
    background: #ffffff;
    animation: fall linear infinite;
    will-change: transform, opacity;
  }
  @keyframes fall {
    0%   { transform: translateY(0)      translateX(0)            scale(1);    opacity: 0; }
    6%   { opacity: 1; }
    85%  { opacity: 0.7; }
    100% { transform: translateY(110cqh) translateX(var(--drift)) scale(0.85); opacity: 0; }
  }

  @keyframes white-rise {
    from { transform: translateY(800px); }
    to   { transform: translateY(0); }
  }

  /* ── White panel — curve + fill ── */
  .mupi-white-panel {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 100%;
    z-index: 2;
    pointer-events: none;
    animation: white-rise 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.1s backwards;
  }

  .mupi-curve {
    position: absolute;
    bottom: 47%;
    left: -30%;
    width: 160%;
    height: calc(53% * 0.52);
    background: #ffffff;
    border-radius: 50% 50% 0 0 / 65% 65% 0 0;
  }

  /* L3 — card — lives OUTSIDE the offer wrapper so z-index 10 beats snow z-index 6 */
  .mupi-card {
    position: absolute;
    top: 13%;
    left: 50%;
    transform: translateX(-50%);
    width: 78%;
    aspect-ratio: 693 / 448;
    border-radius: 10px;
    overflow: hidden;
    background:
      linear-gradient(to bottom, rgba(255,255,255,0.13) 0%, transparent 55%),
      url("https://res.cloudinary.com/dzgqzeebg/image/upload/f_auto,q_auto,w_800/v1777219506/atfmaczybm5gpkzukudn.png")
      center / cover no-repeat;
    box-shadow: 0 8px 28px rgba(0,0,0,0);
    z-index: 10;
    animation:
      card-drop       0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.85s both,
      card-shadow-in  0.4s ease                           1.35s forwards;
    transition: transform 0.9s cubic-bezier(0.76, 0, 0.24, 1);
  }
  .mupi-card.pan-out {
    transform: translateX(-50%) translateY(120cqh);
  }
  .mupi-card::before {
    content: '';
    position: absolute;
    top: -50%;
    left: 0;
    width: 35%;
    height: 200%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.22), transparent);
    animation: card-shine 5s ease-in-out 2.2s infinite;
    pointer-events: none;
  }

  @keyframes card-drop {
    from { transform: translateX(-50%) translateY(-55px); opacity: 0; }
    to   { transform: translateX(-50%) translateY(0);     opacity: 1; }
  }
  @keyframes card-shadow-in {
    to { box-shadow: 0 8px 28px rgba(0,0,0,0.30); }
  }
  @keyframes card-shine {
    0%   { transform: skewX(-15deg) translateX(-180%); opacity: 0; }
    4%   { opacity: 1; }
    18%  { transform: skewX(-15deg) translateX(280%);  opacity: 0; }
    100% { transform: skewX(-15deg) translateX(280%);  opacity: 0; }
  }

  /* white fill */
  .mupi-white-bg {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 53%;
    background: #ffffff;
  }

  /* ── Body — vertically centred block, consistent cqw grid ── */
  .mupi-body {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 53%;
    background: transparent;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;      /* centres the whole stack vertically */
    text-align: center;
    padding: 6% 8%;
    z-index: 6;
  }

  @keyframes text-enter {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes number-punch {
    from { opacity: 0; transform: scale(1.06); }
    to   { opacity: 1; transform: scale(1); }
  }

  /* Level 1 — eyebrow */
  .mupi-eyebrow {
    font-size: clamp(10px, 2.8cqw, 13px);
    font-weight: 700;
    color: #1a1a1a;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 1cqw;
    animation: text-enter 0.45s cubic-bezier(0.16, 1, 0.3, 1) 1.3s both;
  }

  /* Level 2 — bridge word */
  .mupi-bridge {
    font-size: clamp(8px, 2cqw, 10px);
    font-weight: 400;
    color: rgba(0, 0, 0, 0.38);
    letter-spacing: 0.04em;
    margin-bottom: 2cqw;
    animation: text-enter 0.45s cubic-bezier(0.16, 1, 0.3, 1) 1.4s both;
  }

  /* Level 3 — amount */
  .mupi-amount {
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 0.18em;
    margin-bottom: 4cqw;
  }

  /* 500 — hero number, corrected tracking & line-height */
  .mupi-amount-number {
    font-family: 'Eveleth', 'Bebas Neue', sans-serif;
    font-size: clamp(28px, 9cqw, 42px);
    font-weight: 400;
    color: #f4ad32;
    line-height: 1;
    letter-spacing: 0.01em;         /* neutral — not squeezed */
    animation: number-punch 0.55s cubic-bezier(0.16, 1, 0.3, 1) 1.5s both;
  }

  /* Kz — denomination, proportionally scaled */
  .mupi-amount-currency {
    font-family: 'Eveleth', 'Bebas Neue', sans-serif;
    font-size: clamp(13px, 4cqw, 18px);
    font-weight: 400;
    color: #f4ad32;
    line-height: 1;
    letter-spacing: 0.01em;
    padding-bottom: 0.12em;        /* optical baseline alignment with number */
    animation: number-punch 0.55s cubic-bezier(0.16, 1, 0.3, 1) 1.52s both;
  }

  /* Level 4 — CTA: the conversion driver, sized accordingly */
  .mupi-cta {
    display: inline-block;
    background: #d41f3d;
    color: #ffffff;
    font-size: clamp(10px, 3cqw, 14px);   /* bigger than before */
    font-weight: 700;
    letter-spacing: 0.02em;
    padding: 4% 11%;
    border-radius: 999px;
    text-decoration: none;
    white-space: nowrap;
    margin-bottom: 3cqw;
    animation: text-enter 0.45s cubic-bezier(0.16, 1, 0.3, 1) 1.65s both;
  }
  .mupi-cta strong {
    font-weight: 800;
    letter-spacing: 0.05em;          /* opens up the code for legibility */
  }

  /* Level 5 — legal, pinned by flow */
  .mupi-footer {
    font-size: clamp(7px, 1.8cqw, 9px);
    font-weight: 400;
    line-height: 1.4;
    color: rgba(0, 0, 0, 0.35);
    letter-spacing: 0;
    animation: text-enter 0.35s cubic-bezier(0.16, 1, 0.3, 1) 1.8s both;
  }

  /* Offer wrapper — slides down on pan, rises back on return */
  .mupi-offer {
    position: absolute;
    inset: 0;
    z-index: 1;
    transform: translateY(0);
    transition: transform 0.9s cubic-bezier(0.76, 0, 0.24, 1);
  }
  .mupi-offer.exit {
    transform: translateY(100%);
  }

  /* Logo end card — parked above frame, slides down into view on pan */
  .mupi-logo-card {
    position: absolute;
    inset: 0;
    background: #d41f3d;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 20;
    transform: translateY(-100%);
    transition: transform 0.9s cubic-bezier(0.76, 0, 0.24, 1);
  }
  .mupi-logo-card.active {
    transform: translateY(0);
  }
  .mupi-logo-card svg {
    width: 42%;
  }
  @keyframes logo-settle {
    from { transform: scale(0.93); opacity: 0.6; }
    to   { transform: scale(1);    opacity: 1; }
  }

</style>
</head>

<script>
  (() => {
    const container = document.getElementById('snow');
    const COUNT = 38;
    const sizes = [3, 4, 5, 6, 7, 8, 10, 12, 14];
    for (let i = 0; i < COUNT; i++) {
      const f = document.createElement('div');
      f.className = 'flake';
      const size    = sizes[Math.floor(Math.random() * sizes.length)];
      const left    = Math.random() * 100;
      const delay   = -(Math.random() * 12);
      const dur     = 6 + Math.random() * 10;
      const drift   = (Math.random() - 0.5) * 30;
      const opacity = 0.45 + Math.random() * 0.55;
      f.style.cssText = `
        width:${size}px; height:${size}px;
        left:${left}%;
        animation-duration:${dur}s;
        animation-delay:${delay}s;
        --drift:${drift}px;
        opacity:${opacity};
      `;
      container.appendChild(f);
    }
  })();
</script>

<script>
  // Loop: offer → camera pan down → logo → camera pan back → repeat
  (() => {
    const PAN_MS    = 900;
    const LOGO_HOLD = 3500;
    const WAIT_MS   = 9000;

    const logoCard  = document.getElementById('logoCard');
    const mupiOffer = document.getElementById('mupiOffer');
    const mupiCard  = document.getElementById('mupiCard');
    const snow      = document.getElementById('snow');

    // Elements to re-animate on each loop (card handled separately)
    const targets = [
      ['#whitePanel',           'white-rise 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.1s backwards'],
      ['.mupi-eyebrow',         'text-enter 0.45s cubic-bezier(0.16, 1, 0.3, 1) 1.3s both'],
      ['.mupi-bridge',          'text-enter 0.45s cubic-bezier(0.16, 1, 0.3, 1) 1.4s both'],
      ['.mupi-amount-number',   'number-punch 0.55s cubic-bezier(0.16, 1, 0.3, 1) 1.5s both'],
      ['.mupi-amount-currency', 'number-punch 0.55s cubic-bezier(0.16, 1, 0.3, 1) 1.52s both'],
      ['.mupi-cta',             'text-enter 0.45s cubic-bezier(0.16, 1, 0.3, 1) 1.65s both'],
      ['.mupi-footer',          'text-enter 0.35s cubic-bezier(0.16, 1, 0.3, 1) 1.8s both'],
    ];

    function panToLogo() {
      // Full-frame snow for the cinematic pan
      snow.classList.add('logo-phase');

      // Clear card animation (fill-mode would block the transition otherwise)
      mupiCard.style.animation = 'none';
      mupiCard.offsetHeight;

      // Slide everything down simultaneously
      mupiOffer.classList.add('exit');
      mupiCard.classList.add('pan-out');
      logoCard.classList.add('active');

      // Logo SVG settles just as the pan lands
      const svg = logoCard.querySelector('svg');
      svg.style.animation = 'none';
      svg.offsetHeight;
      svg.style.animation = 'logo-settle 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.8s both';

      setTimeout(panToOffer, PAN_MS + LOGO_HOLD);
    }

    function panToOffer() {
      // Reverse pan — everything rises back
      mupiOffer.classList.remove('exit');
      mupiCard.classList.remove('pan-out');
      logoCard.classList.remove('active');

      setTimeout(() => {
        // Replay all offer animations
        targets.forEach(([sel, anim]) => {
          const el = document.querySelector(sel);
          if (!el) return;
          el.style.animation = 'none';
          el.offsetHeight;
          el.style.animation = anim;
        });

        // Card gets its drop animation back
        mupiCard.style.animation = 'none';
        mupiCard.offsetHeight;
        mupiCard.style.animation =
          'card-drop 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.85s both, card-shadow-in 0.4s ease 1.35s forwards';

        // Restore snow clip after card has dropped in (~1.5s)
        setTimeout(() => snow.classList.remove('logo-phase'), 1500);

        setTimeout(panToLogo, WAIT_MS);
      }, PAN_MS);
    }

    setTimeout(panToLogo, WAIT_MS);
  })();
</script>
</body>
</html>
