<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gen Studio — Mota Gomes</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg">
    <script>(function(){try{var l=localStorage.getItem('mg_lang');if(l==='pt')document.documentElement.lang='pt-PT';}catch(e){}})();</script>
    <script src="/i18n.js" defer></script>
    <style>
        :root {
            --sf-pro: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', sans-serif;
            --mono: 'SF Mono', 'Fira Code', 'Monaco', 'Menlo', monospace;
            --bg-black: #0a0a0a;
            --text: #ffffff;
            --text-60: #999999;
            --text-40: #666666;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            background: var(--bg-black);
            color: var(--text);
            font-family: var(--sf-pro);
            -webkit-font-smoothing: antialiased;
        }
        /* Native scroll-snap — matches the portfolio feel */
        html {
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
        }

        /* ===== Header (same shape as other pages) ===== */
        .header {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
        }
        .header-content {
            padding: 20px 80px;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
        }
        .header-logo {
            font-size: 13px;
            font-weight: 700;
            color: var(--text);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .header-left { display: inline-flex; align-items: center; gap: 36px; }
        .header-nav { display: flex; gap: 28px; }
        .header-nav a {
            font-size: 0.75rem;
            color: var(--text-60);
            text-decoration: none;
            letter-spacing: 0.01em;
            transition: color 0.3s ease;
            position: relative;
        }
        .header-nav a::before {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 0;
            right: 0;
            height: 1px;
            background: currentColor;
            transform: scaleX(0);
            transform-origin: center;
            transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .header-nav a:hover { color: var(--text); }
        .header-nav a:hover::before,
        .header-nav a.is-current::before { transform: scaleX(1); }
        .header-nav a.is-current { color: var(--text); }

        .header-center {
            justify-self: center;
            font-size: 10px;
            letter-spacing: 0.1em;
            color: var(--text-40);
            font-variant-numeric: tabular-nums;
            text-transform: uppercase;
        }
        .header-right { display: flex; align-items: center; justify-self: end; gap: 16px; }

        .header-lang {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-right: 16px;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.4);
        }
        .header-lang button {
            background: transparent;
            border: none;
            padding: 2px 3px;
            font: inherit;
            letter-spacing: inherit;
            text-transform: inherit;
            color: rgba(255,255,255,0.4);
            cursor: pointer;
            transition: color 0.25s ease;
        }
        .header-lang button:hover { color: rgba(255,255,255,0.85); }
        .header-lang button.is-active,
        .header-lang button[aria-pressed="true"] { color: var(--text); }
        .header-lang .ml-sep { opacity: 0.45; }

        .menu-icon { width: 29px; height: 29px; position: relative; cursor: pointer; }
        .menu-icon span {
            display: block;
            width: 20px;
            height: 1px;
            background: var(--text);
            position: absolute;
            top: 50%;
            left: 50%;
        }
        .menu-icon span:nth-child(1) { transform: translate(-50%, -4px); }
        .menu-icon span:nth-child(2) { transform: translate(-50%, 4px); }

        .menu-overlay {
            position: fixed; inset: 0;
            background: rgba(10,10,10,0.98);
            backdrop-filter: blur(20px);
            z-index: 99;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0; visibility: hidden;
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }
        .menu-overlay.active { opacity: 1; visibility: visible; }
        .menu-overlay-items { display: flex; flex-direction: column; gap: 22px; align-items: center; }
        .menu-overlay-link {
            font-size: 22px;
            font-weight: 300;
            color: var(--text-60);
            text-decoration: none;
        }
        .menu-overlay-link:hover { color: var(--text); }
        .menu-overlay-cta {
            margin-top: 20px;
            padding: 9px 14px;
            border: 1px solid rgba(255,255,255,0.34);
            border-radius: 999px;
            color: var(--text);
            text-decoration: none;
            font-size: 11px;
        }

        @media (max-width: 720px) {
            .header-content { padding: 20px 24px; }
            .header-nav { display: none; }
            .header-left { gap: 0; }
        }
        @media (min-width: 721px) {
            .menu-icon { display: none !important; }
        }

        /* ===== Gen Studio — fixed stage with scroll-snap markers ===== */

        /* The stage is fixed on top of the page; it shows the current card stack */
        .gen-stage {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none; /* only viewport is interactive (for drag) */
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .gen-glow {
            position: absolute;
            left: 50%; top: 50%;
            width: 640px; height: 640px;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            background: rgba(255,255,255,0.02);
            filter: blur(80px);
            pointer-events: none;
        }

        .gen-label {
            position: absolute;
            top: 90px;
            left: 80px;
            font-size: 10px;
            letter-spacing: 0.2em;
            color: var(--text-40);
            text-transform: uppercase;
            z-index: 3;
            pointer-events: none;
        }
        .gen-label strong { color: var(--text-60); font-weight: 500; }

        .gen-counter {
            position: absolute;
            left: 48px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 3;
            pointer-events: none;
        }
        .gen-counter-cur {
            font-size: 32px;
            font-weight: 300;
            color: var(--text);
            font-variant-numeric: tabular-nums;
            line-height: 1;
        }
        .gen-counter-sep {
            width: 28px;
            height: 1px;
            background: rgba(255,255,255,0.2);
            margin: 10px 0;
        }
        .gen-counter-total {
            font-size: 12px;
            color: var(--text-60);
            font-variant-numeric: tabular-nums;
        }

        .gen-viewport {
            position: relative;
            width: 320px;
            height: 500px;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 1200px;
            pointer-events: auto;
            touch-action: none;
            z-index: 2;
        }
        .gen-card {
            position: absolute;
            width: 280px;
            height: 420px;
            border-radius: 24px;
            overflow: hidden;
            background: #111;
            transform-style: preserve-3d;
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
            transition:
                transform 700ms cubic-bezier(0.22, 1, 0.36, 1),
                opacity 700ms cubic-bezier(0.22, 1, 0.36, 1),
                box-shadow 700ms cubic-bezier(0.22, 1, 0.36, 1);
            will-change: transform, opacity;
            cursor: grab;
        }
        .gen-card:active { cursor: grabbing; }
        .gen-card.is-current {
            box-shadow:
                0 25px 50px -12px rgba(0,0,0,0.65),
                0 0 0 1px rgba(255,255,255,0.05);
        }
        .gen-card::before {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(to bottom, rgba(255,255,255,0.08), transparent 40%);
            z-index: 2;
            pointer-events: none;
        }
        .gen-card::after {
            content: '';
            position: absolute;
            left: 0; right: 0; bottom: 0;
            height: 128px;
            background: linear-gradient(to top, rgba(10,10,10,0.6), transparent);
            z-index: 2;
            pointer-events: none;
        }
        .gen-card img {
            position: absolute;
            inset: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            display: block;
            user-select: none;
            -webkit-user-drag: none;
        }
        .gen-card[data-pos="hidden"] {
            opacity: 0;
            pointer-events: none;
        }

        /* Scroll-snap markers: one invisible 100vh section per image.
           Driving the stage via IntersectionObserver on these. */
        .gen-track {
            position: relative;
            z-index: 2;
        }
        .gen-snap {
            height: 100vh;
            scroll-snap-align: start;
            scroll-snap-stop: always;
        }

        @media (max-width: 720px) {
            .gen-counter { left: 20px; }
            .gen-label { left: 24px; top: 76px; }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header" id="header">
        <div class="header-content">
            <div class="header-left">
                <a href="/" class="header-logo"><span>MG</span></a>
                <nav class="header-nav">
                    <a href="/#work" data-i18n="menu.work">Work</a>
                    <a href="/motion-design.html" data-i18n="menu.motion">Motion Design</a>
                    <a href="/#research" data-i18n="menu.research">Research</a>
                    <a href="/#about" data-i18n="menu.about">About</a>
                    <a href="/gen-studio.html" class="is-current" data-i18n="menu.gen">Gen Studio</a>
                </nav>
            </div>
            <div class="header-center" id="gmtTime">GMT 00:00</div>
            <div class="header-right">
                <div class="header-lang" role="group" aria-label="Language">
                    <button type="button" data-i18n-toggle="en" aria-pressed="true">EN</button>
                    <span class="ml-sep" aria-hidden="true">/</span>
                    <button type="button" data-i18n-toggle="pt" aria-pressed="false">PT</button>
                </div>
                <div class="menu-icon" id="hamburger">
                    <span></span>
                    <span></span>
                </div>
            </div>
        </div>
    </header>

    <!-- Mobile menu overlay -->
    <div class="menu-overlay" id="menuOverlay">
        <div class="menu-overlay-items">
            <a href="/#work" class="menu-overlay-link" data-i18n="menu.work">Work</a>
            <a href="/motion-design.html" class="menu-overlay-link" data-i18n="menu.motion">Motion Design</a>
            <a href="/#research" class="menu-overlay-link" data-i18n="menu.research">Research</a>
            <a href="/#about" class="menu-overlay-link" data-i18n="menu.about">About</a>
            <a href="/gen-studio.html" class="menu-overlay-link" data-i18n="menu.gen">Gen Studio</a>
            <a href="mailto:hi@motagomes.com" class="menu-overlay-cta" data-i18n="menu.letstalk">Let's Talk</a>
        </div>
    </div>

    <!-- Fixed stage that follows the active snap index -->
    <div class="gen-stage">
        <div class="gen-glow"></div>

        <div class="gen-label"><strong data-i18n="gen.eyebrow">Gen Studio</strong> · <span data-i18n="gen.subtitle">AI-assisted visual explorations</span></div>

        <div class="gen-counter">
            <span class="gen-counter-cur" id="genCur">01</span>
            <span class="gen-counter-sep"></span>
            <span class="gen-counter-total" id="genTotal">05</span>
        </div>

        <div class="gen-viewport" id="genViewport">
            <!-- Card stack injected by JS -->
        </div>
    </div>

    <!-- Invisible snap track — native scroll-snap drives the stage -->
    <main class="gen-track" id="genTrack">
        <!-- One .gen-snap per image, injected by JS -->
    </main>

    <script>
    (function () {
        var IMAGES = [
            { id: 1, src: 'https://hebbkx1anhila5yf.public.blob.vercel-storage.com/attachments/gen-images/public/luxury-black-sneaker-with-red-sole-on-grey-backgro-hj40sZT8MUUSeLz18VN7EjhcnV0kSD.jpg', alt: 'Black sneaker with red sole' },
            { id: 2, src: 'https://hebbkx1anhila5yf.public.blob.vercel-storage.com/attachments/gen-images/public/white-minimalist-sneaker-on-light-background-xQxkXgGrSrAe6pvLPNC6yrh20Atqoa.jpg', alt: 'White minimalist sneaker' },
            { id: 3, src: 'https://hebbkx1anhila5yf.public.blob.vercel-storage.com/attachments/gen-images/public/navy-blue-running-shoe-on-gradient-background-E1spqSK9gDvh3gTNwASkttEg76nZgm.jpg', alt: 'Navy blue running shoe' },
            { id: 4, src: 'https://hebbkx1anhila5yf.public.blob.vercel-storage.com/attachments/gen-images/public/red-athletic-sneaker-on-dark-background-skamDX1NbCRW4jvHxijkfmCnHGr6NJ.jpg', alt: 'Red athletic sneaker' },
            { id: 5, src: 'https://hebbkx1anhila5yf.public.blob.vercel-storage.com/attachments/gen-images/public/green-forest-hiking-boot-on-natural-background-T41PNLzI60G2u6rFIRxeCbKT6RWKOH.jpg', alt: 'Green hiking boot' }
        ];

        var viewport = document.getElementById('genViewport');
        var track    = document.getElementById('genTrack');
        var curEl    = document.getElementById('genCur');
        var totalEl  = document.getElementById('genTotal');

        var currentIndex = 0;
        var cards = [];
        var markers = [];

        function build() {
            // Cards (stacked 3D visualization)
            IMAGES.forEach(function (img, i) {
                var card = document.createElement('div');
                card.className = 'gen-card';
                card.setAttribute('data-index', i);
                var im = document.createElement('img');
                im.src = img.src;
                im.alt = img.alt;
                im.draggable = false;
                im.loading = i === 0 ? 'eager' : 'lazy';
                im.decoding = 'async';
                card.appendChild(im);
                viewport.appendChild(card);
                cards.push(card);
            });

            // Scroll-snap markers (one 100vh section per image — hidden stage above)
            IMAGES.forEach(function (img, i) {
                var m = document.createElement('section');
                m.className = 'gen-snap';
                m.setAttribute('data-index', i);
                m.setAttribute('aria-label', 'Image ' + (i + 1) + ' of ' + IMAGES.length);
                track.appendChild(m);
                markers.push(m);
            });

            totalEl.textContent = String(IMAGES.length).padStart(2, '0');
            layout();
        }

        function styleFor(idx) {
            var total = IMAGES.length;
            var diff = idx - currentIndex;
            if (diff > total / 2) diff -= total;
            if (diff < -total / 2) diff += total;

            if (diff === 0)  return { y:    0, scale: 1.00, opacity: 1.00, z: 5, rx:   0, hidden: false, current: true };
            if (diff === -1) return { y: -160, scale: 0.82, opacity: 0.60, z: 4, rx:   8, hidden: false, current: false };
            if (diff === -2) return { y: -280, scale: 0.70, opacity: 0.30, z: 3, rx:  15, hidden: false, current: false };
            if (diff ===  1) return { y:  160, scale: 0.82, opacity: 0.60, z: 4, rx:  -8, hidden: false, current: false };
            if (diff ===  2) return { y:  280, scale: 0.70, opacity: 0.30, z: 3, rx: -15, hidden: false, current: false };
            return { y: diff > 0 ? 400 : -400, scale: 0.60, opacity: 0, z: 0, rx: diff > 0 ? -20 : 20, hidden: true, current: false };
        }

        function layout() {
            cards.forEach(function (card, i) {
                var s = styleFor(i);
                card.style.transform = 'translateY(' + s.y + 'px) scale(' + s.scale + ') rotateX(' + s.rx + 'deg)';
                card.style.opacity = s.opacity;
                card.style.zIndex = s.z;
                card.setAttribute('data-pos', s.hidden ? 'hidden' : 'visible');
                card.classList.toggle('is-current', s.current);
            });
            curEl.textContent = String(currentIndex + 1).padStart(2, '0');
        }

        function setIndex(i) {
            i = Math.max(0, Math.min(IMAGES.length - 1, i));
            if (i === currentIndex) return;
            currentIndex = i;
            layout();
        }

        // IntersectionObserver on the snap markers: whichever marker is
        // most in-view drives the stage. Native wheel/touch scroll-snap
        // handles the actual scrolling feel — matches the rest of the site.
        var io = new IntersectionObserver(function (entries) {
            // Pick the entry with the highest intersection ratio
            var best = null;
            entries.forEach(function (e) {
                if (!best || e.intersectionRatio > best.intersectionRatio) best = e;
            });
            if (best && best.isIntersecting) {
                var idx = parseInt(best.target.getAttribute('data-index'), 10);
                if (!isNaN(idx)) setIndex(idx);
            }
        }, {
            threshold: [0.5, 0.75]
        });

        function observeAll() {
            markers.forEach(function (m) { io.observe(m); });
        }

        // ===== Keyboard =====
        window.addEventListener('keydown', function (e) {
            var next = currentIndex;
            if (e.key === 'ArrowDown' || e.key === 'PageDown' || e.key === ' ') {
                next = Math.min(currentIndex + 1, IMAGES.length - 1);
            } else if (e.key === 'ArrowUp' || e.key === 'PageUp') {
                next = Math.max(currentIndex - 1, 0);
            } else {
                return;
            }
            e.preventDefault();
            markers[next].scrollIntoView({ behavior: 'smooth' });
        });

        // ===== Drag on the card viewport — swipes to next/prev marker =====
        var drag = { active: false, startY: 0, card: null, id: null };
        viewport.addEventListener('pointerdown', function (e) {
            var c = cards[currentIndex];
            if (!c) return;
            drag.active = true;
            drag.startY = e.clientY;
            drag.card = c;
            drag.id = e.pointerId;
            c.style.transition = 'none';
            try { c.setPointerCapture(e.pointerId); } catch (_) {}
        });
        viewport.addEventListener('pointermove', function (e) {
            if (!drag.active || !drag.card) return;
            var dy = e.clientY - drag.startY;
            drag.card.style.transform = 'translateY(' + (dy * 0.5) + 'px) scale(1) rotateX(0deg)';
        });
        function endDrag(e) {
            if (!drag.active) return;
            var dy = e.clientY - drag.startY;
            drag.card.style.transition = '';
            drag.active = false;
            var next = currentIndex;
            if (dy < -60)      next = Math.min(currentIndex + 1, IMAGES.length - 1);
            else if (dy > 60)  next = Math.max(currentIndex - 1, 0);
            if (next !== currentIndex && markers[next]) {
                markers[next].scrollIntoView({ behavior: 'smooth' });
            } else {
                layout(); // snap the card back
            }
            drag.card = null;
        }
        viewport.addEventListener('pointerup', endDrag);
        viewport.addEventListener('pointercancel', endDrag);

        // ===== GMT clock =====
        function tick() {
            var el = document.getElementById('gmtTime');
            if (!el) return;
            var now = new Date();
            var h = String(now.getUTCHours()).padStart(2, '0');
            var m = String(now.getUTCMinutes()).padStart(2, '0');
            el.textContent = 'GMT ' + h + ':' + m;
        }
        tick();
        setInterval(tick, 10000);

        // ===== Mobile menu =====
        var ham = document.getElementById('hamburger');
        var ov  = document.getElementById('menuOverlay');
        if (ham && ov) {
            ham.addEventListener('click', function () { ov.classList.add('active'); });
            ov.addEventListener('click', function (e) { if (e.target === ov) ov.classList.remove('active'); });
            Array.prototype.forEach.call(ov.querySelectorAll('.menu-overlay-link, .menu-overlay-cta'), function (el) {
                el.addEventListener('click', function () { ov.classList.remove('active'); });
            });
        }

        // ===== Init =====
        build();
        observeAll();
    })();
    </script>
</body>
</html>
