<html lang="en">
<head>

    <meta name="robots" content="noindex, nofollow">

    <title>AI slop — Mota Gomes</title>

    <style>
        :root {
            --sf-pro: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', sans-serif;
            --mono: 'SF Mono', 'Fira Code', 'Monaco', 'Menlo', monospace;
            --bg-black: #0a0a0a;
            --text: #ffffff;
            --text-60: #999999;
            --text-40: #666666;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            background: var(--bg-black);
            color: var(--text);
            font-family: var(--sf-pro);
            -webkit-font-smoothing: antialiased;
        }
        /* Single-screen slideshow: wheel/keyboard/drag drive the stage with wrap-around */
        html, body {
            overflow: hidden;
            height: 100%;
        }

        /* ===== Header (same shape as other pages) ===== */
        .header {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
        }
        .header-content {
            padding: 20px 80px;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
        }
        .header-logo {
            font-size: 13px;
            font-weight: 700;
            color: var(--text);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .header-left { display: inline-flex; align-items: center; gap: 36px; }
        .header-nav { display: flex; gap: 28px; }
        .header-nav a {
            font-size: 0.95rem;
            color: var(--text-60);
            text-decoration: none;
            letter-spacing: -0.005em;
            transition: color 0.3s ease;
            position: relative;
        }
        .header-nav a::before {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 0;
            right: 0;
            height: 1px;
            background: currentColor;
            transform: scaleX(0);
            transform-origin: center;
            transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .header-nav a:hover { color: var(--text); }
        .header-nav a:hover::before,
        .header-nav a.is-current::before { transform: scaleX(1); }
        .header-nav a.is-current { color: var(--text); }

        .header-center {
            justify-self: center;
            font-size: 10px;
            letter-spacing: 0.1em;
            color: var(--text-40);
            font-variant-numeric: tabular-nums;
            text-transform: uppercase;
        }
        .header-right { display: flex; align-items: center; justify-self: end; gap: 16px; }

        .header-updated {
            font-family: var(--sf-pro);
            font-size: 10px;
            letter-spacing: 0.1em;
            color: var(--text-40);
            text-transform: uppercase;
            white-space: nowrap;
            line-height: 1;
        }
        .header-social {
            display: inline-flex;
            align-items: center;
            color: var(--text-60);
            transition: color 0.25s ease;
        }
        .header-social:hover { color: var(--text); }
        .header-social svg { width: 15px; height: 15px; display: block; }
        @media (max-width: 720px) {
            .header-updated { display: none; }
        }

        .header-lang {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-right: 16px;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.4);
        }
        .header-lang button {
            background: transparent;
            border: none;
            padding: 2px 3px;
            font: inherit;
            letter-spacing: inherit;
            text-transform: inherit;
            color: rgba(255,255,255,0.4);
            cursor: pointer;
            transition: color 0.25s ease;
        }
        .header-lang button:hover { color: rgba(255,255,255,0.85); }
        .header-lang button.is-active,
        .header-lang button[aria-pressed="true"] { color: var(--text); }
        .header-lang .ml-sep { opacity: 0.45; }

        .menu-icon { width: 29px; height: 29px; position: relative; cursor: pointer; }
        .menu-icon span {
            display: block;
            width: 20px;
            height: 1px;
            background: var(--text);
            position: absolute;
            top: 50%;
            left: 50%;
        }
        .menu-icon span:nth-child(1) { transform: translate(-50%, -4px); }
        .menu-icon span:nth-child(2) { transform: translate(-50%, 4px); }

        .menu-overlay {
            position: fixed; inset: 0;
            background: rgba(10,10,10,0.98);
            backdrop-filter: blur(20px);
            z-index: 99;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0; visibility: hidden;
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }
        .menu-overlay.active { opacity: 1; visibility: visible; }
        .menu-overlay-items { display: flex; flex-direction: column; gap: 22px; align-items: center; }
        .menu-overlay-link {
            font-size: 22px;
            font-weight: 300;
            color: var(--text-60);
            text-decoration: none;
        }
        .menu-overlay-link:hover { color: var(--text); }
        .menu-overlay-cta {
            margin-top: 20px;
            padding: 9px 14px;
            border: 1px solid rgba(255,255,255,0.34);
            border-radius: 999px;
            color: var(--text);
            text-decoration: none;
            font-size: 11px;
        }

        @media (max-width: 720px) {
            .header-content { padding: 20px 24px; }
            .header-nav { display: none; }
            .header-left { gap: 0; }
        }
        @media (min-width: 721px) {
            .menu-icon { display: none !important; }
        }

        /* ===== Gen Studio — fixed stage with scroll-snap markers ===== */

        /* The stage is fixed on top of the page; it shows the current card stack */
        .gen-stage {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none; /* only viewport is interactive (for drag) */
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .gen-glow {
            position: absolute;
            left: 50%; top: 50%;
            width: 640px; height: 640px;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            background: rgba(255,255,255,0.02);
            filter: blur(80px);
            pointer-events: none;
        }

        .gen-label {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            letter-spacing: 0.2em;
            color: var(--text-40);
            text-transform: uppercase;
            z-index: 3;
            pointer-events: none;
            white-space: nowrap;
        }
        .gen-label strong { color: var(--text-60); font-weight: 500; }

        /* Mota Gomes signature — sits just above the gen-label */
        .gen-signature {
            position: absolute;
            bottom: 68px;
            left: 50%;
            transform: translateX(-50%);
            width: 180px;
            height: auto;
            color: var(--text, #ffffff);
            opacity: .95;
            z-index: 3;
            pointer-events: none;
        }
        .gen-signature svg { width: 100%; height: auto; display: block; }
        .gen-signature svg path { fill: currentColor; }

        /* Right-side scroll progress bar — matches portfolio .gallery-stacked-progress */
        .gen-progress {
            position: absolute;
            right: 80px;
            top: 50%;
            transform: translateY(-50%);
            width: 1px;
            height: 120px;
            background: rgba(255,255,255,0.08);
            overflow: hidden;
            z-index: 3;
            pointer-events: none;
        }
        .gen-progress-fill {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 0%;
            background: #ffffff;
            transition: height 0.3s ease;
        }
        @media (max-width: 1024px) {
            .gen-progress { right: 24px; }
        }
        @media (max-width: 768px) {
            .gen-progress { display: none; }
        }

        .gen-counter {
            position: absolute;
            left: 48px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 3;
            pointer-events: none;
        }
        .gen-counter-cur {
            font-size: 32px;
            font-weight: 300;
            color: var(--text);
            font-variant-numeric: tabular-nums;
            line-height: 1;
        }
        .gen-counter-sep {
            width: 28px;
            height: 1px;
            background: rgba(255,255,255,0.2);
            margin: 10px 0;
        }
        .gen-counter-total {
            font-size: 12px;
            color: var(--text-60);
            font-variant-numeric: tabular-nums;
        }

        .gen-viewport {
            position: relative;
            width: 716px;        /* +10% */
            height: 647px;       /* +10% */
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 1200px;
            pointer-events: auto;
            touch-action: none;
            z-index: 2;
        }
        /* 4:3 card, no image — solid dark surface with a subtle top sheen */
        .gen-card {
            position: absolute;
            width: 647px;        /* +10% */
            aspect-ratio: 4 / 3;
            border-radius: 18px;
            overflow: hidden;
            background: linear-gradient(180deg, #151515 0%, #0c0c0c 100%);
            transform-style: preserve-3d;
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
            transition:
                transform 700ms cubic-bezier(0.22, 1, 0.36, 1),
                opacity 700ms cubic-bezier(0.22, 1, 0.36, 1),
                box-shadow 700ms cubic-bezier(0.22, 1, 0.36, 1);
            will-change: transform, opacity;
            cursor: grab;
        }
        .gen-card:active { cursor: grabbing; }
        .gen-card.is-current {
            box-shadow:
                0 25px 50px -12px rgba(0,0,0,0.65),
                0 0 0 1px rgba(255,255,255,0.06);
        }
        .gen-card::before {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(to bottom, rgba(255,255,255,0.06), transparent 40%);
            z-index: 2;
            pointer-events: none;
        }
        .gen-card[data-pos="hidden"] {
            opacity: 0;
            pointer-events: none;
        }

        @media (max-width: 720px) {
            .gen-viewport { width: 92vw; height: 440px; }
            .gen-card { width: 88vw; }
        }

        /* Scroll-snap markers: one invisible 100vh section per image.
           Driving the stage via IntersectionObserver on these. */
        .gen-track {
            position: relative;
            z-index: 2;
        }
        .gen-snap {
            height: 100vh;
            scroll-snap-align: start;
            scroll-snap-stop: always;
        }

        @media (max-width: 720px) {
            .gen-counter { left: 20px; }
            .gen-label { bottom: 24px; left: 50%; top: auto; }
        }
    </style>
</head>

        <div class="gen-label" hidden style="display:none"><strong data-i18n="gen.eyebrow">AI slop</strong> · <span data-i18n="gen.subtitle">AI-assisted visual explorations</span></div>

        <div class="gen-counter">
            <span class="gen-counter-cur" id="genCur">01</span>
            <span class="gen-counter-sep"></span>
            <span class="gen-counter-total" id="genTotal">05</span>
        </div>

        <div class="gen-progress" aria-hidden="true">
            <div class="gen-progress-fill" id="genProgressFill"></div>
        </div>

        <div class="gen-viewport" id="genViewport">
            <!-- Card stack injected by JS -->
        </div>
    </div>

    <!-- Invisible snap track — native scroll-snap drives the stage -->
    <main class="gen-track" id="genTrack">
        <!-- One .gen-snap per image, injected by JS -->
    </main>

    <script>
    (function () {
        // 5 card slots — fill by adding a `url` to a slot.
        var IMAGES = [
            { id: 1, url: 'https://res.cloudinary.com/dzgqzeebg/image/upload/v1776862617/gym_xntulz.jpg' },
            { id: 2, url: 'https://res.cloudinary.com/dzgqzeebg/image/upload/v1776862668/hf_20260422_105448_b208b2f7-9e39-4cfe-bf08-9800ec9459ff_2_wwyo7c.png' },
            { id: 3, url: 'https://res.cloudinary.com/dzgqzeebg/image/upload/v1776862663/hf_20260422_020335_b52c4512-e9c9-4e50-870a-df8ee0862ec9_b8vzjs.png' },
            { id: 4, url: 'https://res.cloudinary.com/dzgqzeebg/image/upload/v1776863789/hf_20260421_063353_f2544b10-1ce8-472e-84af-fb5e2a33d3b8_trsdfi.jpg' },
            { id: 5, url: 'https://res.cloudinary.com/dzgqzeebg/image/upload/v1776863789/hf_20260421_041502_7dce3cee-7fa8-4657-bf08-7552d1d66e5c_tjbrwq.jpg' }
        ];

        var viewport = document.getElementById('genViewport');
        var track    = document.getElementById('genTrack');
        var curEl    = document.getElementById('genCur');
        var totalEl  = document.getElementById('genTotal');

        var currentIndex = 0;
        var cards = [];
        var markers = [];

        function build() {
            // Cards — render image if a url is provided, otherwise clean 4:3 surface
            IMAGES.forEach(function (item, i) {
                var card = document.createElement('div');
                card.className = 'gen-card';
                card.setAttribute('data-index', i);
                if (item && item.url) {
                    var img = document.createElement('img');
                    img.src = item.url;
                    img.alt = 'AI slop ' + (i + 1);
                    img.loading = 'lazy';
                    img.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:cover;';
                    card.appendChild(img);
                }
                viewport.appendChild(card);
                cards.push(card);
            });

            totalEl.textContent = String(IMAGES.length).padStart(2, '0');
            layout();
        }

        function styleFor(idx) {
            var total = IMAGES.length;
            var diff = idx - currentIndex;
            if (diff > total / 2) diff -= total;
            if (diff < -total / 2) diff += total;

            if (diff === 0)  return { y:    0, scale: 1.00, opacity: 1.00, z: 5, rx:   0, hidden: false, current: true };
            if (diff === -1) return { y: -160, scale: 0.82, opacity: 0.60, z: 4, rx:   8, hidden: false, current: false };
            if (diff === -2) return { y: -280, scale: 0.70, opacity: 0.30, z: 3, rx:  15, hidden: false, current: false };
            if (diff ===  1) return { y:  160, scale: 0.82, opacity: 0.60, z: 4, rx:  -8, hidden: false, current: false };
            if (diff ===  2) return { y:  280, scale: 0.70, opacity: 0.30, z: 3, rx: -15, hidden: false, current: false };
            return { y: diff > 0 ? 400 : -400, scale: 0.60, opacity: 0, z: 0, rx: diff > 0 ? -20 : 20, hidden: true, current: false };
        }

        function layout() {
            cards.forEach(function (card, i) {
                var s = styleFor(i);
                card.style.transform = 'translateY(' + s.y + 'px) scale(' + s.scale + ') rotateX(' + s.rx + 'deg)';
                card.style.opacity = s.opacity;
                card.style.zIndex = s.z;
                card.setAttribute('data-pos', s.hidden ? 'hidden' : 'visible');
                card.classList.toggle('is-current', s.current);
            });
            curEl.textContent = String(currentIndex + 1).padStart(2, '0');
        }

        function setIndex(i) {
            // Wrap into [0, IMAGES.length)
            var n = IMAGES.length;
            i = ((i % n) + n) % n;
            if (i === currentIndex) return;
            currentIndex = i;
            layout();
            var fill = document.getElementById('genProgressFill');
            if (fill) fill.style.height = (((i + 1) / n) * 100) + '%';
        }

        // ===== Continuous wheel navigation: no page scroll, wraps infinitely =====
        var wheelCooldown = false;
        window.addEventListener('wheel', function (e) {
            e.preventDefault();
            if (wheelCooldown) return;
            if (Math.abs(e.deltaY) < 8) return;
            wheelCooldown = true;
            setIndex(currentIndex + (e.deltaY > 0 ? 1 : -1));
            setTimeout(function () { wheelCooldown = false; }, 420);
        }, { passive: false });

        // ===== Keyboard =====
        window.addEventListener('keydown', function (e) {
            if (e.key === 'ArrowDown' || e.key === 'PageDown' || e.key === ' ') {
                e.preventDefault();
                setIndex(currentIndex + 1);
            } else if (e.key === 'ArrowUp' || e.key === 'PageUp') {
                e.preventDefault();
                setIndex(currentIndex - 1);
            }
        });

        // ===== Drag on the card viewport — swipes to next/prev =====
        var drag = { active: false, startY: 0, card: null, id: null };
        viewport.addEventListener('pointerdown', function (e) {
            var c = cards[currentIndex];
            if (!c) return;
            drag.active = true;
            drag.startY = e.clientY;
            drag.card = c;
            drag.id = e.pointerId;
            c.style.transition = 'none';
            try { c.setPointerCapture(e.pointerId); } catch (_) {}
        });
        viewport.addEventListener('pointermove', function (e) {
            if (!drag.active || !drag.card) return;
            var dy = e.clientY - drag.startY;
            drag.card.style.transform = 'translateY(' + (dy * 0.5) + 'px) scale(1) rotateX(0deg)';
        });
        function endDrag(e) {
            if (!drag.active) return;
            var dy = e.clientY - drag.startY;
            drag.card.style.transition = '';
            drag.active = false;
            if (dy < -60)      setIndex(currentIndex + 1);
            else if (dy > 60)  setIndex(currentIndex - 1);
            else               layout(); // snap back
            drag.card = null;
        }
        viewport.addEventListener('pointerup', endDrag);
        viewport.addEventListener('pointercancel', endDrag);

        // ===== Touch (mobile swipe) =====
        var touchStartY = null;
        window.addEventListener('touchstart', function (e) {
            if (e.touches && e.touches[0]) touchStartY = e.touches[0].clientY;
        }, { passive: true });
        window.addEventListener('touchmove', function (e) {
            e.preventDefault();
        }, { passive: false });
        window.addEventListener('touchend', function (e) {
            if (touchStartY == null) return;
            var endY = (e.changedTouches && e.changedTouches[0]) ? e.changedTouches[0].clientY : touchStartY;
            var dy = endY - touchStartY;
            touchStartY = null;
            if (dy < -40)      setIndex(currentIndex + 1);
            else if (dy > 40)  setIndex(currentIndex - 1);
        });

        // ===== GMT clock =====
        function tick() {
            var el = document.getElementById('gmtTime');
            if (!el) return;
            var now = new Date();
            var h = String(now.getUTCHours()).padStart(2, '0');
            var m = String(now.getUTCMinutes()).padStart(2, '0');
            el.textContent = 'GMT ' + h + ':' + m;
        }
        tick();
        setInterval(tick, 10000);

        // ===== Mobile menu =====
        var ham = document.getElementById('hamburger');
        var ov  = document.getElementById('menuOverlay');
        if (ham && ov) {
            ham.addEventListener('click', function () { ov.classList.add('active'); });
            ov.addEventListener('click', function (e) { if (e.target === ov) ov.classList.remove('active'); });
            Array.prototype.forEach.call(ov.querySelectorAll('.menu-overlay-link, .menu-overlay-cta'), function (el) {
                el.addEventListener('click', function () { ov.classList.remove('active'); });
            });
        }

        // ===== Init =====
        build();
        var fill = document.getElementById('genProgressFill');
        if (fill) fill.style.height = ((1 / IMAGES.length) * 100) + '%';
    })();
    </script>
