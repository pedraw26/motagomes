<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI slop · Fullscreen — Mota Gomes</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg">
    <style>
        :root {
            --sf-pro: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', sans-serif;
            --bg: #0a0a0a;
            --text: #ffffff;
            --text-60: rgba(255,255,255,0.6);
            --text-40: rgba(255,255,255,0.4);
            --text-20: rgba(255,255,255,0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--sf-pro);
            -webkit-font-smoothing: antialiased;
            height: 100%;
            overflow: hidden;
            overscroll-behavior: none;
        }

        /* ====== Full-bleed image layer (crossfade stack) ====== */
        .stage {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: var(--bg);
        }
        .slide {
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 900ms cubic-bezier(0.22, 1, 0.36, 1);
            will-change: opacity;
        }
        .slide.is-active { opacity: 1; }
        .slide img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Subtle vignettes top & bottom for UI legibility — only over image */
        .stage::before,
        .stage::after {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            height: 180px;
            pointer-events: none;
            z-index: 1;
        }
        .stage::before {
            top: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.55), rgba(0,0,0,0));
        }
        .stage::after {
            bottom: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.55), rgba(0,0,0,0));
        }

        /* ====== Top-left: MG logo ====== */
        /* ===== Cross-document View Transitions — enter from portfolio ===== */
        @view-transition { navigation: auto; }
        ::view-transition-group(*) {
            animation-duration: 1200ms;
            animation-timing-function: cubic-bezier(0.65, 0, 0.35, 1);
        }
        ::view-transition-old(root),
        ::view-transition-new(root) {
            animation-duration: 1000ms;
            animation-timing-function: cubic-bezier(0.65, 0, 0.35, 1);
        }

        .ui-logo {
            position: fixed;
            top: 28px;
            left: 32px;
            z-index: 10;
            color: var(--text);
            text-decoration: none;
            font-weight: 400;
            letter-spacing: 0.04em;
            font-size: 16px;
            opacity: 0.92;
            transition: opacity 200ms ease;
            view-transition-name: site-logo;
        }
        .ui-logo:hover { opacity: 1; }
        .ui-logo .mg-g {
            font-size: 1.22em;
            line-height: 1;
            vertical-align: -0.08em;
        }

        /* ====== Top-center: Gen Studio animated gradient title ====== */
        .ui-title {
            position: fixed;
            top: 26px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            font-size: 13px;
            font-weight: 400;
            letter-spacing: 0.04em;
            pointer-events: none;
            background-image: linear-gradient(90deg, #ff7a7a, #ffb347, #ffe66d, #6ee7b7, #67c8ff, #c084fc, #ff7a7a);
            background-size: 200% 100%;
            background-repeat: repeat;
            -webkit-background-clip: text;
                    background-clip: text;
            -webkit-text-fill-color: transparent;
                    color: transparent;
            animation: ui-title-gradient 6s linear infinite;
            view-transition-name: gen-label;
        }
        @keyframes ui-title-gradient {
            from { background-position: 0% 50%; }
            to   { background-position: -200% 50%; }
        }
        @media (prefers-reduced-motion: reduce) {
            .ui-title { animation: none; }
        }

        /* ====== Bottom-right: GMT clock (swapped with Exit) ====== */
        .ui-clock {
            position: fixed;
            bottom: 40px;
            right: 40px;
            z-index: 10;
            font-size: 11px;
            letter-spacing: 0.22em;
            color: var(--text-60);
            font-variant-numeric: tabular-nums;
            pointer-events: none;
        }

        /* ====== Top-right: Exit (swapped with clock) — sophisticated hover animation ======
           - Pill with frosted backdrop
           - Text slides up and is replaced by a duplicate from below (marquee reveal)
           - A liquid fill sweeps in from the left behind the text
           - Border gains a soft glow
           - A subtle chevron arrow fades in on the right */
        .ui-back {
            --h: 14px;                     /* line height of the EXIT label */
            position: fixed;
            top: 22px;
            right: 32px;
            z-index: 10;
            display: inline-flex;
            align-items: center;
            gap: 0;
            padding: 8px 16px;
            color: var(--text);
            text-decoration: none;
            font-size: 10px;
            font-weight: 400;
            letter-spacing: 0.26em;
            text-transform: uppercase;
            line-height: var(--h);
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            -webkit-backdrop-filter: blur(12px) saturate(140%);
                    backdrop-filter: blur(12px) saturate(140%);
            overflow: hidden;
            isolation: isolate;
            opacity: 0.9;
            transition:
                opacity 350ms ease,
                border-color 500ms cubic-bezier(0.22, 1, 0.36, 1),
                box-shadow 500ms cubic-bezier(0.22, 1, 0.36, 1),
                transform 400ms cubic-bezier(0.22, 1, 0.36, 1),
                gap 550ms cubic-bezier(0.22, 1, 0.36, 1);
        }
        /* Liquid fill — sweeps in from the left on hover */
        .ui-back::before {
            content: '';
            position: absolute;
            inset: 0;
            z-index: -1;
            background: rgba(255, 255, 255, 0.12);
            transform-origin: left center;
            transform: scaleX(0);
            transition: transform 700ms cubic-bezier(0.77, 0, 0.18, 1);
        }
        .ui-back:hover {
            opacity: 1;
            border-color: rgba(255, 255, 255, 0.55);
            box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.06), 0 6px 24px -8px rgba(0,0,0,0.5);
            gap: 8px;
        }
        .ui-back:hover::before { transform: scaleX(1); }
        .ui-back:active { transform: scale(0.96); }

        /* Marquee-style text swap: two stacked labels, stack slides up on hover */
        .ui-back-stack {
            position: relative;
            display: inline-block;
            height: var(--h);
            overflow: hidden;
        }
        .ui-back-stack span {
            display: block;
            height: var(--h);
            line-height: var(--h);
            transform: translateY(0);
            transition: transform 650ms cubic-bezier(0.77, 0, 0.18, 1);
        }
        .ui-back:hover .ui-back-stack span {
            transform: translateY(calc(var(--h) * -1));
        }

        /* Chevron — fades/slides in on hover */
        .ui-back-arrow {
            width: 0;
            height: 10px;
            overflow: hidden;
            display: inline-flex;
            align-items: center;
            opacity: 0;
            transition:
                width 550ms cubic-bezier(0.22, 1, 0.36, 1),
                opacity 450ms cubic-bezier(0.22, 1, 0.36, 1);
        }
        .ui-back-arrow svg {
            width: 12px;
            height: 12px;
            flex-shrink: 0;
            stroke: currentColor;
            fill: none;
            stroke-width: 1.3;
            stroke-linecap: round;
            stroke-linejoin: round;
            transform: translateX(-4px);
            transition: transform 550ms cubic-bezier(0.22, 1, 0.36, 1);
        }
        .ui-back:hover .ui-back-arrow { width: 12px; opacity: 1; }
        .ui-back:hover .ui-back-arrow svg { transform: translateX(0); }

        /* ====== Mota Gomes signature — hidden ====== */
        .ui-signature { display: none; }
        .ui-signature:hover { opacity: 1; }
        .ui-signature svg { width: 100%; height: auto; display: block; }
        .ui-signature svg path { fill: currentColor; }

        /* ====== Right-side rail with numbers — creative minimalist counter ====== */
        .rail {
            position: fixed;
            right: 32px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 0;
            pointer-events: none;
        }
        .rail-item {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            height: 26px;
            gap: 14px;
            opacity: 0.35;
            color: var(--text);
            font-size: 10px;
            letter-spacing: 0.2em;
            font-variant-numeric: tabular-nums;
            transition: opacity 500ms cubic-bezier(0.22, 1, 0.36, 1);
        }
        .rail-item-num {
            width: 22px;
            text-align: right;
            transform: translateX(6px);
            opacity: 0;
            transition:
                transform 500ms cubic-bezier(0.22, 1, 0.36, 1),
                opacity 500ms cubic-bezier(0.22, 1, 0.36, 1);
        }
        .rail-item-tick {
            width: 18px;
            height: 1px;
            background: currentColor;
            transition: width 500ms cubic-bezier(0.22, 1, 0.36, 1);
        }
        .rail-item.is-active {
            opacity: 1;
        }
        .rail-item.is-active .rail-item-num {
            transform: translateX(0);
            opacity: 1;
        }
        .rail-item.is-active .rail-item-tick {
            width: 48px;
        }

        /* ====== Bottom hint (fades on first interaction) ====== */
        .hint {
            position: fixed;
            left: 50%;
            bottom: 36px;
            transform: translateX(-50%);
            z-index: 10;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 10px;
            letter-spacing: 0.28em;
            text-transform: uppercase;
            color: var(--text-60);
            opacity: 1;
            transition: opacity 600ms ease;
            pointer-events: none;
        }
        .hint.is-dismissed { opacity: 0; }
        .hint-arrow {
            display: inline-block;
            width: 1px;
            height: 24px;
            background: currentColor;
            position: relative;
            animation: hintPulse 1.8s ease-in-out infinite;
        }
        .hint-arrow::after {
            content: '';
            position: absolute;
            left: 50%;
            bottom: -1px;
            width: 6px;
            height: 6px;
            border-right: 1px solid currentColor;
            border-bottom: 1px solid currentColor;
            transform: translateX(-50%) rotate(45deg);
        }
        @keyframes hintPulse {
            0%, 100% { transform: translateY(0); opacity: 0.6; }
            50%      { transform: translateY(6px); opacity: 1; }
        }

        /* ====== Caption (large index, bottom left) — creative number placement ====== */
        .caption {
            position: fixed;
            left: 32px;
            bottom: 32px;
            z-index: 10;
            display: flex;
            align-items: baseline;
            gap: 8px;
            font-variant-numeric: tabular-nums;
            pointer-events: none;
        }
        .caption-cur {
            font-size: 40px;
            font-weight: 200;
            color: var(--text);
            line-height: 1;
            letter-spacing: -0.02em;
        }
        .caption-sep {
            font-size: 12px;
            color: var(--text-40);
            letter-spacing: 0.1em;
        }
        .caption-total {
            font-size: 12px;
            color: var(--text-60);
            letter-spacing: 0.1em;
        }

        /* ====== Responsive ====== */
        @media (max-width: 720px) {
            .ui-logo   { top: 20px; left: 20px; }
            .ui-back   { top: 20px; right: 20px; font-size: 10px; }
            .rail      { right: 20px; }
            .rail-item.is-active .rail-item-tick { width: 32px; }
            .caption   { left: 20px; bottom: 24px; }
            .caption-cur { font-size: 32px; }
            .hint      { bottom: 24px; }
        }

        @media (prefers-reduced-motion: reduce) {
            .slide { transition: opacity 200ms ease; }
            .hint-arrow { animation: none; }
        }
    </style>
</head>

    <div class="stage" id="stage" aria-label="AI slop fullscreen gallery"></div>

    <nav class="rail" id="rail" aria-label="Gallery navigation"></nav>

    <div class="caption" aria-hidden="true">
        <span class="caption-cur" id="capCur">01</span>
        <span class="caption-sep">/</span>
        <span class="caption-total" id="capTotal">05</span>
    </div>


    <script>
    (function () {
        var IMAGES = [
            { url: 'https://res.cloudinary.com/dzgqzeebg/image/upload/v1776862617/gym_xntulz.jpg' },
            { url: 'https://res.cloudinary.com/dzgqzeebg/image/upload/v1776862668/hf_20260422_105448_b208b2f7-9e39-4cfe-bf08-9800ec9459ff_2_wwyo7c.png' },
            { url: 'https://res.cloudinary.com/dzgqzeebg/image/upload/v1776862663/hf_20260422_020335_b52c4512-e9c9-4e50-870a-df8ee0862ec9_b8vzjs.png' },
            { url: 'https://res.cloudinary.com/dzgqzeebg/image/upload/v1776863789/hf_20260421_063353_f2544b10-1ce8-472e-84af-fb5e2a33d3b8_trsdfi.jpg' },
            { url: 'https://res.cloudinary.com/dzgqzeebg/image/upload/v1776866906/ocydqxvxnd3xnyxslg9f.jpg' }
        ];

        var stage  = document.getElementById('stage');
        var rail   = document.getElementById('rail');
        var capCur = document.getElementById('capCur');
        var capTot = document.getElementById('capTotal');
        var hint   = document.getElementById('hint');

        var slides = [];
        var railItems = [];
        var currentIndex = 0;

        function pad(n) { return String(n).padStart(2, '0'); }

        function build() {
            IMAGES.forEach(function (item, i) {
                var s = document.createElement('div');
                s.className = 'slide' + (i === 0 ? ' is-active' : '');
                var img = document.createElement('img');
                img.src = item.url;
                img.alt = 'AI slop ' + (i + 1);
                img.loading = i === 0 ? 'eager' : 'lazy';
                img.decoding = 'async';
                s.appendChild(img);
                stage.appendChild(s);
                slides.push(s);

                var r = document.createElement('div');
                r.className = 'rail-item' + (i === 0 ? ' is-active' : '');
                r.innerHTML = '<span class="rail-item-num">' + pad(i + 1) + '</span><span class="rail-item-tick"></span>';
                rail.appendChild(r);
                railItems.push(r);
            });
            capTot.textContent = pad(IMAGES.length);
        }

        function setIndex(i) {
            var n = IMAGES.length;
            i = ((i % n) + n) % n;
            if (i === currentIndex) return;
            slides[currentIndex].classList.remove('is-active');
            railItems[currentIndex].classList.remove('is-active');
            currentIndex = i;
            slides[i].classList.add('is-active');
            railItems[i].classList.add('is-active');
            capCur.textContent = pad(i + 1);
            dismissHint();
        }

        var hintDismissed = false;
        function dismissHint() {
            if (hintDismissed) return;
            hintDismissed = true;
            if (hint) hint.classList.add('is-dismissed');
        }

        // ===== Wheel =====
        var wheelCooldown = false;
        window.addEventListener('wheel', function (e) {
            e.preventDefault();
            if (wheelCooldown) return;
            if (Math.abs(e.deltaY) < 8) return;
            wheelCooldown = true;
            setIndex(currentIndex + (e.deltaY > 0 ? 1 : -1));
            setTimeout(function () { wheelCooldown = false; }, 500);
        }, { passive: false });

        // ===== Keyboard =====
        window.addEventListener('keydown', function (e) {
            if (e.key === 'ArrowDown' || e.key === 'ArrowRight' || e.key === 'PageDown' || e.key === ' ') {
                e.preventDefault(); setIndex(currentIndex + 1);
            } else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft' || e.key === 'PageUp') {
                e.preventDefault(); setIndex(currentIndex - 1);
            } else if (e.key === 'Escape') {
                window.location.href = '/';
            }
        });

        // ===== Touch (mobile swipe) =====
        var touchStartY = null;
        window.addEventListener('touchstart', function (e) {
            if (e.touches && e.touches[0]) touchStartY = e.touches[0].clientY;
        }, { passive: true });
        window.addEventListener('touchmove', function (e) { e.preventDefault(); }, { passive: false });
        window.addEventListener('touchend', function (e) {
            if (touchStartY == null) return;
            var endY = (e.changedTouches && e.changedTouches[0]) ? e.changedTouches[0].clientY : touchStartY;
            var dy = endY - touchStartY;
            touchStartY = null;
            if (dy < -40)      setIndex(currentIndex + 1);
            else if (dy > 40)  setIndex(currentIndex - 1);
        });

        // ===== Click on a rail item jumps to that slide =====
        rail.style.pointerEvents = 'auto';
        rail.addEventListener('click', function (e) {
            var item = e.target.closest('.rail-item');
            if (!item) return;
            var idx = railItems.indexOf(item);
            if (idx !== -1) setIndex(idx);
        });
        railItems.forEach = Array.prototype.forEach;

        // ===== GMT clock =====
        (function startClock() {
            var el = document.getElementById('uiClock');
            if (!el) return;
            function tick() {
                var now = new Date();
                var h = String(now.getUTCHours()).padStart(2, '0');
                var m = String(now.getUTCMinutes()).padStart(2, '0');
                el.textContent = 'GMT ' + h + ':' + m;
            }
            tick();
            setInterval(tick, 10000);
        })();

        // ===== Init =====
        build();
        // Make rail items clickable
        railItems.forEach(function (r) { r.style.pointerEvents = 'auto'; r.style.cursor = 'pointer'; });
        // Auto-dismiss hint after 5s if user doesn't interact
        setTimeout(dismissHint, 5000);
    })();
    </script>
